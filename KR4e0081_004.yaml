body:
  text: 峴泉集卷四明張宇初撰題跋潘默成先生書跋宋稱道學最明凡業儒者皆有踐履之實雖片言一字使後世歆慕不已而良知或有警發者豈泛然也哉今觀默成先生潘公遺新州太守手帖首戒亷謹不茍為上俯仰無愧怍正自可樂末及淡然無欲之心為至大至剛之氣躬行之外又以告之後學誠古君子之用心也已豈不使貪夫庸士有所感愧而興起耶然讀其言而不能身踐之視仕而每墮是者為何如哉宜考亭朱夫子文獻黃公待制栁公皆推仰若此其非嘉言善行有足為千載模範而至是也夫惜世之知之者鮮矣豫留京獲觀喜而敬題于後應化録跋右三十代祖虛靖真君應化録止堂易真人所述天樂柯講師論讚者也真君生有異徵長而敏悟以髫齓襲教而遭際徽廟崇道之至若治蛟解水馘祟內庭暨禱禳呵禁之神已非有道者所不能而其忠君愛國之實且纍形于辭數驗於兆使徽廟具造道之見度禍於未萌亦豈不于宋朝運祚有所禆益者乎而乃使耳聞面覿之言卒成虛遇豈不深可感哉然真君之道行卓卓埀之後世不泯非國之存亡可得而繫焉况世運既否一旦示化若脫懸解久之復顯幻川蜀間或謂仙之說虛誕是可謂之誣哉此吾道之盛由真君而特著也凡世家所載率或遺略惟是書為詳抑止堂非有見聞茍失撰次遂亦缺墜而天樂富於問學不加贊述以傳之久永復何稽焉然歲久罕存某忝膺宗緒仰止無補因校遺文壽梓以廣其傳非足以盡報於其先也而四方知識者願聞之若即所見則真君之神功妙行亦庶幾不泯也乎檜堂奏稿跋古今國之賢良鄉閭之才士山林之英傑皆乘一代運興而生自非氣質庸下力學所能至也吾家自漢相傳迄今二千載凡國運更立主教者必有過人之資山中翼副之士皆器識魁特舉措必異於常故𤣥德克修家聲無墜蓋有自矣元初高祖簡齊天師赴召時君臣遭際皆英偉卓絶而相成者又多通道能文其顯赫一時光耀前後宜矣崇禧院檜堂黃尊師時侍行凡箋表供醮之文皆所撰述辭意溫雅志行純篤非惟姑存典實以備後日觀覽讀其言亦足見當時寵遇尊隆之至使後之人知所祖述者也如愚張公暇日出以示焉獲睹先世之盛烈豈不有興發者乎然山林凋悴日甚觀此尤重感惜而已元逮今已百載其遺宗故老若蘭雪如愚皆篤實有文故能珍襲彌久視彼文獻故家多片墨不保存者為何如哉後之繼者尚無墜其志庶副所託焉王達善先生梅花詩跋右錫山名儒王君達善和中峯禪師所賡馮翰林梅花詩百首豫趍京道過其地出求豫言夫詩之賦情詠景各由所得而成如馮居苑闥遭時貴顯乃獨意於梅或其處家山故林興味有所不忘而感發然也中峯融造禪妙才氣縱逸走筆成賦故不難矣二公相去今百年間罕續其後達善以學業之富必有契夫孤高逈絶者宜其詩思有不能自已而韻度清贍宜成章之麗也然古今尚梅者衆矣必求夫操行之潔有所自同則不徒嗜其清標而已矣豫亦愛梅者遂為之題何滄洲竹譜跋豫嘗稽諸畫法竹之始於唐及五代皆鈎扐設色法也故崔趙輩雜以花鳥擅名特不過殘坡野渚間風枝雨葉曲盡妍態而已求之高林竒芳老嫩晴雨之狀交錯互映而汀煙水霧幽思畢具大而怪崖顛壑清冽怒號層見疊出使俯仰屋壁若行其間者絶未之見也唐末李頗始作墨竹至南唐後主李煜為盛逮宋文同倡其神悟而蘇黃繼之墨竹之大成集矣善學者代不一二間惟得渾濁之氣纎媚之姿自成壯弱之筆者皆然逮金惟黃華父子頗飄逸出羣元初髙房山趙松雪李息齊柯丹丘一時競出各擅所長其名耀一代豈偶然哉息齊竹譜傳世已備刻本學者必由而入先師壺公天挺竒資寫竹尤工其髙弟何君伯度少與豫同門師焉克造三昧善繼絶學者也暇日為仲氏湛碧圖是譜雖枝葉幹節皆同息齊尤稍增益之而雄逸過焉所謂髙林竒芳怪崖顛壑者舉備諸體使吾湛碧穎敏之資力進而擴充之有不惟是而已哉裝池就索題其末而先師之學獲家承而人習之豈不私自喜快焉遂為識李氏族譜跋豫嘗觀古今士人之家盛衰存亡固係乎德積而善著之若何哉而文獻之後乃多淪弭無聞豈必德善有不足焉然其秀鍾粹發頓長則驟息理不可測者抑近世雖通都大邑趨馳凡千百里求故家大姓之足徴者不徒叩其風俗之美子孫之盛而於學行之歸亦甚鮮矣此非氣習有使然哉番陽李氏為饒之著姓吾山李君仲治敦厚而文於族為長急於究其氏姓之源嘗示徽饒㑹譜之略按其始唐德宗建中間因盜叛乃南遷於新安逮僖宗廣明間黃巢叛故避地黃􅞁有諱仲臯者則肅宗時李衛公靖後也仲臯生三子初遷徽之新門嘗卜以從田為吉故一居新門之敷田一居浮梁之界田一居婺源之嚴田皆代至顯宦在宋元為尤盛而詩禮之風藹然可尚者今且猶然其諱仕言者宋嘉定間自浮梁遷番陽為萬源始祖仲冶其十一代孫也觀其源流之衍不啻宗家望戚之盛其非有德善之素而然哉豫雖不及盡識而仲冶篤於求本惟恐有所顛墜其志之賢可槩知矣豈不使嗣之者有所興勉焉因其請遂感而為書其末定武蘭亭跋豫觀晉永嘉義熙之末時距一二載興衰相續朝同而夕異皆一時乖於禮度誼烈之風習於狂放其視國之重器身之大節猶空浮土苴故移其廟廊宇社之心一置諸嘉山美流而弗之顧豈時之不可為而遂勿為也哉故傳之久因有賴於標韻者宜矣王右軍禊帖為書法本傳之著而愈重雖視王陶溫謝勳跡有殊而於書之久亦過於泯然堙腐者焉世傳數體有梅花定武諸辨而求之逮古者絶所少見若時遷代異多唐宋摸搨於石者故各相淆雜雖豐瘠逸伏亦始離而間合代之蓄者非善辨不能也豫友吳君志德博雅嗜書搆此本於姻生王氏家王仕于元凡翰墨多所藏襲宜為搨之佳者以豫尤嗜之篤􅏻池畢屬識其故校豫所藏奎章虞公所跋本則甚類矣使志德之書既善尤潜味於此其所得之不已尚豫所可及哉幸世珍之趙文敏真書千文跋魏國文敏公為宋宗裔以書擅于元雖時之相去上下世莫不本之豫嘗讀公狀銘其得肆志於翰墨凡晉唐諸名迹每臨摹不下千百次是使其故王孫宗室餘神末度傳之不泯者亦豈非元之寬平隆盛有以養其氣習者然哉凡目所厯或家藏而人襲者真書為最少見而其可刻石者尤為書之最難豫友吳君志德藏此有年體畫楷細毫髮無不至是所以人之爭愛而埀之宜久也然或謂公書始法李雍雖後力入鍾王而終有類雍者間亦參之雍書公大有過焉抑善學者由是而入之黃庭方朔間若履階而升必達於閫奧豈可若恃盈肆者一并之庸腐而不暇論哉此厭常嗜古之士不得不辨焉志德既習之久善充其所造詣者矣因示之遂為識其末書俞烈婦傳後豫嘗觀劉向傳列女遺事深足扶綱厚俗為百世法而於節行峻卓者讀之使人髮立神悚果豈易得哉蓋為女婦之持節也於貧賤顛沛者為難而遭時喪亂冒兵刃無辱者尤難以資力自全者固不足取矣矧以貴富而乃失持者哉抑由天質之素剛徑不折者有之而或歸於世家大姓聞詩書之化能省立者有之及其以一婦人凜凜然有烈丈夫志與清氷烈日比潔並明傳之不泯豈不偉哉嚴陵烈婦俞童士淵妻也值元季兵亂顛連奔竄間官軍剽掠以身翼姑與子且纍逼汙之雖折肱皮面義不辱身繼以無辱告其夫而卒其不愧所天者果何如哉此古之為難也況世降俗薄而能自持不屈如是哉是必由天質之素而又䝉俞氏詩書之化孝姑事夫已見之平時而一旦從容就義視不難矣然詩書之教惟行義是先若俞氏世以文學相授受而有是烈婦適足以彰其學業之實於俞之光有不惟是而已矣宜流馨史册於無窮也其子英才來試邑弋陽為吾郡之有聲者嘗以徐太史傳請題豫誦之敬歎者再能無一言哉是所以為不泯者慶焉草堂八詠卷跋右草堂八詠先師柏承夏先生所蓄當時賢俊題詠之作也先生少從鄉先生長者逰皆一時知名者是以其問學淵粹文行端純有非他所可同日語也其先英公遺裔始家番陽後遷安仁元季兵興復遷吾里因家焉草堂作於乙已歲先生受知先君子冲虛公豫伯仲皆從之逰凡道德詞章之學莫不切聞而篤訓也惜豫駑下無似不足以副其琢礪未足見其有成也而其銘心盛德豈能少忘也哉無何先生以壽終冢子亦繼往此豫深抱無窮之悲也其於始終道義得不有愧感者焉孫護嘗請字於豫豫雖欲撫而成之使其克立以昌大其後未知異日何如也暇日因識此卷不能不重豫之悲焉因念兒時侍先生之側凡優於詞翰者畢具於此及豫長或師或友之豈不私切自幸焉今相去不二十年十無一存者是尤增豫之悲也護也尚珍藏之凡一展玩其手澤乃心祖訓以志顯揚則豫之望於先生之後者可俟矣故識于卷末張長史帖跋右張長史旭草書十七字乃唐人硬黃搨本也世稱顛素為草聖蓋其筆勢翩翩險怪莫測霆鼓電馳蛟騰豹躍之勢非心手融放所不能至也信不誣矣或者不求風神變化之妙而特以飄逸之過為嫌又豈真知書者哉豫學書三十餘年嘗臨摹千文墨刻愧不能造其三昧雖間探其遺意雄度尚何足以名家傳逺也哉因觀是書并識其感夫世鮮知者而愧已學之弗逮也彥益素嗜博雅不妄示人其亦知書者乎宜珍之至矣姚少師書蘇文忠公書跋右蘇文忠公遺寶覺佛印二禪師書少師姚公書以贈金山適中禪伯者也文忠公以文翰雄一時數百載之下猶仰之若嶽峻川奔其埀之不泯也亦宜􅀈於禪恱法喜之好尤深當是時禪林巨擘有若寶覺佛印者豈不與之默識心通也哉而我少師公今以雄才博學光際皇上龍飛之日寵賚彌厚又以元勳宿德贊輔青宫其穹爵令望又豈彼二禪師者可比擬哉使獲與文忠公罄同堂共席之論其歆豔禮敬尚當何如也且少師公書札精妙與文忠公之辭珠聨璧合照耀先後其以遺適中也猶足以見其下賢導後之篤固非以貴富自重者豈能若是耶豫也山林踈朽嘗辱知於公獲一披玩敬羡無已適中其世珍之豈不為禪門之一盛典也哉是識於左方俞紫芝草書千文跋豫齒及冠而少三齡時嘗侍先子逰錢塘紫芝先生俞公趙魏公高弟也於晉唐諸書體悉通凡所臨贋去古人毫髮無異遂名浙右豫獲執筆從公逰時年將八旬而康健其風度標格玉堂餘韻藹如也凡書法之妙幸盡究之而得公之書居多久稍逸去未幾公捐館矣數年往來京師或見一二令人愛不釋手草書千文一卷其里禇文煥氏所藏尤為佳者雖臨倣之工而出入諸體中若鸞停鳳翥之粹風馳電躍之神靡不備矣昔人謂如淮隂出師多多益善者此也考公書時去豫從逰特四載耳轉盼之頃凡二十餘年矣而錢塘凋謝故友殆盡撫卷不勝悲慨公不可作矣文煥尚善珍之因為書之右而并致豫之感焉楊氏族譜跋豫嘗讀史觀三代世表十二諸侯年表皆厯譜牒而後詳焉自殷以前諸侯不可得而譜周以來乃始可著孔子因史文治春秋序尚書則紀元年集世紀五帝三代以來終始五德之傳尤可考也及讀蘇子古史則譏太史公之失亦不少矣蓋代逺事湮有不完焉故譜牒之製而後帝王世序乃明春秋之後興壞不常至漢法古之製尤存凡學士大夫家乃人各為譜而官設局以掌者廢益久矣以是大宗故姓莫知有考者多矣華陽楊氏在漢亦泉矦喜太尉震始見傳記楊氏之顯者率宗焉厯唐尤盛遂分華隂蜀浙閩四派皆世顯宦由華隂而居醴陵仕唐宰于高安除臨江刺史遂居新淦者六樓翁也三子俱仕仲子諱正唐景雲元年來守撫州開元初寓臨川小邾里宋開禧丁卯六世孫浩復遷金溪之印山由是分為上下派莫善於印山也譜皆可考證焉豫少讀顯民詩知楊氏世以儒名及交孟頊其家學源委從可知矣近世稱著姓者子孫弗克繼其業使故家遺俗一旦顛墜不舉者常有矣如楊氏以穹爵令望著于代其後又克大之豈茍然哉宜當世之士具有稱述者因為題其後以勉諸來者邵典籍詩文跋國子典籍邵公原性瑰琦偉特士也曩逰吾山挹其言論味其詞章卓然以氣節自尚恨見之晚於是定交焉辱公不鄙而公適間關道途而顛倒之戚恬不形于辭色相去凡八九載每惜江海舊逰求如公者絶未之見也前秋忽㑹于京文益竒而氣益壯相與抵掌旅邸歡如平生已而幸㑹之數而麗澤之益有焉間秩其詩文若干篇示焉伏而讀之若夫蛟騰豹躍之氣霆奔川遡之音珠明玉瑩之質鑑鍧炳煥照耀文林間不可得而形似者淵泫浩蕩動千萬言皆足以植世教翼經史者也其非發乎悲憤感慕而然哉宜乎一時元夫碩士莫不推許之而每以剛介不偶於時逮晚方受知明主此故縉紳縫掖之士所深惜而公亦邈無介焉昔韓子謂非三代兩漢之書不觀故蘇文忠公以為文起八代之衰韓子法於千萬世直欲方駕孟荀而董賈未足多也而公氣識雄深使其才驅氣駕亦將繼武者耶斯其一以古學自任而舉世少所契許也哉豫也山林荒落何足以知之辱公雅厚能無言乎然世不求捐介蹇愕之士則已如茍求之非公而誰歟是書以歸之祭文先祖妣胡氏元君遷葬祭文惟川嶽之英育秀令門物必有所歸賴焉嗚呼天錫淑姿生風憲之後配我神明家其處躬柔惠蒞衆寬和母儀婦則持踐克篤遭元盛教興爵位穹赫飾華耀綺他莫與倫而內則相助教樞協承寵渥樹植鄉衆凡草又八年內外戴之其若舉弊益嗇濟困扶傾一時皆德之至於嗣生晚器食德之報實隂有自焉無何罹變位移撫鞠弱孤匡家畢葬時羣黨爭鋭危甚一髮卒以和順將成保時固本仁愛結心嚴介立節遂歸者復衆晚值兵興且募義保障逺邇賴寧不數載位返教崇先君光際天朝均被顯榮安享耆壽於甲第已而綸言薦降榮者朝野非德博智明足以回天寬璧尚克是哉比遷居三載而壽告終福備德全足慰後人之心啓當時之羡斯亦至矣不謂前兆弗宜厝柩壽藏之側不逾數年而先君仲父繼逝若婦若孫仰藉祖宗休靈襲武無墜矧以多故不獲隨構佳城愧罪曷眚兹卜地南山先隴相望幽宅信吉靈輿將以舉道哀不自勝追思遺德厚恩言孰能喻謹陳觴以告惟至神昭赫埀鑒于兹尚相我後人嗚呼尚享祭周經厯文維某年某月某朔日友人張某謹以清酌之奠致祭于亡友後軍都督府經厯周公之靈而言曰惟公之生同里而學同門豫在未冠其相切磋也猶馳於駿奔及以薦辟而仕雖始不忍别復遂㑹以究論嘗兩告歸以憂省實喜溢於誨諄果慰平生者研泳古道於斯文故出入班馬韓歐浸灌陶謝韋陳豈非以其所長又厭沃於縉紳蓋當世之凋謝若我同輩猶晨星之麗秋旻宜其志趣之合非籖帙之間則雲水之濱況即其所踐者廓然並見乎寸心其居職也能溫篤自持以格於聖神而蒞事之謹又能不屈於移淪繼不勝於旅擢也實繁夥之必親雖恐慮之莫計意必籌練於熟循豈謂終乃長逰值豫㑹以具陳豫之處朋友之分而情親義篤寧不力勉於自新曷期二旬之聚忽死生之要一付其屈伸世雖謂或不得其正而公自視者足以守道而全身然逺邇知識皆惜公才學之懿以若用之弗宜是曠視於歸真愧豫不足以盡其託而忍銘之以文惟抱耿耿乎中者徒愴慨於塵氛期彰公之宏文麗藻足示永以弗湮兹乃封窕以訣别其永違於九原惟靈昭昭之弗昧千載曷泯于斯言此慟豫之嗟感惟吾道之孰存是潔誠於一觴其來鑑乎吾聞尚享祭紹菴龔先生文嗚呼先生竟遂已乎其生也育質名胄授業良模在昔平盛方駕坦途問學該貫味道之腴允紹遺光世賓我孰於昔先猷貞純淵穆是畫是持維矜維朂克廣𤣥休實禆化育人惟求舊足副厥資醇篤其訓溫粹其辭凡我女侄令善由基方期久齡豈曰遽衰雖苦疾疚或作或愈伊此别懷傾我中緒繼兹壽康適欣且慰旋聞困痾驚惻罔喻亟趨以奔湯液具陳日企夕望莫療其源既以面訣尤懷必存終殞斯疾愧義靡敦曙星麗天曷翳其明芳蘭在谷曷掩其馨斯文凋謝甚若攴傾矧復云亡傷哉斯情世豈無友孰厚且仁再更晨昏靈旐兹舉惟我伯仲曷忘素誼酹此一觴泣涕如雨清明孔昭來格其至嗚呼先生哀慟何已嗚呼尚享祭曹道録文惟公篤生令宗才識純裕儒𤣥具師探索淵邃恢度益閎辭華豐鋭從祀帝庭衡嶽穹峙𤣥教聿興百司佐𨽻宏妙闡微誠感神至矧贊以文猶啓冥戾克大琳宫珠輝玉麗百工告成金奏旋備廣録宣儀幽逺咸類帝曰爾誠優眷彌譽雖其寅寮寵渥靡預豫忝襲宗匡翊實美篤厚友情淳誠道義被囏際榮欣躍恐懼凡厥巨微忠深愛屢世謂膠漆炎凉莫諭違别五載馳情益纍詞札往還疇滌懷睇且期晤言踈晦是傅曷云歲阻驚聞哀訃摧動寢興形神罔顧吾道何萎遽失儀羽不亡者存千齡非駐皇詞天漿寵際特御山林被光度越前世奈此凋謝孰庸陶鑄仙靈孔昭千里歸祔祖道郗歔悲感交注再瞻神容明德冲豫永埀休聲以綿祚嗚呼哀哉祭胡贊教文嗚呼代之輔吾教者必才能卓立足以翼贊其成也惟公生於名胄挺秀𤣥門早輔我先君克成教爵其遭際天朝而陳綱振紀凡經籙科典靡不竭力相衛焉厯職𤣥幕纍遷再擢故其元勳茂跡在一時同輩未可倫擬暨先君示化豫即襲教其力於協持視往弗怠故豫事之猶邦家之元老未嘗一有慢易而衆益加尊信焉曩二丈席溫靜不茍未幾朝廷精異符籙護以銅章首命掌之豈非其恭默有以至焉及纍升首席力讓未遑而亡何誣搆橫至竟殞於行是豈天之吝全其終耶而生化之機囿於運數而然耶嗚呼使豫聞訃顛沛摧慟哀無所容何奪之太速而禍之遽甚也哉然公夙探𤣥奧超曠之言其無纍乎中視生滅乃反真之遊又豈足傷其明哉矧其佳言麗藻宜與冥鴻遼鶴騰神廓寥之境是乃不死者存尚何悲歟兹歸神幽宫永隔千載是一觴決别以致其哀惟靈其鑒之祭傅仙官文嗚呼外方之學超逸是尚翊教之得才必名宗而貞亮當前元之運否慨山林之凋喪我先子之聿興值皇明之大暢首推慕於𤣥風競雲從而川向際真主之龍興密清光於天仗敷辭藻於文林著靈蹤於四望早侍祠以顯庸校𤣥科而綢創暨豫襲乎教樞力匡持而協相煥黃籙之標儀振瓊音於簠鬯纍遭際以錫還淡夷猶於峯嶂主丈席以儀刑屹耆英之足仰敞宏構之清輝鬱仙壇之穹壯俄微疾以愆和候返真乎鯨上甚名山之頽靡空撫感而悒怏兹靈輀之介道陳一觴以别餉神其鑒之情辭益愴青詞己巳年酬醮宿啓青詞伏以天壽趨朝仰效國恩之報教宗負任惟依帝造之宏况奏陳懷預患之憂而禍咎有橫貽之變夙攄醮禱允藉終全潔芹藻之一誠畣聖真之鴻澤俯膺中惕密徹丹忱伏願聰鑒昭明睿慈溥博釋愆瑕於既往咸錫陶鎔集安裕於邇來悉埀涵育冀欵言之上格資靈貺以潜敷教脈延禧協春和而日茂皇圖介福回陽候以時雍張宇明薦父青詞自天降質情有禱于𤣥穹由父生身恩敢忘於幽壤攄忱請命惕過陳詞伏念先考某生際時昌歿逢家難襁懷綺繡早罹失怙之哀步陟荆榛粗遂賁園之託屆誕之辰適近云亡之日乃先親違終養之嗟而弟有溺淵之恨纍欲陳於醮拔竟連阻於塵羈爰致薦修俾階超悟伏願丹書釋罪青簡垂慈性地朗明悉洗無涯之沉滯泉扄洞照普資已往之迷淪凡屬含靈均齊解脫酬醮早朝青詞乾道統天為凡世民彛之主宰皇中建極啓𤣥科請禱之梯航秉叩夙符陳情昭謝伏念臣某傳宗未冠襲職孔艱灾非鼎沸之屢貽繼嗣淵臨之數見志實乖於修滌躬有賴以祈禳時厯因循圓寶臺之萬遍恩埀罔極畣睿澤於一誠仰懷高厚之慈尤兾回旋之造朝儀曉肅盟欵是酬伏願釋宥無方矜容有在仙曹録命早育秀於春陽𤣥教增暉日齊明於景曜洪禧誕布巨澤咸濡正醮青詞乾坤覆載時倏屆於誕辰科範昭宣齊并酬於素欵仰希靈貺恭致謝言伏念臣某嗣職年踰撫躬夕惕驅馳非訟幸身衆之復安昭事宗祧感繼承之未遂晨夕之懷憂甚切省修之勵已維新蕆醮禱於冲科竭忠誠於宸鑒伏願皇猷鼎固教脈珍符曰壽曰康介萱席春暉之永宜家宜室開蘭闈晝日之長是慶衍於仙基至恩臨於悃愊年齡益茂髫稚咸寧本宫大殿慶成正醮謝恩青詞伏以易昭大壯是宫室之由興道煥重離喜殿廷之遂構仰依覆造恭致謝忱伏念臣某嗣職有年省躬無補上承帝渥幸錫賚之寵頒周率衆誠賴施金之咸集歲月之稽縻良久斧斤之經始惟艱獲棟宇於落成磬衷盟於醮悃伏願皇圖天廣教範春輝宜民宜人介萬姓壽康之祉爰清爰靜安一山寧謐之基及慶衍於宗傳至恩覃於鼎固百靈拱衛五福攸同懴紫微臺青詞伏以北極拱辰宰乾坤之生育中天御政司人世之權衡恭叩真科敬陳衷悃伏念某忝承宗緒仰拜綸恩千里趍朝國社適逢於繼統一心祀帝醮修有命於薦先矧川途驅役之囏多星運遲留之慮是欵寶臺之䖍禱幸符金籙之圓成庸致懴忱并伸酬謝伏願紫微昭煥潜回吉曜之暉黃道開明茂衍遐齡之慶教模增顯眷序咸寧懴臺早朝青詞維皇上帝總司主宰之機欽若昊天式重權衡之任懼灾衰之罔測嘗懇禱以預禳禮誥周圓攄誠懴謝伏念臣某嗣承越歲乏厯多艱顧罪業之彌深致憂危之疊見照臨有赫庸敷首過之祈降鑒無違是罄朝元之典馳忱緑奏畣欵𤣥穹伏願皇極昭回帝心簡在教範光而家道泰壽考益寧萱闈永以眷緣昌宗祧協慶愆尤氷釋福祉春融甲申普度酬醮滿散青詞伏以維皇建極幸厯事於三朝上帝降衷愧未修於一德攄誠答欵首過陳情伏念某早嗣仙宗纍逢昌運愆尤山積致貽灾否之屯疾疚日深猶切室家之難請禱之忱兩叩安寧之喜再生符關雎正始之期協中饋間家之望庸敬酬於素欵并追拔於先靈爰潔蘋羞上祈藻鑒伏願帝臨有赫天聽孔昭丹簡標名回禎祥於否曜玉符度命起沉滯於幽扃教範安隆眷緣寧逸普度早朝薦拔青詞天高地厚惟德澤之難忘日往月來倏古今之代謝攄誠請命竭已陳情伏念臣某襲爵懷慚省躬悔過追報幸資於逺邇傷悼彌深超遷仰及於幽冥謝酬敢後所懼愆尤之莫首必祈懴滌以均消爰潔清朝并周素欵伏願九幽拔罪五苦停酸保命生根咸證逍遙之果登真樂界全回發育之春教範光亨眷緣協吉齊意己巳酬醮齊意宿慶幸基早嗣宗傳之爵國恩是荷歲趍聖壽之朝慮接對之孔艱念風濤之涉逺仰祈醮禱已沐𤣥庥昨陳外纍之除實藉終全之祐忽罹橫撓旋遂安還嘗殫禳叩之皈并畣資扶之造伏願帝臨在上靈降有嚴鑒人欲之衷誠宥積愆之瑕垢皇圖鼎盛日增教統之光家祉春融克協宗風之振門庭彌永寧謐咸孚本府年經齊意歲厯云周幸叨安於四序教樞是荷惟昭畣以一誠況云為多積於悔尤而修進常踈於惕勵若灾非土木之干并人事疾痾之患每陳皈叩屢沐保全庸遵餞臘之規敬致酬恩之悃伏念某均依祖澤仰戴國恩缺溫凊於晨昏念憂勞於寒暑匪資懴釋曷遂首禳伏願忱􅈤上通康寧洊錫聖域咸春至化克揚於宗教福基開泰祥符允協於家庭凡兾未來之祐悉希大造之仁壽永萱華榮齊棠棣圓臺酬醮齊意洪武二十五年降香華蓋山帝君寵臨為儲君而請福微躬疾困賴慈母以祈安況官非誣橫之干有逺涉風波之慮省已宜於恐懼希恩必以祈禳神祐默扶醮盟是踐伏願天錫洪庥星輝景緯家慶日增於逺大仁夀同躋邦基時協於隆平睿慈克廣萱闈椿永棣鄂蘭馨建普度齊意伏念某早嗣仙宗纍承帝渥祖宗功德愧未報於初心言行愆尤慨莫修於寸善各從傾逝罔測升沉兼酬祈懇之誠益重勳勞之念庸資薦拔并遂首禳惟大德之好生實不言而善應伏願東極埀慈南炎受煉玉符金簡即開五戶之明丹界朱陵洞煥九幽之燭恩覃有造澤被無窮甲申普度酬醮齊意伏念某忝承仙緒叨厯聖朝極慚罪業之深莫遂愆瑕之滌顧病痾之久困致家室之靡寧叩兩欵以攄誠幸一忱之有格恭陳菲醮上答宸庥伏願聖造昭回帝心簡在悔尤蠲釋旋否癘之亨通幽壤開明運慈悲而超悟教風鞏固家慶蕃昌凡在甄陶均祈生育圓臺建醮誠意日照月臨皆機衡之所囿陽消隂長恐憂患之靡寧仰期潜回厄運之屯敬致上籲昊天之禱禮誥懼稽於四載始生特畣於一誠報欵愆期酬恩俟命伏願皇覽昭明帝慈溥博教統永隆於山嶽五福咸臻宗風益茂於蘅薇百祥駢集灾非氷釋嘉慶春融上梁文三清殿上梁文伏以三境神洲珠黍現虛無之上界五陵福地宗壇開龍虎之名山昨逢塵劫之推移復覩龍虎之壯觀帝恩罔極道化無方欽惟皇帝陛下乾坤同大日月並明經綸正始於萬方文軌㑹歸於四海豐功盛德大成至治之基聖子神孫益廣皇猷之永𤣥門推重華構維新仰惟三清三境天尊虛無至真上帝位三界之元尊為萬天之主宰𤣥元始成文而有象梵清景結氣於無窮紫檢丹書闡十極九霄之內典金科玉律衍七經八緯之文章是龍文鳳篆之彰致虎衛鸞驂之㑹象貝闕琳宫之遐仰聳旋臺蘂閣之雄瞻不日而成於斯為盛再惟神樂觀仙官本宫住持提㸃傅蓬閬仙姿煙霞儀表振青瑣紫宸之步領雲門大頀之音多貴達之經營實山林之柱石再惟道録司主領提㸃左演法尊師曹黼黻文章宰𤣥綱之樞轄噓呵風雨握祕笈之機衡日承寵錫之繁深竭謀為之力又惟住山提舉李玉韞山輝珠藏淵潤探𤣥科於法海輔教席於清都暨總務之羣才及施金之多士佳聲俊望嘗光霽於明時美譽芳馨共清揚於化日斯神道之設教而風霆以流形煥然繡柱雕甍凌空耀日偉矣彩楹綺户擁霧回風高明合景於始青空洞混真於大赤竒峯靈岫儼蛟騰鳳翥之儀疊轂高幢聳霞繞雲蒸之勢宜萬靈之環拱實千載之宏規爰舉修梁敬陳善頌梁之東五雲瑞氣靄空䝉日華烜耀金銀闕山嶽交輝萬壽崇梁之南千峯萬岫翠堆藍霓旌羽節浮空下一黍髙懸北面參梁之西瓊林瑶草白雲齊靈岩列秀青城表萬劫丹光接太微梁之北象麓圓髙天一色漢壇玉局萬靈尊福著皇釐朝萬國梁之上霧輦霞車鸞鵠仗玉京縹眇太清家神明區奧非無象梁之下洞訣神經遵妙化虛皇壇上月華圓靈璈四擁真仙駕伏願上梁之後皇圖益廣𤣥教增輝四宇八荒均被涵濡之澤羣黎萬姓咸資清靜之風道域無窮仙宗有永敕建祖師殿上梁文伏以炎漢教興龍虎乃神仙之官府留矦系出圭璋為世胄之典儀夙崇天道之歸寧拒劫塵之换人謀注久帝力維新欽惟皇帝陛下九五開圖一元正統宏模巨智立皇極以建中盛德豐功總天官而授厯湯武之鴻基益振漢唐之茂績斯彰懷禹貢以來庭集虞韶而制禮而儲器正元良之望兼親王隆國社之安宜華夷咸樂於雍熙而道域特沾於殊渥謀猷日廣柱石天開恭惟祖師正一冲𤣥神化靜應顯祐真君道尊𤣥省教闡清都神氣風霆實冠冕三山之重簮裾劔佩著源流奕世之宗纍斂福於邦民是培芳於嗣𦙍矧際天朝之優眷頓宏神宇之雄瞻千載洪規一時壯觀再惟將相良才閫垣英質及四方之碩德同一代之休光斯道其有在焉至神而無方也六合天經而地緯五城日烜以雲從嘗驅龍吏以運偉材旋捧鶴書而求碧瓦竒木既成於月府南金時至於雲庭紫府十二天幻成蓬閬瑤京三萬戶移自方瀛宛然貝闕丹臺廓矣蕊階瓊殿鳳麟洲渚春融三島而回鸞鵠旌幢樂徹九清而下駢虹駕霧耀電摩霄非山川壯麗無以表師相之尊由地位髙明足冠人天之仰故靈祗拱衛風雷長挾於仙都而珠璧鮮張星漢上通於帝所瓊書琳札惟許葛之可方璧薤金莖或茅丘之足擬當披承四十三傳復建立千五百世雖神運之有孚亦地靈之所至因時而就不日而成六偉敬陳雙梁用舉梁之東氣分光嶽道猶龍春回厯象朝暾麗盡在春風長養中梁之南塵湖髙與華衡參雲旌霧節非才空翠日護長生白玉函梁之西仙臺岩岫與雲齊碧池瓊樹煙霞表時有天書降紫泥梁之北道祖飛神超莫測綘衣魚鬛儼層霄漢家自古神明宅梁之上列帝髙居千仞廣靈璈時謁太清逰玉府樞機傳世掌梁之下虎衛龍翔羅鳳駕玉書光照五雲中億劫空同非晝夜伏願上梁之後聖壽天長皇圖鼎盛輔東儲之光大濟寰宇之謐寧勳名期將相於蕭曹家業兾士民於楊郭福瀰川海𤣥風克振於丕基德著璠璵教脈益隆於震器宗壇有永道化無方三門上梁文伏以龍虎名山著清虛之福地鳳麟别島開廣大之法門昨經離焰之災是復鼎新之建道摸克顯神化用昭仰惟三境髙尊十方列聖祖師正一冲𤣥神化靜應顯祐真君啓正一之宗風闡𤣥元之妙化得山峙川流之形勝𢎞天經地緯之規繩寶訣瓊文衍千五百年之仙胄珠宫貝闕崇二十四治之神功門通日月之往來戶象乾坤之闔闢奐輪斯美陟降是臨再惟住持提㸃神樂觀仙官傅北闕歸來領烟霞之舊席東山燕息衣雨露之殊恩嘉煥號之顯榮實𤣥門之儀表再惟住山提舉尊師玉質金聲上謁龍章之黼黻明珠完璧儼居鶴署之經綸其贊畫於大成尚謀猷於有永又惟道録提㸃尊師左演法曹文史清襟風霆偉度寵錫金鏞之重恩覃寶閣之尊尤匡贊於山林是相成於棟宇暨神寶之職司及良工之才轄豐功偉迹宜光輔於𤣥樞美擢佳聲共大膺於清選惟人有物而有則蓋神無體以無方赫然綺閣雕楹排雲擁霧倐爾璇題璧繪飛電騰空琅璈協駕於霓旌閣道降靈於羽節琳峯琪樹藹龍翔豹躍之姿雲珮霞裾儼鶴佇鸞趍之步斯百靈之拱衛乃萬姓之瞻依快舉雙虹特陳六律梁之東日華朝聳海暾紅靈壇儼有風雷護紫氣浮關曙彩中梁之南丹輿綘節下鸞驂明庭逺錫天香降帝闕綸音耀寶緘梁之西瓊林爽氣藹岩霏瑶壇夜燭丹光徹金井靈泉咽紫微梁之北蕊殿朱楹開瑞色虛皇真境聳中天琅函遍度羣靈格梁之上雲漢昭回來彩仗玉京縹眇五雲浮邦國鴻釐符有象梁之下羽佩朝珂須並駕𤣥風四海啓民瞻五福咸歌均聖化伏願上梁之後皇猷天廣𤣥德春輝百福千祥均戴陶鎔之澤五風十雨悉皈覆育之中道化丕彰真風益振正堂上梁文伏以周穆建草樓仙品位尊於上爵漢高賜大第邑封顯著於列侯由大教之始彰得兹山之最勝代思偉觀繼作維新耆山高士早振𤣥綱洊䝉天眷演濟世神明之化襲傳家靜謐之宗紫禁楓宸纍際天顔之優渥瓊函蕊笈嘗披祕典之精微宿志有符高風足挹脫頴謂出羣之驥處錐猶履薄於氷念報國之在躬職勤頌禱顧匡家之是任意必恢𢎞涵泳滄溟究性命本源之學菑畬淵海探古今子史之言千燈無處非禪一麈忘言是道鍊已得丹中符火康時猶掌上風霆恱古多金石之文詞資學每縉紳之言論丹青特胸中丘壑毫墨乃筆下虯龍居客盈門家藏充棟因悚王侯之愛敬莫辭朝野之聲華詞林錯比於鄭䖍冊府敢追於張烈富貴蓋源流相續謀謨在胸宇所鍾得失與時而盈虛剛柔視易之終始此非曠視於髙明是乃怡情於間雅言葺其宇寧無穹簷廣厦之足居有恱乎心别愛翠水丹崖之可鞠信可樂也其有待焉况為留國之故基永賴川靈之默相幸成輪奐喜就謀謨仰惟聖主洪恩王庭大德內緘之寵錫歲承再惟𤣥門上宰烈祖休光殊澤之滋腴日至惟麈湖峯若帝座尊其華山麓如雲屛秀孰匪千生之慶允祈百世之昌清恬有契於輞川錦繡何慚于金谷游岩歸隱寧期髙帝之招于頔山居不吝戴符之價汀梅雪霽覽重洲逺渚之衡湘簷桂秋髙對絶巘層巒之嵩華月露清華雲烟吞吐總是詩情文思波瀾起伏水木蒼森都存道味天機送飛鴻招黃鵠寫懷聊適於氷絲鏘羽佩度瑤笙洗耳間聞於靈籟曷擬追周柱下史敢自謂羲皇上人孰不云賢配之助多其勿訝後昆之託晚山川用回佳運歲月允協良辰且美且完爰居爰處必效南華經肆竒言而道大須如鶡冠子栖深谷以書成嘉猷逺播於流芳先範有光於前席且桓榮藉稽古之力故陸贄有克家之稱為我嗣焉必吾志也今則立柱迎霄舉梁耀日衆陳六偉之章敢布一言自述助為巴唱以發郢歡梁之東象山積翠日華中此心瑩徹如淵鑑千古無傳妙理同梁之南塵湖高聳碧堆藍翠峯萬疊爭朝拱奕世簮纓與並參梁之西圖書萬卷照青藜方瀛只許仙家住一曲川流即剡溪梁之北上界星河繞樞極爐燻朝夕耿丹心百代清芬戴君德梁之上幻出仙都非罔象雲宫天闕望非遙吾道虛空與同量梁之下絃誦雍熙美朝夜紫芝瑶草遍崆峒琴書自足娛清暇伏願上梁之後皇圖鼎盛萱壽春榮慶衍宗祧福祉所綏之有永壽綿家室禎祥懋集之天來瑤華茂蘭玉之芳神構冠宇寰之仰束書雲塢其樂只於𤣥珠授訓雪庭尚資崇於文憲道隆川嶽德著璠璵後堂樓上梁文伏以地位清高留國著仙家之第宅天基廣厚漢壇開道統之謀謨偶崇樓閣之瞻適壯山川之觀皇恩罔極祖澤彌深耆山逸士師友淵源琴書興味風霆氣脉抱一極於黃中海嶽矜情擅一丘於方內許葛之𤣥蹤莫繼班楊之儒雅益勤懷帝握於寬閒仰先猷於靜謐爰輯奐輪之美構式符燕處之良辰馬周市宅來棟宇於瀛洲徐鉉盡資易林丘於𤣥圃訓子尚容於晚節館甥允協於明時言優片玉何招議於郗超義重千金曷足慚於裴楷松柏色輝於璧府楩楠煥彩於丹丘宛然芝館薇垣宜此雀屏鴈幣花臨綺席陽回鶴圃之春菊綻瑶階雨霽鵝池之月飛雲擁霧麗日干霄非溪山勝槩無以盡登覽之雄由圖籍駢繁是足極探研之用故衣翩鶴氅招楊許於三神而曲度鸞笙候佺期於八表無偏無黨庶王道之可遵有德有言其斯文之是重高興豈倫於庾亮宏襟尚美於陳蕃多懿範之匡維亦忠誠之贊畫遂吾託矣不日成之快舉雙虹用陳六偉梁之東日華烜彩五雲中春回川嶽和風動佳氣從今長鬱蔥梁之南溪山列秀翠於藍地靈拱衛雄今古鳳翥蛟騰降斾驂梁之西蓬島瑶華接太微天祿圖書開璧府神光五夜照青藜梁之北山聳蘅薇戴留國琪花瓊樹四時春氣勢何須並秋色梁之上烈祖休光埀上相雲霞星漢接空冥孫枝世世居蓬閬梁之下奎璧文章光照夜繼承端在振家聲清白應殊珠玉價伏願上梁之後睿算天齊萱齡日永家室遂燕安之樂宗枝蕃嘉慶之祥真風益振於熙朝盛業逺埀於名代箕裘奕世福祉千春普說三元傳度普說太虛沖漠𤣥範幽微至極難言妙亦難思夫無聲無臭無形無名溟涬大棾寥廓毋光當爾之時文宇未立不可思議莫可度量自赤明開圖生天生地萬有畢具百千萬重道氣結為雲篆發為靈文然後萬範開張五篇敷落保制劫運與天長存真聖相傳為道則一蓋自元始說經於黍珠空懸之景衆真監度以授玉晨道君大範始張開皇之後復授靈寶大乘之道紫微飛天十部之書實元始洞𤣥靈寶赤書玉篇混洞太無靈文元始鍊之於洞陽之館治之於流火之庭乃元始靈寶之𤣥根空洞自然之真文生天立極開化神明施鎮五嶽安國康民是以太上演說玉局靈文誕布而我漢祖天師降生應化昔於上皇元年正月十五日無極大道太上老君修注上化八治無極元年七月十五日修注中化八治無極二年十月十五日修注下化八治漢安二年正月十五夜朝金闕後聖𤣥元道君降而蜀鶴鳴山授正一盟威都功修真延生飛化祕籙肘後經訣是年七月十五日修立二十四治以付嗣師又於十月十五日建四治以應二十八宿故治有二十四氣氣有二十四職男官女官二十四官男職女職二十四職受任之後依按科格領戶化民其有好道樂法心専志一者度厄延年攝邪歸正除害去妖濟生度死大可以飛神躡景度品登真使三五之教永劫無窮正一之風流傳不息是以授受之者對治度神臨壇分劵以表盟誓之重也蓋聞道君曰吾昔降蜀都其二十四治皆二十八宿之獄謂之隂景黑簿之司乃開紫陽南宫玉宸正一內殿授正一盟威都功祕籙遂得籙中交乾履斗之道三步九跡之要嘗告祖師真君曰正一之道生於混沌一氣𤣥黃未形純素尚結至太朴將散澆風日侵吾憂道民為邪所亂一氣混雜鬼魔相纒灾害橫生不得道真天年不竟而為中傷吾所降盟威諸籙盟誓外邪內正一氣故號正一叩者觀之不失一源之道故吾此法為衆法之門上清靈寶十變九化大丹隱書三九素語也祖師真君亦嘗授王真人曰混元之氣本一一生二二生三謂之三元三生四四生五是謂五行此三元五氣者經綸天地變化萬物是故正一之法本一氣而生動化於五故號三五法也奉其法者帝君三元靜位五行守理日月貞明隂陽順序雷霆無非震風雲無妄興萬物滋澤天下無征伐之勞人民無疾疫之苦則奉正一之法大感也真君始居嵩陽遂厯江東名山沿流巨壑乃入蜀戰鬼降魔分幽獄為二十四福庭降鬼帥為二十四陰官遂遇𤣥元道君復授以正一盟威之道三八飛仙延生之術拜真君為泰𤣥都正一真人攝𤣥元後聖之位為𤣥中大法師封泰𤣥都正一平氣宫主者由是六天魔鬼平治俱息修煉功成三天命下遂白日上升位賓九清矣故二十四品祕籙之傳皆攝邪皈正大興靈化以福萬民降二十八宿之氣修二十四氣之治佩法籙之符章役治氣之將吏功滿德備二官保舉刻書玉名尸解變遷位登真人七祖父母超升福堂由是三洞四輔經籙之傳宏衍祕妙普度無窮上所以保鎮國祚與天長存下則福利存亡普天稱慶其於紫陽內宫玉晨正一祕典開闡𤣥微良有以也迄今四十三傳仰䝉聖眷流演宗壇兹遇上元令節天官校録之辰都壇首弟子某齎金效信祈降𤣥恩十方參佩之士雲集宗壇是以法海高朋講延清衆洗滌身心欲聞至道嘗聞經曰虛元自然道所從出真一不二體性湛然圓明自足不墮諸見逺離塵垢學無所學修無所修於中了然不去不住無死無生是真解悟豈不深切著明也哉內而修之乃金液返還三五之道外而施之即靈寶十回真一之妙演之為紫樞飛梵之文赤書靈圖之録普度天人其功無量是以太上諸品經籙之傳出自是者其感通應化之道於兹備矣蓋知造化之津可以化吾之民若天降地升環之以日月發之以雷霆推測機緘之運行不言可以利羣生是知具夫人者非智愚之可加損在乎反求諸已則本有之善念念皈真純一不二而後抱𤣥守一復朴全真則盡性致命之道具矣是以萬殊一本與天地並行而不違也故虛無恬淡寂寞無為乃吾道之本而修之家國施之天人元適不可其感應無間皆自真文靈笈有以回祥弭患誠有自也夫若是則不徒福利存亡而已沐我太上涵濡之惠信無窮也兹夕升此法座上帝高真為作證盟六凡四聖咸所聽聞略為敷揚願臻𤣥悟一切善信人民凡在有情均躋仁壽無邉幽滯道岸同登久立珍重靈寶鍊度普說伏聞洞真妙戒靈寶玉符上保國祚於萬年下超苦爽於浩劫威禁至重神力難思今對道前依科傳度尚慮亡靈宿違真道甘受輪回先當普宣法乳開明真性俾令解悟出離冥途原夫無極之始大梵冲漠溟涬無朕由是而大朴始散陰陽始分生天立極發育萬物三才並立人居其中陽變陰合而五行混凝二氣周布萬物與天地並生均稟一氣而有形形生而性具乃天命之流行若三光並明五嶽分峙雷霆之威霜露之教無洪纎巨細皆有生知之全無一物不具此太極也神道設教度世化人者惟此而已故曰天地之道其為物不二在孔孟曰仁義在釋迦曰圓覺在莊列曰虛無在荀揚曰權衡在班馬曰文辭流而為千工百藝不離寸心特殊途同歸萬殊一本也奈何天地與萬有俱屬形氣囿于生滅聚散榮枯成壞者皆然人之有生智覺一動晝夜頃刻交擾紛紜無一息之寧耳聽目染口味心思莫非欲蔽情纒境奪物誘蓋性流為情情熾為念念積為慮慮久為識故七情六欲五蘊三毒凡貪填憎愛欣怨橫逆纒縳互至愈深愈固遂溺於根塵縳於執想甚至恩愛情欲或生有所負致結寃仇遂為眷屬一切眷屬妄認寃親寃親相纒互相報復乃緣隨境起境逐心生凡一切逆順好惡境緣動成障礙物之有形自一念之萌逐妄迷想百千萬劫流轉不已東升西沒頭出頭入雖木石無情亦嘗感化皆由一念之差遂種千生之苦使已之靈昏沉漂蕩散亂顛倒無有出期初則受想行識卒入成住敗空是有天堂地獄之報皆由心造而然罔知地水火風四大假合一切聲色盡是空花一切有相皆是幻妄自從曠大劫來一段無相圓明永劫自昧九幽長夜苦惱無邊由是太上有好生之德開方便門起大慈悲接引一切使之捨妄皈真均證無上道果獲福無量永出沉迷謹按元始天尊在始青天中懸一寶珠登引千真說經演妙以授玉宸靈寶道君而靈寶三品之道遂出次傳五老上帝妙行真人又命玉清真王開朱陵火府出破地獄符命青華大帝開青華左府出九龍符命韓君丈人開朱陵右府出拔幽魂符命三佐真人開黃籙院出黃籙真符由是上古三師以黍珠經法演成煉度𤣥文超死魂澤及羣品靈寶天尊傳之太清道德天尊次傳之大羅無極神公鬱羅翹真定光三真人流演以及徐葛鄭三真人大振其教而飛天十部玉字隱書由是發其微奧源源相授至漢我祖天師授太上正一之傳其文猶闡矧龍漢之初混洞赤文梵氣彌羅天真皇人按筆所書皆洞章靈符上以保制劫運度厄消灾下則死魂受煉生身受度普告三界無極神鄉北都泉曲疾除罪簿落滅惡根然後魔王保舉地秪送迎拔出地戶登真度命惟此元量妙㫖昨自世降俗薄靈文奧典祕於天府信乎𤣥科四萬劫一傳自非宿植靈根常培善果少能契遇實以𤣥襟至重豈泄慢之能造其微妙哉然靈寶之妙出於度人度人之功備於靈寶嘗聞仙師曰靈寶即金丹金丹即靈寶若木金間隔水火潜飛安得性命混融還元返本必立乾坤之鼎器煉坎離之藥物擒兩曜之烏兔㑹二氣之龍虎採先天真一之氣為根基取隂陽運行之機為法象動則起於陽九靜則循於隂六按六十四卦為周天之火候體三百八十四爻為升降之符節顛倒之妙逆順之機母隱子胎砂中取汞雖億千萬言不能載故毫髮差殊不能成妙在三五歸一之道啓偃月運天根循黃道行周天取西四之金於北一之水而制東三之木於南二之火復歸五土之中追二氣於黃道㑹三性於元宫然後隂剝陽純脫胎神化𤣥珠成象太乙皈真矣昔無上元君得九五之道而五雷君得三一之道與此無殊蓋河洛二圖所同實天地生成之本也其謂之靈寶也神凝為靈氣聚為寶亦必採混元杳冥之氣煉日魂月魄之精厯南箕涉東井動至陽之真火降太陰之黃華使坎戊月精離已日光㑹融五氣周天一匝無質生質徑上朱陵是乃普受開度死魂生身魂度朱陵受煉更生即虛一以象太極復皈於無也故至人修之以煉已推之以度人實乃天地之真陽㸃化隂魄時刻升遷矣是知靈寶亦金丹之異名也汝等沉魂苦趣厯劫有年今以㑹首某修建無上大齊千生慶㑹得沐道慈頓令開度如上妙義一厯耳根永為聖種惟汝自性法身本無垢濁無生死自緣染著幻妄無有解悟經曰三界衆生本無輪轉真一道氣本無生滅苦海無邊回頭是岸故曰了即業障本來空未了應須還宿債如智者或有聞見惡知惡覺亦須掃除愚者全毋趍向昧性冥行猶須猛省居富貴者念念纒縳處貧賤者念念攀緣造此業因豈逃輪轉是故前代師德休去歇去如寒灰死火枯木頑石只為息此一念方能照了諸妄不著一塵况來無其始去無其終生本無生死本無死一靈妙有亘古長存蓋由結愛為根積想成業故有種種受生種種儻報千生輪轉萬劫苦惱轉轉不息罔自覺知座下四衆受度亡魂我以非舌言汝以非心聽向非言非聽處猛烈悟來畢竟不落萬緣超出萬幻則三業六根一時淨盡回頭頓省向來一切苦樂纒縳了不可得於此直下體認昔本無生今未嘗死求向繫縛尚不可得況一切有無亂想尚何有哉不可認生前具此死後已無不問出劫至劫舍身入身汝應無壞但汝自昧若了明自性觀汝妙汝明心昭昭靈靈底不落語默動靜不著有無際畔如垢盡鑑明波澄月現不空之空真空無念之念正念頭頭動徹念念圓通真所謂千江有水千江月萬里無雲萬里天若不打破藩籬終存窩臼直須覿面承當更莫當場蹉過百千法門無量妙義盡向一機㑹悟從此一念不生萬緣俱寂塵沙罪業亦遂滅除惟此本來面目便是真仙佛祖尚何地獄惡道苦輪不息之繫哉究竟至此畢竟萬幻俱空一真獨露太空無相乃汝實相大衆聞此法音頓然解悟識自本真絶輪回道慎無退轉常自護持則廓然圓明了無罣礙視彼色相竟復何有是乃超凌三界逍遙上清矣其或下界沉滯之魂於此尚未洞契真常故宜傳以戒法免致淪墜敬以九真妙戒逐一宣傳是用先皈依三寶庶有依慿咨示衆魂各宜遵奉授法普說原夫太極之初溟涬始判陰陽由是而分天地位而萬物育五行兆而萬化生以是而生生化化無窮焉五行一陰陽也陰陽一太極也以天命之流行而賦與萬物為之性性萌而理具于中理著而情見乎外皆由乎陰陽之生殺五行之升降所以水火相激雷霆相薄剛柔相摩八卦相蕩鼓之以雷霆潤之以風雨而行乎隂陽二氣者神主之宰乎萬物之消長者帝主之然而動靜無端陰陽無始在人心則曰主宰謂之帝妙用謂之鬼神天地之大隂陽𨽻焉孰毋以主宰之乎是謂帝者此也吾道𤣥元之宗由元始天王於開皇之後以靈寶大乘之道紫微飛天十部之書授玉宸大道君暨神霄九宸上帝後降峨嵋山授天真皇人是出鍊度之法龍漢之初九陽自然之氣元始命天真皇人按筆成文祕之於洞陽之館及開朱陵火府遂以起死回生之文付之是以黍珠經法演成煉度之文又於龍漢劫中授道君以清微妙𤣥之道授老君以𤣥初應運內法以是靈寶天尊授妙化天帝清微通𤣥至式太上授之吾祖漢天師口口相傳是為清微正宗及元上侍宸一輝祖元君然後合之是曰清微靈寶道德正一是也太極徐真人修真成道奉太上命授靈寶十部妙經徐真人授之三佐真人凡濟度之事悉𨽻焉三佐真人授之太極左宫仙公由是靈寶之派流芳演派倡其說者若杜陸寧張最為大盛而流之後世者莫詳於林白二宗師焉是曰洞真出書度人强名元始洞𤣥嗣教易曰靈寶洞神演教名曰道德三者雖殊其實一致昔元始天尊命玉清真王開朱陵火府命青華大帝開青華左府韓君丈人開朱陵右府三佐真人開黃籙院出玉清破地獄等符若三簡五符之文凡行持鍊度告下幽關莫不開悟是曰神霄自清微而下皆其文也故高上神霄玉清真王長生大帝專制九霄三十六天三十六天尊惟大帝統領元象主握隂陽以故雷霆之政咸𨽻焉昔無上𤣥君得九五之道是以經曰得九五之道者而帝雷霆也五雷君乃得三一雷霆之道三乃東之祖數一乃北之生數仙師曰太一元君泄至真顯宣三五度凡人在靈寶言之天地之大日魂月魄升降隂陽而不息其所以死魂受錬生身受度之道以我陽神錬彼陰魂然後交姤陰陽而歸太極混合性情而返真元故曰凝神為靈聚氣為寶神即性也氣即命也蓋空洞降靈大虛生神空氣金胎真中之真故藏神氣於三田五藏之中取在天三光五行之氣直不過攝情還性攝性歸根水火既濟性命之道備矣是以道取自身之日月法取水火之法象以已陽明之性覺彼陰靈之魄假九霄九陽之氣煉質蕩形乘上帝之慈光開九泉之幽暗然後罪滅神全而化生矣夫東三之木合南二之火是龍反生於火也西四之金合北一之水虎反生於水也戊已乃中意之土三五合一之妙正所謂坎離既濟悉歸中到此方知三五功其於符篆簡咒科法儀文則法門之品格所以為入道之梯航求真之徑路而已茍不求諸已其能以度已之功度人也哉稽之至理未始不一夫五雷君得三一之道乃二斗之妙用即河圖之數故三一無殊於九五蓋樞陰機陽雷善霆惡陽雷陰霆總攝雷霆七十二司故魁罡為檄雷召霆之司以雷霆者得天地之中氣甲庚為雷霆之號令即九五之用壬為雷霆之局丙為雷霆之㑹子為雷霆之宗故子為雷局卯為雷門戊癸為雷火之司所以雷霆之威榮枯萬物生滅四時皆由合乎九五之妙也由火師汪真君侍宸王真君得雷姥之傳而盡泄矣人稟一靈並天地而為三才一身之造化陰陽與天地並行而不違也我之一㸃靈明輝天朗地亘古亘今了毋人識儒曰虛靈不昧釋曰妙净明心直下悟取非心非法非道非禪覿面相逢煞機在我經曰天發煞機龍蛇起陸人發煞機天地反覆天人合發萬變定基其所謂天人合發者豈非樞陰機陽也哉人之合乎天者冲氣以為和鬼神者二氣之良能以我縱閉之機役之則此感彼應始乎大梵冲漠混洞赤文之先然後五篇敷落萬範開張則五文開廓普植神靈故無文不度無文不生也大可以保鎮國祚證道成真小可以保已寧家濟人利物皆一氣之往來五行之生尅以我曠劫之元神役虛無之神神靈氣合氣至將靈故不離當處常湛然覔則知君不可見其為法門之設曰神霄者若掌心之包褁隂陽斬勘之發號施令使者之斗激天河雷門之交運水火洞𤣥之開合隂陽社令之策役神祗箭煞之冲激星耀下而酆嶽之文一氣一訣皆出身中妙用非徒紙上之文故曰萬法一法也萬神一神也蓋道乃法之體法乃道之用故法行先天大道將用自己元神充之則彌滿六虛斂之則不盈一握豈不一神動而萬神隨哉仙師曰法法皆心法心通法一通能通乎心則知夫收為胎息用為竅此是法中真要妙故參學者必須先究夫𤣥關妙用水火真源歸根復命之妙則可㑹萬于一百慮而一致矣茍不內明性天道法心地雷霆其能靜則金丹動則霹靂乎然必戒行為之志節精勤為之蹊閫師曰真中有神誠外無法是以存誠養氣之為體洞妙握機之為用果能抱元守一御氣凝神六識淨消一真獨露我即雷霆大法王尚何符咒罡訣云乎哉雖上賓三境超出萬幻亦不難矣其為濟利之功泥丸蓑草皆可寓氣栖神是故談笑風霆特吾餘事耳然而授受之奧符文之祕皆雲篆天書金科玉册必自盟天而傳庶無始勤終怠之患是以天真妙寶按劫以傳實天真元降科條盟誓至重今壇下弟子千生慶幸獲陟仙階今者上聞高厚依科付度是用宣演靈詮使知源舍流求本棄末則反求諸已有餘師矣必毋致輕泄漏慢有違禁條惟宜精修戒行探究𤣥微久而進功不怠物我俱忘神明合一得不躡景登真與太虛同體矣畢竟天地未分之前從何下筆萬法皈一一歸何處爾各勉旃佩受毋忽疏演法觀修造疏本觀始於漢季創自唐初暨元盛改創以來歲久凋弊已嘗修葺功力浩繁敬叩賢門幸思補報以成勝事伏以祖天師以魁星降世嘗孕瑞於蘅薇雲錦山乃梁楚鍾靈固儲祥於龍虎廟宇始崇於漢世殿庭曩建於唐朝厯今千二百年真風益振由昔二十四治道脈彌尊禁風雨之震零致廊廡之頽圯雖教統所當修葺亦真徒之合結緣筆下生春㑹見王長桃再熟目前願力指看趙朗鼎重輝幻成貝闕珠宫不異丹臺紫府名著長生籙等霑福慶之綿綿功顯大有書咸覩祥禎之秩秩𤣥風有永國祚無疆靖通庵題緣疏靖通庵者三十代天師虛靜真君修煉處也真君生宋熙洽之時嘗結圜山頂功行既著逮崇寧間徽廟崇道尤篤同王侍宸文卿林侍宸靈素遭際特甚禱祠禜禬皆有異徴未幾宋社既遷而真君皆先後坐脫凡其超辭茂蹟具載紀述而菴之建於宋元者厯經兵燹劫灰更創非一矧以歲久日逺不無傾圮雖本山之修葺宜先而力之弗逮必假衆緣是持短疏遍千好施長者揮金以成勝事庶幾真君靈貺同埀不泯云伏以道尊漢室正三十代之仙傳教闡宋朝悟五千言之祕奧屬徽廟尊隆之日協侍宸顯著之功立勇將于殿庭揭妖蛟於潮汐蒼龍白虎猶翠竹而碧梧赤馬紅羊仍青編而紫閣既飾皈崇之道敢忘葺弊之勤爰欲圖新必千衆助鶴歸遼海還瞻瓊館翬飛舄化泗州喜見瑶臺傑出共資宸貺均被靈休本山上清市修路疏伏以上清勝槩肇跡冠于東吳龍虎名區儲祥始自西漢屬聖治昭明之日當𤣥風盛大之時雜冠蓋于通衢壯閭閻于廣市綿延巨路正浮渚以臨溪浩蕩洪濤乃傾圮而磔岸匪葺飄零之暴幻成久逺之規爰居正工必于樂助鄭涯治道復看砥柱一新管仲失途共喜街逵四闢尚資善力同積福田上清市五通廟題緣疏伏以五顯靈官嘗著靈於徽婺三山勝境獨占勝於仙都昔由元運之興遂纒唐祠之建晨鐘暮鼓壯福地於東隅春祀秋祈鎮名山於西序道尊龍虎景著鳳麟昨因風雨之震零兼以劫灰之變幻致兹摧弊必仗一新自非遍叩於賢豪豈獲成工於土木施泉貨擲金聲慶衍源源之祉種善因揮兔穎福增步步之髙安樂公何須托跡於王瑜道鎔師從此顯靈於史卞即覩棟梁之煥爛竚看金碧之輝煌國有禎祥民臻康泰臨川寶應寺題緣修造疏伏以臨川絶境名推擬峴之溪山寶應禪林法演筆峯之勝槩蜀僧伽如尚在晉浮圖已何存徒聞真卿有說戒碑謾記靈運遺翻經石劫緣所遇修葺乘時筆下目前便是見世來世中布種人間天上要於即心非心處悟求無量福因河沙功德南唐虎溪東林寺題緣疏本寺始自虎溪一脈相傳故名東林古稱大剎昨毁於兵燹已復從新創建道場塑立佛像緣功力未圓莊嚴靡備必資喜捨果願同圓伏以龍樹佛現自在身如滿月輪無相實相虎溪寺得袈裟地若大千界不空亦空本南竺之心宗實東林之勝跡曩因業海揚塵也作劫中飛燼幸資一念已結衆緣但百丈金身尚資陪於妙色更千年寶藏未照耀於河沙成廣殿唱梵音悟在一彈指次升髙堂演大乘證於三繞座間大檀越生信向法寶心諸菩提報布施功德念求之往古之善因種此現前之良果即看寸筆春生便使長河注酪福皈至願恩畣鴻禧謹疏神霄雷閣長明燈疏伏以無上玉清王持九天氣六院宰神霄雷祖帝為羣生父萬靈師位為貞明大聖相贊雷師皓翁蕊閣宏開即鬱蕭彌羅之館蘭膏普照乃紫極曲密之房燈燈相續於無窮月月可隨而有禱一㸃之光不昧千生之業俱空主一府總四司實由鞭策風霆司五雷臨三界斯其統攝聖嶽將盡種現前善果便揮筆下春風灾祻不萌吉福來萃興居協慶晝夜長明謹疏南城縣南山圓明寺佛殿像堂疏伏以南山勝地禪林昔創於唐朝東土法門佛脈俱流於漢代惟此圓明之巨擘獨遺旴水之靈蹤殿宇震陵幻相亦空於定劫川源壯觀真如必顯於明時大檀那共成歡喜緣小衲子同種慈悲果指廩捐金於筆彩結緣建業於福田即看丈六金身輝天朗地便見百千寶閣麗日干霄修方便因獲無量祉資國寺題緣修造疏伏以徵君山雄秀冠於吳楚資國寺高深始自宋唐固文安之遺簡尚存儼馬祖之靈蹤猶著奈殿堂之傾圯念風雨之震零古木寒藤雖躋攀之可厯頽簷壞砌實栖息之難容既承信向之勤敢後葺修之舉必千衆力願遂良緣大檀那㸃額春生兔頴小衲子安單穩坐烏巢佇看翠竹黃花即幻珠宫寶地廣修善果均證福田謹疏賦淡漠賦粵太初之沖漠兮紛萬彚之資生爰混沌之始鑿兮列儀象以為經根動靜而始畫兮迭竒耦以五行曰圖書之是則兮立三極以權衡時俯仰於浩眇兮互消長乎生成維二五之妙合兮宛厯環樞而內凝絪縕以坱圠兮煌耀而恍惚漠虛靜而恬逸兮求𤣥珠於象罔湛一黍之空懸兮儼雲蒸而霓朗抱規中以潜淵兮廓浮游以􅚡漾旋乾坤之復姤兮協降升以轅輞濯暘谷而遹皇兮乘扶搖兮沆漭策茞斾聨蕙纕兮謁靈君於輝晃咽玉液與桂漿兮翳綝纚之鬱泱乃授而曰惟混茫兮超淡漠乎寥閴是庸滌此淟涊兮返𤣥精於藴質駕黔羸之曖曃兮御六氣之豐蔚貫離明以實坎晦兮乃弭節而運一息何周始之無端兮曰涫灊而有淪期羡得而遐舉兮由乃味乎醇真松喬矯而壽考兮奚椿柏之與鄰彼豈信儉生兮潛崖谷之囏辛志氷霜之高節兮眇幻有若漏塵豈紛華之謂美兮溺粗穢何由論慨豫生之蹇鈍兮徒留志乎昔芬漫先訓之紛糾兮悒余中之莫伸怡惝􅀈樂大化兮薠蘅槁而隱綸棄訑謾而釋茦兮叩厖鴻乎問津絶桑濮之蛩嘒兮大音浩乎若聞胡康匏之見寶兮又何顧乎商敦慨枘鑿之鉏鋙兮若異質於薰向可眷㸌煟兮每希榮而歎悴孰不固豫之操兮抑老列之猶貴伊揚雄之守𤣥兮且美根而密閟矧屈子之逺遊兮亦中存其灝氣濬沉濁以虛待兮聊漱鑿而猶豫逺姱嫽觀隅隈兮宜殉潔以蟬蛻惟賈誼之哀鵩兮了死生以奚慮孰若御厥泠風兮造列缺之何繫外爾躬之附贅兮豈為物之蟊蝟薄辰星之寥落兮徒餘光之衍泄悲埃壒之厄陋兮獨惶惶而憯惻紉蘭佩而欲遺兮搴薜蘿以謇釋睇芳躅之欲追兮邈高騫而岞峈粲露華於菊英兮感質䪥而形踖齊物我於稊米兮曠窮達而奚恤仰威鳳之高翔兮曷德輝之愔嫕愳跛鱉之跬躪兮騎膠轕而靡軾將求之以叩丹丘兮詎知無言之𤣥默求志賦繄豫生之抱志兮惟慎􅍦以自持託衡門以偃息兮情卓犖而不羈廓豫心之芒昧兮仰千古之同蹊曷乾坤之汝隘兮眇莫知其所為嗟垢氛之擁翳兮託桑甕而潛逸斯求志於隱居兮爰栖遲以沉鬱絶流俗之便佞兮耽素履以貞吉莽榛棘之塞途兮涉宕冥其蕩潏衝嶮巇之厄隘兮號封狐之跌軼獗磔虺之啖人兮疾驅馳且徒怖栗仰嶱􅠣以浩歌兮􅀈剛飇以箕膝奚矯翮之霄峥兮尚嘯羣而墜矰弋彼叨狼之肆摧抑兮歡梟鶚之是儔羌搆類以結族兮曾蟻蛭之遑羞挾奸偷而骯髒兮窮巢穴之探摉幸高蹈於沍涸兮藉鶉􅀈以為裘慨往轍之綿邈兮歘悲風之颼飀俯源泉之不舍兮櫹操繄夫崇丘曠杳眇其遐覽兮仰明德以慎修合絪緼於恍惚兮庶一氣之周流守中扄而寂默兮又適以夷猶徒組綬之蟬聨兮愧中赤之莫投孟軻之鄙臧兮猶歎魯之弗遇董子之正義兮卒江都而永棄彼蓬麻之鮮儷兮徒拳拳而結緒播蒼蠅之簧鼓兮感白圭而曷睇聖且有是厄困兮矧豫兹之若寄何窮達之纍中兮曰媺人之遐逝激頽波之顛仆兮徒鬱悒乎奚語侣漁樵之閒逸兮林壑閴其靚深踞潺湲之曲澗兮臨絶壁之嶔崟傲箕潁以容與兮沕淵潛之靡禁耻睢盱其惋媚兮快若趨乎浸淫暏下泉之清冽兮蔚苞蕭之蒨隂豈膏肓之忘返兮奈網縶之我侵足僶俯以蹩􅀈兮志又奚能以斯任冠章甫而縫掖兮聊采苓於高岑哀道之行廢兮惟明命之莫諶駕言朂此貞素兮庸孰契夫我心騷停雲辭有引晉處士陶潛嘗尹彭澤不能為五斗米折腰遂賦歸去來辭謝官歸耕以詩酒自適其亦寓憤世嫉邪之感而然也歟其曰停雲者思親友而作以序其園田之樂朋游之思也後之慕夫間雅靜退者率慕其為人雖然或遭時不同用舍之異而其沉溺乎寂寥枯槁之濱固安於恬逸而寧無親友之懷也乎豫卧疾黃箬山中寄跡於高蹈逺引者久矣暇日用廣其意以識其思焉辭曰停雲之思兮思不能已只豫兮斯栖有山有林有園有田只山崖卓拔居輒拮据只林木蔽芾時而濛翳只丘樊衍沃味所茹蓄只田疇嶕嶢食以菑畬只仰瞻扶輿宇宙隨所寓只來今往古焉有窮只豫兮斯栖復吾廣居只仰止昔人返吾誠只道以為徑由適趍只德以為宅直而方止體仁為防遵義為範只大中至和心之醇只閎文巨章道所載只持敬弗愆主厥一只溥博其淵慎兹獨只制以衡轍為德輿只操其淄潾增澡礪只執中無隅神無方只心君湛然淨以虛只聖哲同皈永矢蹈只停雲而思逺遡逰只麗澤其鮮胡盍簮只澆風頽波曰漂宕只孰偕寤言中心樂只平陸修阻慨邈悠只舟車莫從奚促席只洞視千古等須臾伐木以歌悵吾悲只擬鞠歌鞠歌奚擬兮感斯道之莫信情鬱悒兮無語兮􅍦黯黯焉慨將乎自珍乘騏驥兮靈氛駑駘竭蹶兮惟敬修以書紳託空言以述古兮或庶幾乎芳澤肥遁為心兮乃循循其以明德軼駕兮軾曷慿數千百載兮邈乎靡勝道豈實萎兮則豫孰得纘緒末馨操耆山操山之顛兮莫瞻龜魯山之木兮莫中斤斧山之幽兮祗以栖處志之遺兮世獨豫忤皇初有作兮嗟豫焉覩歸樵操我巢於林孰覿其憂伊我遐慕曷敢不繇懷古之人惟守我常樵斯我採胡使我傷彼牛有蔚我往曷銍世莫豫心奚悲我音佩蘭操蘭之芳兮其質漪漪我將佩兮孰覿我思􅑴其逺兮霜雪靡澌陟其邇兮榛棘維滋我植而晦兮悲其潛斯潛兮潛兮無揚爾馨兮無華爾姿歌行槖籥子歌太虛無垠浩磅礴孰使隂陽兆開鑿皇皇真宰執化樞鼓蕩吹噓槖中籥由來萬有同一源玉檢瓊編祕經略𤣥元聖祖啓妙機百萬微言示冲漠廓然茫昧天地先無名無象皆自然百鍊精金返真液龍虎烏兔相縈纒古來至士亦罕遇至人珍祕億劫傳祝融之孫得異說垢足麻衣叩雷穴自言縱閉司雨暘霹靂鞭驅隨奮烈少曽飛步金馬門聖嗣勳卿盡傾結翻然不受簮佩羈直駕風霆走吳越是時金璧羅英豪豈意風塵頓愁絶韶華滿眼總灰燼傲睨芳尊肆談閲歸來且識真主顔仙岩鬼谷思盤桓掃花釣水弄清嘯塵世俗慮毋毫干洞觀向來去就不足數登我石磴之上洗耳聽潺湲昨言忽憶桑梓里天冠之壇久蕪弛雕甍畫棟勞經營越歲前圖復雄峙削空兩璧峨帝宫石室雲床蓄雷雨我亦尋山築茅屋琵琶諸峯美如玉嘗聞大藥宜早營煉就丹光遍空燭洞庭彭蠡波滄溟黃鶴一去安飛行汞鉛顛倒豈細事為我剖决乾坤精誰云洞天别有書洞中之天惟虛無既非皇人所筆廣丈餘又非元始所說空懸珠煩君鼓槖訊然否請括溟涬大塊歸元初題郭熙秋烟平逺圖歌畫中五代俱匠師荆關董李稱絶竒河陽昔居祕閣內神宗眷遇重一時手圖屏障遍宫府古來籖軸不足數金壺玉碗留墨香湘雲華嶽生毫楮是時館中千百卷越世相傳不多見劫灰一息江海空彩素因之昧高逺丹丘自是蘇米徒此筆妙絶當時無風烟黯淡秋樹晚短橋斜屋行人孤逺黛晴嵐隔墟里山村路暗寒鐘起僧舍人歸别水津鳬鷖聲散漁歌裏河陽時在圭璧間意態落筆渾溪山使人對畫欲絶世間情倦思懷躋攀我思昔人今有年放曠日已俱拋捐北苑薊丘獲模寫猶好鍾陵僧巨然世傳粉繪競妍醜淡冶人情藴瓊玖歲寒枯淡見蒼森指顧風標凌不朽滄洲𤣥圃事莫期蔬餐茅棟臨東菑霜林石澗足栖逸賈公寧有氷鑑知晴囱展圖為之惜落寞浮名在編籍賞心􅍦憶雲林翁皓首從誰玩空碧題何滄洲象山髙節墨竹歌唐家畫法竹最多幹葉每貴施青螺崔徐唐趙雜花鳥五代變更初李頗閻梁諸作皆妙絶獨許蘇文成一窠元盛先稱趙李輩房山京兆俱名代當時聲耀動林府脫頴壺仙猶狡獪壺仙昔自燕吳歸氣吞雲夢光陸離三湘七澤隘胸宇尺璧寸珠安茍施滄洲老人探骨髓腕臂一掃秋風隨遂令毫楮盈四座快飲肆意令人嗤昨為黃郎寫髙節緣追卓徑猶竒絶六經百史意莫傳建安青田事明滅幽繁但詫充棟辭寂寞秋潭寫空月况此超塵涇渭空斷崖絶壁春雨藂黃州嶰谷今幾種落筆獨我先推雄雲籜風根象麓趣􅝻扁撥鐙俱蠶蟲夏山百疊水千尺夜雨蕭騷太隂黑展卷挑燈謁我題尚恐風雷驚四壁勿謂長竿無釣綸滄洲白頭猶我惜題王右丞雪霽江行圖歌為陳無垢作希夷之孫䫉若仙卧雲不出動十年揮毫自比荆李輩舊藏卷軸皆精傳王維此圖更幽絶漫空積雪愁雲天茆屋誰家舊籬落前山後渚相縈礴袁安屋舍風正寒老木蕭條幹盤錯放舟應有曉行者竹梅亞地溪聲惡烟霏溟漠漁網靜亂絮飛花夜鳴薄尺圖景物興難盡小塢橋通足深隱絶類君家象麓居龍湫石磴蛟蛇影瓊林柯葉氷欲解飛瀑顛崖兩峯頂客來掃雪開晝門凍葉滑屨篷簷溫坐懷方薛試春茗故舊凋謝今誰存黃塵沸熱未清泠何事酒罏燒竹根白頭偃卧意未倦㑹須共筆山南村題湖山春翠圖歌為倪晉明作春江漲流夜喧作霖雨如膏滯山郭新圖坐閲類經行金彩湖山肆逰樂誰家門巷栁烟叢别渚舟帆花霧幕清都阡陌酒罏春絲管相催鶯燕頻小船風送殘音曲月榭歌幃蒲藻濵黃金買笑輕鄉土白髮朱顔改秋水歡筵宜厭棾臺鐘晚市何憎荻花雨當時珠璧爛京華湖水荷香今幾家古來消長電驚目莫怪寒潮悲暮笳自緣粉黛擅蒼翠心跡燻酣動忘歲記我林逋鶴隊行江聲海色歸帆尾浦樹汀雲送瞑鴻間情盡付嚴灘句漢家倪掾帶經鋤故業尤存圖與書多君白首素賢裔高卧松筠耽自娛要知楊鄭等榛礫清白傳芳看有無題琵琶雲氣圖歌為張彥𢎞作岱輿之山走靈骨化作劫外千竒峯此峯立我茅舍北潑墨許我滄洲雄滄洲酒