消間悟幻尋真參求幾載自誓頓超生滅風抄雪纂夜讀朝吟探究古今賢哲道妙禪宗萬殊一本勘破底須分則這堂堂無礙真空非與太隂圓缺堪笑處竹椅蒲團松窗桂牖返步便同高潔塵世相違水雲為伴高卧故園風雪駿馬貂裘翠䄂紅螺過目浮華閒說速回頭是岸簾幃光透性天心月滿江紅閲世憶昔少年行樂處都非舊景聽海添潮落綺繡四城春永歌舞樓頭憎日暮管絃席裏嗔酣省看目前榮悴幾光隂愁難整夢魂醒塵慮并漫堪嗟空自警慨蘭橈荻閣水寒烟冷無分江湖中緒斷天心月到澄潭影念浮生識破悲歡川波靜酹江月江湖曽隨釣艇弄秋波見盡江湖浩漠兩岸白蘋洲渚外露泠荻花楓落半夜潮聲中天月色更轉梅花角推篷試問故人隨處蕭索發棹牧浦漁村夕陽城畔歸雁鳴偏數緑酒黃花烟雨際幾夢故園林壑壞塔風髙海門山小春盡埀楊郭歸來林下振衣髙視寥廓望梅花絶交浮世無邊塵纍勘破幻緣能幾億劫寃親千生契識薄似片雲情義空自愧奸巧機關逞英雄徒增業翳用盡深謀詭計奔競是非名利造物無私靈臺自昧苦海沉津如熾淨拋棄野水踈林絶行蹤月明風細解紅了悟本來真性體虛空遍界圓明現情塵掩翳心珠暗溺重淵靈光不昧一㸃輝煌元非逺掃浮雲萬象無遮礙天心見野花啼烏閒中舒卷看滄海桑田幾清淺衰榮代謝常消息盡愁山苦海流浪難轉猛省來乾坤總妙𤣥松筠畔寂寞細玩真源曹溪路口無隂樹非法非禪直待一陽生坎光騰如波捲誰㑹取靜飲刀圭浮慮遣視無形聽無聲言毋辨這落魄逍遙真可羡白雲堆裏容癡倦共寒泉枯木髙隱壺天風入松和虞學士韻江城淹病酒難酣踈鬢訝朝簮暑消已覺秋光遍紅塵逺斜日回驂蕙帳纍留殘宿青霜猶濕春衫秦淮潮定碧如藍歸燕息呢喃白雲幃幔寒偏早更誰問雁字魚緘早晚棹聲歸也黃花白酒村南峴泉集卷四
