body:
  text: 峴泉集巻二明張宇初撰序太上混元實錄序道之立教先天地為之始而後天地不知其終也其始於太上世惟傳黄帝時號廣成子帝嘗徃問道崆峒山後乃鑄鼎成丹而上升矣乃考之傳記見之他書皆曰生於殷為周柱下史後轉為守藏史積八十餘年太史公謂二百餘年時稱隱君子謚曰聃孔子至周嘗問禮焉周衰去而之秦過函谷闗闗令尹喜候氣而迎之强為著書乃述道徳上下篇以傳世云按氏族之書或謂周氏李乾娶於益夀氏女嬰敷生子耳字伯陽又謂李氏出髙陽氏子庭堅為堯大理以官命氏為理氏其後李徴妻絜和氏逃罪於紂食木子得全遂改曰李又謂李靈飛得道妻尹氏生老子諱𢎞元字曜靈或曰伯陽或曰老萊子或曰太史儋其説非一若黄帝之先自三皇開闢之初已有之而相傳厯代應化神變動百千劫而不息是實錄之作也其必有考焉夫神之無方可先後可有無其視千百載猶一息故不可以形測以跡求也是故以不可言謂之道以無名觀天地之始以無欲觀其玅故處無為之事行不言之教以不爭不盜而使民無知無欲此周衰將以厚俗拯化以還乎素朴而已矣使當是時俗流化薄而復訓以有名有欲有為有言之道又焉知乎曲所以全枉所以直窪所以盈弊所以新也哉以是乃鎮之以無名之朴不知孰為道孰為仁義則復古矣故其言行於秦虐之餘漢興以清靜濟之猶水之解炎也此先黄老而後六經也乎盖以一時之尚而言之其謂老子所貴道虛無因應變化於無為故著書辭稱㣲妙難識良有以焉後之君天下者代師而用之見之其緒餘者秘之為天經洞錄發之為靈書隱訣修之於身可以登真躡景施之於人可以濟世利物是乃兼乎内聖外王之道焉若拘夫鴻生碩士之説一以莊列若散道徳放論要亦歸之自然因雜之申韓刑名之流直有不可者也矧甚則以浮誕空寂病之乎然實錄之所紀載詳備若此豈得一出於私所尊大以取惑於世而能傳之之乆若是哉今皇上以天授仁聖自有寰宇首註道徳上下篇是資以清靜之治矣吾道之幸孰有加焉洪武十五年設道錄司吾山曹君希鳴實職焉希鳴以道行誠篤日承寵光度越前代是豈非有以賛清靜無為之化而然哉暇日考訂是錄夀梓以廣其傳間屬叙其端顧某忝竊是懼豈容述其首然而神化𤣥通之道六合之外聖人存而勿論於斯見矣謹為之序龍虎山志序道之潜於至㣲而顯於至著也天地之大隂陽周始而理著焉事物之衆盛衰循環而文著焉此其至㣲之機潜於至著之間人不可得而見矣迨夫厯千百載之下而不泯絶者而後知也道之謂虛無𤣥黙者原夫天也杳冥恍惚之内而精粹朕兆存焉是不可見而可知也歟吾太上之教自軒皇文景之下率嘗用其清靜無為之説驗於世矣或方之申韓刑名或闢之方術怪誕盖將有不得而毁斥為異端者乎故太史遷以其動合無形澹足萬物指約而易操道家者流則古有之也必矣是以闗尹莊列之言有以發其未盡而柔弱謙退之言有足以拯周衰之弊而範世軌俗焉得以幽𤣥視之且神道設教豈將誣後世以取惑哉迨列國而下秦之茅君漢之我祖天師吴之許葛皆其尤著者焉天師鍾不世出之姿親受于太上由是三洞經籙符法之傳秘於九霄十極者靈詮奥㫖盡降於世乃遊蜀之吴而鍊丹龍虎山山之名於天下者居福地之一而與三茅閤皂並稱焉我張氏留侯而下四十八世矣有非二山之足儗也厯魏晉唐宋代有褒崇典秩具備若山川之勝宫宇之麗人物之繁仙跡之異道行之神爵望之顯代之慕擬歆豔者或美之於詩文埀之金石相傳逮二千餘載而嗣之者愈乆而愈昌栖之者彌逺而彌廣孰非上世之濟物利生禦灾捍患其𤣥徳綿逺有以隂祐生民上禆王化而能傳之不息若是之乆且著哉抑亦山靈川后有以呵䕶資毓而然也乎是山志之不可無述也元皇慶一年春𤣥教嗣師吴公集為三巻進於朝詔詞臣元文清公程文憲公實序之而予曽大父留公大父太𤣥公遭際寵光烜赫當世獲紀之典籍榮亦至矣我朝先公沖虛公在先皇之始元累覲天顔眷渥獨至而予之鄙陋早襲教章上承殊遇宫宇易新已而今上嗣位首承召命䝉恩兩朝博厚之仁鴻厖之澤莫得而盡紀也間病舊志多疎淺凡近竊有慨焉或謂值兹盛世非加以稽古索隱以成一山之盛典豈不使奇芬偉躅湮鬱渙漫若珠玉之蔽於淵藪其質可珍而忽不收襲亦豈不自棄也哉予雖篤志而學有未逮焉講師李唐真清修篤厚乃命搜訪其遺缺而仲氏宇清志銳而才敏力贊成之遂析為十巻將完而善士某願夀諸梓能無一言以志之哉惟道之在天下與天地並行而不違其存於人者昌大之而已矣能志是而弗替則善承其已著而埀裕於將來宜與山川同其悠永其有已哉然世逺代異或不能盡其紀載而後之慕其餘風遺烈者未必不有取於是焉敬僣序于首漢天師世家序易曰顯道神徳行是故可與酬酢可與祐神矣盈天地間古今不息者道也能顯明於道則功用之神具見而合乎徳者故可與應萬變而贊祐於神矣是所謂叅贊天地之化育者也太史遷曰道家無為精神專一動合無形贍足萬物而與時遷移應物變化立俗施事無所不宜良有以哉太上生於殷為周藏室史復遷柱下史以神化莫測之跡代降於世為𤣥教宗我祖漢天師䝉留侯遺澤嘗親受道於太上由是仙經洞籙秘劫不傳者悉降於世繼以降治妖魅服煉神丹功成沖舉以劒印傳於奕代者今垂千五百年雖運移物改繼承不替其非以清靜無為之教功用之神有合乎天徳而足以贊化育者歟迨今凡名山奥區靈跡具存此其子孫流芳之逺榮達之乆信有以隂翊王度博施生民者盖可見矣漢末而下居龍虎山者巖栖谷隱修煉以自夀宋初漸以道行稱於時暨大觀崇寧間虛靖真君出焉其神功妙應一發於御風錬形之實而後益振有足方駕於前矣其下莫顯於曽大父薇山公大父太𤣥公也凡其禜禬禱祈之著遭際寵渥之極當是時奇徵茂蹟雖簮纓縉紳之士莫不禮敬之視前或有所未逮焉及我朝先君沖虛公光際聖朝混一海宇其崇資偉望昭赫一時榮被終始又豈昔之可倫儗者哉其為神明之胄必若是乎某以匪材庸質仰紹先烈惟忝竊是懼代䝉聖恩猶深戰慄間以世家顛末未白於世懼有遺缺昔侍先君手舊編一帙授傳髙道同虗謁宋太史濓序其首而未暇整緝以行然舊文辭意冗腐僣用刪校増次以廣諸梓庶以成先志也嗚呼物理之有盛衰也思所以承先啓後者為難哉末降以來棄實趨華競於勢利者衆矣茍不能造詣其學輝光其徳以亢厥宗可得謂之克纘前人之緒乎是豈足知夫昔之授於太上者徳行之隆勲烈之大其相傳之無替也果何使之然哉抑神而明之存乎其人後之來者尚必自勵其有以章述者焉斯為不墜其教矣其曰世家則本諸史云張氏宗系後序古者受姓命氏莫非聖賢之後或以國為氏國滅而氏存其世逺族湮者固常有之譜牒之製史設局以掌之及局廢而學士大夫家自為譜所以敘昭穆别親疎使凡為人後𦙍者知存尊祖敬宗之心是乃君子所務之大者也張氏姬姓系出軒轅子青陽氏第五子揮為弓正始造弓矢張羅以取禽獸主祀弧星世掌其職因賜姓張氏殷張穆子唐堯時張果皆以仙名逮周宣王時張仲為卿士其後張侯為晉大夫至三卿分晉張氏五世相韓太史公以為張本韓公族也韓滅留侯良以擊秦始皇報仇遂更姓焉舊譜始侯為初祖上無所載焉嘗觀其略因探索以備遺缺侯本沛之豐邑人佐漢髙有天下遂封侯起家至七世多以功烈著傳暨唐列為安定范陽太原南陽燉煌修武上谷沛國梁國滎陽平原京兆等四十三望族中出宰相凡十七人封侯者八人至十世而生漢天師父桐栢真人自沛遷杭嘗過鎮江之丹徒縣有留侯廟而常州仙跡亦名張公洞意必徳其惠而祠焉其後因居浙矣漢天師生杭之天目山是為𤣥教之宗嘗以修煉神丹及劾治魔鬼道吴遊蜀遂家信之龍虎山其傳緒悠逺盛倍於前史弗之察以謂留侯再世國除即意其嗣絶殊弗知流裔南北若是之繁也自漢天師十世而下丘隴之完系序之存凡居龍虎山者三十八世計侯之上逺不可知者通為五十餘世矣其支屬之殊同出處之顯晦則無所稽焉或傳閩之石笋信之上饒其張氏皆族也間見其子孫故老猶能道說舊故而求其世次則亦無從考質焉若夫江東西之間世稱穹爵令望而國朝崇尚不息者鮮與之倫其非列祖之神功𤣥化徳被四方而能若斯之昌且久哉抑嘗慨夫世之好誇譽者每為譜以自眩其間攀慕貴顯旁引曲證者多矣其於孝敬之心果何在哉而我張氏以神明之胄迄今千有餘載論者徒以繼爵虛𤣥之宗而已又焉知夫重珪疊組蟬聫而不替者代有之特或文獻之有不足者歟然其未能大白於世者前之人於求本之志有缺故當時鴻生碩士無一言以及之是亦甚可愧惜者也矧今宗裔視昔則十不一二其消長盛衰猶深有足感嘆者焉可復失於整輯也哉顧駑劣無似弗克負荷常懼駸尋墜絶使後之人曷從而知源流之自思亢其宗慎其本哉或謂作譜之法親者宜詳疎者宜略為子孫者各詳所親則略者亦可互見後之人當體夫祖宗徳澤之重篤志樹立使其流風餘澤無至顛墜庶克繼其善也昔韓魏公之言謹家牒而不忘乎先塋者學之大也可不警勉焉則古之譜牒之製所以敦本之道為不虚設矣兹述其槩於編末以紀其所自其發揚潜耀尚有俟於當世大手筆焉三十代天師虚靖真君語錄後序宇宙之間鍾光嶽靈淑之氣者惟人而人修乎身也有諸内必形諸外故凡蘊蓄之素者其能已於言乎雖老莊氏之學墮肢體黜聰眀凡役乎外者一切斥絶務一返乎内而至於垂世立教之道亦必因言而後達且著焉由是觀之遊方之外者豈以言為無所用也哉盖其於言也若太虚行雲澄淵㣲瀾隨其動止而成文不可以跡求之也歟與儒之於言也達則雄邁放逸之情肆窮則羈旅感慨之語發者異矣雖然其道隆神化之乆與天為徒又豈必以言之有無而後謂之仙哉三十代祖虚靖真君以靈悟宿植遭熈洽之朝在崇寧靖康間徽廟崇道尤甚而真仙輩出與真君上下一時者若徐神翁王文卿林靈素也凡祛禁妖祟平潮孽祠禜禬徃徃有異徴既而國運囏否預達灾朕及致風霆暘雨特指顧間其道神行著誠足以羽儀天朝澤被含品矣雖相去數百載至今人猶道慕之豈務誇一時而後竟泯無聞者比哉舊傳應化錄載述勲行詳矣凡真君流示世教之語陶冶性靈之篇又皆足以警迷啓蔽非遊神於胚腪坱軋之初蟬蛻於轇轕塵滓之表無毫忽足以介其中者其造詣能若是哉四方傳誦願見者惜不得其全往嘗刋布乆亦遺缺間求之名山重鋟梓以廣其傳庶俾冠褐之士慕嚮之流探索於言外意表以悟火符之秘窮鉛汞之妙有餘師矣以是而進乎道徳之域若所謂廣漠之野虚無之濱當層峯喬木之間風清月霽之夕哦咏其空歌靈韻林倡泉答又焉知其霓旌霞珮之不來降也哉其可不與老莊氏之言而並傳也乎宇初忝嗣匪材豈足以盡其賛頌揚美嘗恐有所遺墜姑序其槩以俟諸大手筆焉悠然閣集序夫物之衆自萌茁兆露而生生之意具焉以及繁長盛大而人鮮知也其所可見者越寒暑冬夏敷榮凋悴之色而已盖未得乎其初也物且然况已之心尤莫之察也乎人性之善知覺既形莫不有悠然存乎中者與物同而物欲情慮蔽其私猶寒暑冬夏之榮悴有不免焉而能察其蔽釋欲盡則悠然之善本存故為學之道由仁義操禮節所以持其中復其初則已心之悠然者若實有之仁於吾無間然也士之立身顯親非求夫是而後達不足謂之學也番陽甲江西他郡以産殖貲貿之富民廣其利五季間賢士巨室爭出而周為盛迨元集賢司直南翁公以學聞居湖田間山明水秀覽而悦之遂搆悠然閣其上或有取夫晉陶處士詩語也未幾入朝時大夫士咸有述始南翁洎左丞伯温公皆顯宦族姓且繁而郎中公克復伯仲守世澤不墜元季兵興閣毁而克復處仕途既還若上世手澤皆收襲具存予辱與克復契厚間出所藏屬以言是編辭藻増耀有足見南翁遭際隆盛而悠然乃未達之日所名其諸賦咏皆一時名卿碩士美之於既達之日雖眷眷桑梓間湖山之勝與晉處士所適固異求之世澤之愈乆其得乎一心之悠然與景物之托興者又有不同者矣雖然景物之代謝常係於榮悴且物俱囿於理氣積厚者源深若家世之逺近亦由積之之厚薄也當元盛時四方士人簪擁雲合與周氏同輩者視今能幾人哉克復之善繼其業且䕶重編帙以示將來是使知夫悠然其中有若是耶抑余祖太𤣥公於南翁伯溫有世契而余於克復凡辱知三世矣言可拒乎惟其後𦙍尚善珍之則悠然之澤非榮悴之足拘必由至仁之著於無窮者焉予因致其望於是者敬序以復請丹纂要序黄老之書出而吾道興史載帝嘗問道廣成子於崆峒山其言非神異深奥而簡明要切易知易行者也至周穆王作草樓延逸人而後相尊信之若闗尹莊列諸子生戰國間以時上下而言亦異同然其授受之源一也盖其本則三洞九霄諸經品道藏者其用世之説則内聖外王之道盖公曹叅以清靜而治是也其要也使有歸於無實返於虛順元氣之流行而深根固蒂返本還元則性命混融守其一真復超乎無而已矣迨秦皇漢武取惑方術而其説淆襍後之所謂金液大丹者始金碧龍虎經大上石壁歌至漢魏伯陽本金碧經作叅同契假易以明丹述五行八卦隂陽經緯之説詳火藥消長生化之機或引金石草木之類以證體用或託嬰姹龍虎之説以隱𤣥㣲而踵其後者全以金石比喻之言溺其要義以惑世誘俗不惟内外丹之傳由是迷逸而未知探訪者一槩以藥石為丹舎身心之實性命之理因譔為奇言譎語以權衡學者非特鼓惑一時且流弊後世者有之盖外丹之傳采五金八石之精粹按火候隂符而烹錬與内丹升降進退之道無異故内外之運用一也夫人之形骸屬隂皆由精氣凝化必資金石之英雲日之華以化鍊之則靈化之妙可輕舉飄浮矣故名山川間丹爐藥竈皆有遺跡若吾祖漢天師許太史葛仙公之流世傳尤著故舎二者之傳則皆妄也元季間有險薄之徒爭倡邪說為採戰之術盜習成書假先徳之言以相引證誑惑當世富豪大賈之人且多從之以延年縱慾必喪身亡命而後已其始作俑者業識之報當何如哉予嘗欲抵斥之患未能廣耳又或持草木雲霞按摩導引之文以為入逕之資雖可養生延夀求其成工亦縁木求魚負薪救火尤庶乎邪説暴行而已矣所謂南北二派其全真所宗金王重陽氏南派則張紫陽氏張之書多文而隱王之書皆直而約張氏之傳必内外合而後成王氏則修内而已矣然其授受之奥必學者力究焉有非書之可盡也予自襲教䝉皇上眷念隆渥嘗勉以精進道宗之學今凡十餘載嘗討論叅訪於四方之士不敢少怠苐以質下聞寡無以上副國恩以光宗教是錄平昔所覽經論詩訣上自帝真師匠沿流而止探考異同擇其精要足為學門軌範者題曰丹纂要不惟便於玩覽實將發性命之理神氣之要一貫而萬偹可因誦心會不惑於謬戾之病亦無取於經世兼善者之訕議其於黄老莊列之傳亦庶幾不失其緒焉使傳之廣且乆則䝉吾道之澤有自矣况栖遁山林日積月累進之不已豈登真躡景之不可繼哉然尤在夫善根上器之士有以自證者也是序于巻首生神章註序易曰神者妙萬物而為言也成變化而行鬼神至神無方聖而不可知之謂神易之言神至矣盖萬物自一氣生氣分而太極判兩儀四象五行各位乎氣之中由五行之氣布而萬彚生生之無窮其五行之運陽極於九隂極於六二五九一之道又備乎五行之中一為萬數之根而氣為萬有之母氣之流行統宰於神然後變化出焉天以積氣而成帝以統神而名若一氣生二氣三氣生九氣九氣生之無窮彌滿六虚皆氣之化生是謂之諸天也諸天歸之於虛無言其不可以象求也是以吾教之設本乎虚無自然其虚無自然者神氣也知養夫神氣則性命之道修矣而修之之方雖或同異其原夫三洞九霄之㫖則一矣盖三境梵氣結篆成文非人世演說模倣塵言之類也九天生神章經道貫義眀其分章掊句皆至頥之奥毎各府命元而有一天其修煉之徑盡矣内而鍊已外而度魂故誦之九轉七誦皆按數之妙可以坐致自然白日登宸盖非讀誦使然十乃成數天地之造化係焉人身備天地之造化豈登真應化之道有不可得哉况按金液返還之㫖九乃陽數也夫元始之演妙神王之進請其灾劫種之訓至矣自赤明開皇以來仙曹之判選若階而升其不修善行不求至道者豈不於是深所感畏哉其能修者不惟度劫成真乃上證僚擢非由養氣錬神囘九氣於萬靈混三界於一氣而然乎所謂知其神之神不知不神之所以神也抑於死生之說則鍊已之神可以度幽雖闡太上之慈恩亦由修已之功莫大矣故是經與度人大洞救苦之義表裏混融其善習誦者因文解義於道之奥曰有所悟入矣清源董圭山註釋明達實幽明之津筏者也暇日某命工鏤梓以廣其傳其存心恵澤至矣間書請序其首予何足以開倡其㫖使人人知所皈向况幽顯之大者乎然遵是而修之乆乃神靈炁化躡浮駕空返已之天於虚無之上則髙虛清明之景是所遊焉武夷山志序世之謂方輿職方郡志之書率於名山大川靈蹤遐躅莫之盡詳焉盖非載籍之遺缺而代之鴻生碩士多病以虛誕而諱言之然古之仙真其神靈所寓無徃不在凡禦灾捍患之異有禱輒應豈不足以隂翊皇度者乎抑豈無叅賛之功於世也哉而或史之弗書述之弗詳則千百載之下竟遂泯泯無傳焉是亦習教者之所宜盡心致力也歟建寧之武夷為昇真𤣥化洞天按傳記晉陸鴻漸謂昔有神人受帝命統錄地仙嘗降于山顛自稱武夷君山因以名而白紫清傳列仙則謂秦人籛鏗嘗隱於是焉携二子長曰武次曰夷其亦莫得而辯也漢郊祀志武帝嘗祠武夷君于建命祠官領之山有漢祀壇遺址或曰秦始皇二年八月十有五日上帝同太姥元君魏真君子騫設㑹幔亭峰之頂虹橋接空魚貫而上者千百人呼鄉人為曽孫享以酒核皆彩室綺裀供帳華盛靈樂迭奏已而風雨且作竟失所在子謇始學道於山從張湛孫綽等十三人遇控鶴仙人受道皆仙去下而唐宋迄元得仙者常輩出沖祐觀始創於唐天寳間迨南唐寳大八年李公輔於道有得遂遷今址賜額曰㑹仙宋初凡殿宇廊廡更新之太宗寵以御札祥符二年賜田若干熈寧初秩二千石者領之暨紹聖元符端平嘉熈紹定間禱雨輒應復加封號錫田蠲稅之恩累降元天厯亦寵賚如前而貞人介士代不乏焉以是名於天下與三山相後先也盖建之曰丹山碧水者竒峰麗岫層見疊出于一水縈紆之間而巖姿屏色趍抱拱挹凡洞穴壇壝不可枚紀每皆勝絶孰不有仙真異人居之是故若朱文公蔡文節公劉文簡公一時名賢鉅儒亦皆讀書講學其間則九曲之勝聞于四方者亦豈偶然也哉予嘗異夫三茅山楊許二長史之會于華陽洞天麻姑之㑹蔡經方平於仙壇也稽之傳記若劉向漢稱博極羣書其言未必誣也以是知幔亭之集必不妄矣其可無所紀述也哉而山志考載且詳誠足傳逺矣余嘗欲一遊而未遂主觀者某間請序其首余固不獲以淺陋辭而亦尚圖詢諸遺老殘文以補其未備云白鶴觀志序自黄帝獲鼎學仙丹成而上升繼則周穆王作草樓召仙而其説始殷逮秦漢求仙之盛而方士迭出謬以神異誇誕取惑好慕之君淆襍虛𤣥之授招時訕議者亦宜然豈無真仙者潛遯窮僻遺名棄跡以修之故其丹爐藥臼靈書奥訣或秘諸巖洞或留世隱顯雖其跡不同自古相傳代有之矣江西豐城之白鶴觀在陳大建間其地真仙甘君之靈跡也甘君幼篤孝以行聞於鄉里學道有年聞旌陽許君善往師之許君與偕往師丹陽女仙諶母得秘授法行日著乃從許君積功江漢間若其圖松禦恠斬蛟蜃祛蛇孽以三尺劒致功可益萬世其名跡埀之無窮必然矣况其功烈尤有不能具錄者乎而許君嘗有淨明忠孝之法行世其說皆本大中至正之理非他符訣呪步比也甘君以孝行之著成仙躡空其功與道豈不得之忠孝尤多矧仙之為超脫凡俗之逕未嘗去人道而必獨善也此甘君道既成事母終而脫去則可謂兩全矣抑凡仙真區宅必山川雄勝而豐城之佳秀宜有以毓其質炁而然也予今春謁西山玉隆宫還經白鶴觀雖風雨之夕探採遺逸尤有足起慕焉其地雖處闤闠間景物幽麗詢其兩楹乃吾祖虚靖真君窪盈方丈其前龍潭真君飛幻處也道㑹鄔某耆士熊某主觀事且出甘君所為丹經洎觀志及真君與任首座書言尤足以有發而事畢名存寧不重為感惜者焉越夏某來山中以觀志請序余幼嗜名山水間以窮幽索勝嘗歉古今名跡不獲遍覽若甘仙之神徳優著乃獲讀其言履其境叙不可辭矧尤吾祖之遺聲逸跡間可以詳夫紀載者哉然某克盡其職且編次成書欲夀諸梓可謂善究其本矣使他日真仙之靈蹤異化與是錄同其弗泯於吾道豈不甚盛事哉繼者勉之張嘉定集序澹漠先生張公詩集若干巻吾友大椿編次屬序於予其不獲辭也記髫齔時嘗侍公於先君子之側獲請益焉當是時稱鄉先生盧公伯良夏公伯承為同門師友而學業又皆齊驅並駕而莫知其孰先後焉公為吾里著姓自宋元簮組相屬多以文鳴公幼岐嶷才贍氣銳暨長博學善記誦猶長於詩元季隣邑以詩名者若張公仲舉黄公君瑞危公大樸皆嘗頡頏其間而李先生仲公祝先生蕃逺猶所師也間挾所蘊走燕趙間卒無所遇合道吴楚而還居無何天下雲擾豪俊並起一時僭竊之徒間聞而聘之竟潛退不屈而其流離忠憤皆見乎詩而雄放之氣毅如也我朝國初奄有海宇首以遺逸徴公赴闕授知嘉定州秩滿以老賜還乃泝吴越淮湘而歸晚築畊林壑杜門家授於詩益工州之民嘗有以誣禍搆連逮數十人公直其事獲全迨今人猶徳之公之詩其體裁風致本乎風雅而浸淫乎漢魏六朝若盛唐初元而下所不道也盖其氣㟁魁偉美姿表故吐辭運思捷若神助宿搆不假窮索苦思而成其雄渾淵永若穹華之雲長江之瀾不可涯測而跡求者是所以淺陋庸隘者所不能造也此其知名王公學士大夫間信不虚得矣惜其平素撰述中罹兵燹散軼者多盧公嘗拾襲其千百圖永於梓未完而殁槀復逸不存間愛而不能棄者手錄其十一校大椿所錄居多惜予無似嘗承教於公而不能副其訓育其敢妄序之乎然公之學優辭敏不惟駢華競秀於一時而其盛徳偉望已嘗見於事功其遺聲潛曜豈竟泯泯澌墜者哉矧吾大椿力學好義將繼盧公之志為不難矣又豈不樂為斯文道哉公諱率字孟循號澹漠門弟子以澹漠先生稱云宗濂稾序予友倪君子正少從學先師夏先生栢承而授陸氏本心之說於彭先生孟悦其踐履篤實推信於鄉里者雖庸夫愚婦皆知其為君子也窮居陋巷貧窶自守慎交寡言於師友請益不怠而動容常若不足間苦疾鮮為文辭或强綴作必稽諸經一出於純正余嘗聞性理之說於彭公其琢礪討論皆君之益凡交處十餘年猶一日也某年以薦辟除新建教諭間兩還鄉里獲與之研究古先賢哲前言往行陶冶于疎林荒磵軒燈池月間其意味醇慤求之古人不多讓也洪武十七年春服缺赴京示㣲疾終予悲不勝嘗勉其子衡勿墜其手澤後四年衡持文若干篇曰宗濂稾請曰先君居新建時縣庠乃元江丞相宗濓書院也故稾以是名先君託知之深莫公若也願序其端予不獲辭讀之再而感曰夫士之為學求足於人者多求足於身者寡矣君育天地之和山川之秀䝉先世之澤質淳氣清性行端潔自非庸儒俗生所能至内既足於身而外亦無待乎人者也故其言論風㫖一本諸簡易之理精㣲之得道不待究而自明誠不俟立而自著是所以得之本心也歟宜其施諸事為訓諸講解舉不淪於口耳之習言辭之辨一存乎端本誠身而已矣本端身誠則聖人之道經世之法具矣尚何俟其繁贅也哉其策問講義序說皆發乎正大之要存養之方陸門之楊錢殆不是過也其詩歌篇什得乎性情之實而韋孟之閑雅陶栁之冲澹有焉惜未之大用無以發其和粹之蓄豈聖代之可多見也乎今凡新建學徒在當時嘗聞其言者尤有立是豈其涵濡操勵之工為少哉惜其學本諸陸而世之宗朱者或有不與焉是故其特立不惑宜世之鮮知也已然究其會同其言可得而竟泯泯者乎使其傳之不替豈不羽翼乎周程朱陸之言必矣墓則友人吴君伯宗為之銘惜予無足以發之姑以義弗辭序其槩焉雲溪詩集序孟子之言曰王者之迹熄而詩亡詩亡然後春秋作夫詩豈易言哉自三百篇古賦之下漢之蘇李魏之曹劉王應去風雅未逺始有以變之晉初阮陸潘左之徒尤未湮墜逮六朝鮑謝顔張出而音韻柔嫚體格綺麗則風雅之淳日漓矣暨唐初宋杜陳劉盛唐韋栁王孟作而氣度音節雄逸壯邁度越於前者也而集大成者必曰少陵杜氏在當時如髙李岑賈亦莫之等焉則杜氏之於窮達欣戚發乎聲歌者有合乎風雅而足為楷法矣唐末風俗侈靡宋之稱善者蘇子瞻梅聖俞石延年王介甫歐蘇朱楊而已及元范楊虞掲輩倡遺音於絶響之餘直追盛唐一時禁林之儒生四方之士人莫不宗師之凡江東西之間言能詩者尤盛盖得乎已者髙而宇宙山川之大近而卉木禽蟲之㣲無鉅細妍醜之辨接於目者㑹於心其操辭運思若江海之奔而不可遏矣故代之辭人墨客以是名者駢華競秀櫛比鱗次及求之大章全帙可以躋古而式後者復幾何人哉然則三百篇之刪取雖出於庸人愚婦之言者其風刺美怨皆足以薦之廊廟禆之政化而王澤具存焉其曰詩既亡而以春秋續之則為詩者必欲繼其亡者焉是以後之學者苟不操源遡流發乎性靜之正資養之實務趍於模測雕飾窺古人之餘膏剰馥惟將和鉛吮墨剽獵纎辭騁駕於蘭苕月露之頃以誇時自足是豈足與言詩也哉余友楊君孟頊世以詩鳴余丱嵗嘗讀其伯父顯民詩惜不盡見今春延孟頊授業余甥采其言論風㫖恨得之晚且出其平素詩若干篇獲盡讀之及扣其家世其先自伯起者漢為名儒世稱闗西夫子迨隋唐多顯宦有名某者官江西某處因遷居進賢縣之水北里實髙宗麟徳元年也至宋有諱仲博者舉進士第擢長沙令轉江西漕運使而終又諱龍偉者亦舉進士為番陽簿仲父季子元為中書檢校遷禮部侍郎終贈本部尚書以是族日益蕃今凡居水北者二十有九世矣其學則祖叔能師宋監胄生見心危先生季輔顯民季子皆學於叔能率以家教相承季輔志識閑雅沖澹晚節亦慕道家縱閉之說延名師篤教諸子孟頊徳充而學贍其襟度辭韻清麗宏達法於杜而備衆體者也盖世為簮纓家其淵源之懿研泳之習有素矣予固知其不以顯晦榮悴累其中而向使列之英俊之林又安知其不可續清廟之音以鋪張盛世之述作也哉此亦其志夫國風雅頌之大者焉抑余無似退卧乎窮山宻林曠意風月寂寥之濵其淺陋良有以麗澤之又豈能盡知孟頊哉然感夫世之知詩者知孟頊且鮮况信能凌厲前古而與造物者爭衡也乎間屬叙於予情不獲辭矧俟於異日豈惟是哉許氏族譜序嘗讀周官書其小史之職奠世系辨昭穆以定邦國之制雖古無譜牒而嚴大宗小宗之法自宗法不修而尚門地由是而有譜牒之識焉斯所以昭穆不紊疎戚有别也然代之譜其宗者率欲光其先振其後凡得同姓而顯著者必將攀援附竊而成書雖自欺以取誇於一時而其尊祖明宗之法胥失之矣又何代夫為之後者此學士大夫之所不取也盖遡而上之莫得而詳焉是或有所誣也歟或不求門地之素風俗之淳而徒資産之厚聲利之熾則以巨室名閥尊尚之其於古之人乆近之别賜姓命氏之原尚何自而考證之哉髙陽許氏春秋之謂齊侯許男後也春秋之後無復國其後以封為姓按譜漢許氏侯者七人王莽敗始失侯東漢循吏許荆者其下為汝南人各有聞許靖為蜀太傅許禇事魏封侯晉許孜徵孝亷不起其後稱髙陽為盛許邵爵唐安陸郡公敬宗為龍翔相孫曰逺天寳之亂以義死宋祥符間許遂為將作監主簿許怡元為江淮荆湖兩浙制置使其後族大且蕃累仕于朝至某者由某官遷撫之宜黄因家焉是為江右著姓某於譚為世戚外兄碧淵嘗以其譜牒屬序焉予嘗感夫盛衰榮悴之理駸駸于無窮者一何甚哉幼聞故家遺俗莫盛於元盖以享國之乆㤙恵寛厚貨殖蕃碩凡其有休聲餘澤者靡不思以振復興起者焉故不惟奢靡豪縱之習而詩書之澤孝友之風猶彬彬間有之者矣迨今凡三十餘年運去物改一旦鞠為榛莽者有矣其亦消長之數信有定在也耶矧以學行世其家者非假譜牒之存以詳其支派之逺嬋嫣之自則祖宗之嘉猷盛烈曷有不顛隳者哉而能存其譜者亦鮮矣其若許氏之能善寳其存所推本者皆穹爵令望之士可謂敦本知自者焉惜乎未識用衡而於碧淵之言可徴矣是不辭而為之序贈御風子序世之具形氣者有生於無而無復歸於有故形載乎氣而氣御乎形也元氣運天地而隂陽行焉天之覆地之載日月之明四時之序晝夜之續鬼神之變萬物之衆其運行而不息者皆有無自相生化者也古之善訓人者惟使趍乎道而已知趍乎道則達有無生化之機矣然世之謂學者茍聲務華飾外忘内其於生化之有無又豈能潛求黙識也哉予居耆山中間遊鶴松下值一道者蓬藟翛然揖而言曰吾遊江海間乆矣嘗扣異人以金液還丹之道信夫列禦寇指尻輪神馬之説而有御風之神化者也吾雖未知能也其然乎其不然乎願有以發之曰風之為物也聲而不形蒙莊氏謂之大塊噫炁是焉其御也果有馮乎所馮者虚則何致福之數數然也所馮者非虛又何福之可致耶况數數也哉是故難免乎猶有所待者也孰若無所御而行是無待於外矣故乗天地之正而御六氣之辨以遊乎無窮者彼且惡乎待哉彼列禦寇之御乎尻輪神馬者乃一氣之往來無窮是託乎御風也果何待哉故其遊之不息非以邊涯可得而測焉况旬有五日而後返耶有息而後返返而未嘗不息矣特有之所以乗無無之所以御有也及乎非有非無而生生化化之機盡矣子之於學也必求夫天地之正六氣之辨修之於已日積月至而後形神炁化亦御乎尻輪神馬之無窮則風不待御而行矣其視致福乃吾無所用者哉舎是而欲之雖使飛亷列缺侍乎飇車霆轍駕乎雲道星衢尚何能御哉雖然凡造乎道者必去浮幻絶纎染形如槁木心若死灰視世之貴者為埃壤身之重者若土苴則其自待也輕舉天下無毫髪之足累其中猶馮虛而行不假於御而莫知止也雖天地之外不可以跡限之也矧子以剛勁之質叅究之學使洞視有無之表而遊乎逍遙之墟廣漠之野若萬竅之怒號衆竅之為虚翏翏乎之不聞刁刁乎之不見又何衆竅之謂地籟比竹之謂人籟吹萬之謂天籟也乎惟聽於無聲視於無形則有無之間皆一吹萬也斯求造物者之所馮哉而吾獨不得而至焉子其勉之道者因請以自號并錄其言而别送琴士朱宗銘序樂之所以致和也極乎天而蟠乎地行乎隂陽而通乎鬼神是故大樂與天地同和其感於物而動乃形於聲聲成文謂之音音之發有喜怒哀樂欣戚邪正存焉此君子之於琴瑟斯須不可去也故曰琴樂之統也君子所當御也盖凡接於耳目具於四體必禮以節之而琴足以閑邪滌非怡心養性是得乎性情之正焉其與夫鸞和珮玉雅頌之音無故不徹也宜矣其由羲農虞舜文王孔子而下伯牙屈宋之作也或感於憂思形於悲嘆放於恱懌始而淵泫沓湤劃然若怒終而颯爽激烈淒然若悲其急也風雨震而崕石裂焉其緩也波濤作而蛟龍興焉其大也騏驥驟而干戚舉焉其㣲也泉溜滴而蛩螿語焉此其千態萬狀不可得而盡也信能與隂陽相摩天地相蕩也矣在夫得之心而應之手也非習之有素不亦難乎且必得乎性情之正而後不失乎聖賢之餘韻也豈徒悦乎流俗之觀聽也歟昔之稱師襄師曠師文者其去逺矣其下損益者雍門周司馬相如蔡邕孫登嵇康桓譚楊收之徒各擅其説近代之以是名者惟曉山徐氏子方袁氏敏仲毛氏伯振楊氏學於徐袁而鳴一時者起敬冷氏是有江淛二操之辨後皆徐袁為宗焉予少嗜其學聞於通都大邑遇鳴於是者必叩焉其曰淛學者皆然而徒誇多競靡而已求其音節雄逸興度幽逺者亦甚鮮矣閩士朱宗銘氏師於袁冷其友也今春來遊吾山相與掃石鼓于峴泉之上其曲也調也皆清深雅淡雄逸飄縱信非誇多競美者比也采其論説必以得性情之正為要少遊四方多所資訪我朝國初首以薦赴京力辭獲還凡閩之巨室大姓更相延致之而其齒髪向暮乃得乎音之妙者宜非一日也然昔人謂之髙山流水者獲與之陶情寫意於風林月磵中矣其别去也豈不夢寐乎吾天籟雲濤之聴也乎而亦果何為黄鍾白雪之音也特恐均不能忘乎耳哉於其行遂抱琴鼓之溪之滸再鼓而不知其有離聲也乃序其槩以為贈遊仙巖詩序予嘗觀夫世人靜躁勞逸之異也其出處語黙必見乎性情之趍好焉是豈得强而至哉茍强而至又豈造夫趣之真也夫吾山仙巖凡居二十有四聞於四方乆矣由漢天師錬丹兹山而龍虎現巖因益名由是天下士人無貴賤老壯凡偶經特謁者靡不願一遊焉以是遊帆曳棹而往者歳無虚月矣洪武丙子季秋六日予偕館賔楊君孟頊仲氏湛碧吴甥汝緒侍遊者王景山吴處淵袁止安也命舟溪滸壺酒榼餚而發焉縱波衝渚而下不踰時而達是夕息巖之左曰演法觀乃漢天師祠也危臺傑閣髙出天際水簾斗壇丹竈芝巖交列左右相與偃息踰夕明旦發舟篙人指顧下上應接睇眄之不暇而泜島洲渚之間恠石異木幽葩竒卉穠縟重馥皆聫芳獨秀之可喜也頃而旋汀厯漵若㘭窪抵㟁之觸側竇隱隙之險惟鳥栖猱攀而人跡莫能即焉或依乎深林隘谷者漁舎隱焉或蔽乎荒榛野渚者樵徑紆焉是殆與武陵桃源不異也已而開罇啜茗􅑴流而下顛崕絶壁突怒而起者蛟騰豹躍龍襄虎踞俯首而伏者屏列障闢雲奔霧湧千態萬狀層見疊出而穴其嵌空眦者庖庾罍牖機杼梁堵畢具其間使人仰視慕羨心融神釋信不知其有人間世矣下視澄潭一碧靈籟四起而其干霄麗日排空而上者岌嶪嶻櫱惟巖峙谷聳蒼嵁綺錯而已逺而狂瀾淺渚奫泫渟㵾餘不知其有窮也乆之即巖下摳衣而上懸石萬仞若埀盖覆宇可坐數十許人遂陳觴羅爼而飲於是吟者歌焉琴者絃焉繪者圖焉盡一日之懽移夕乃已時天風西來恍若欲躡空駕浮而興不可遏遂命舟訪巖之右曰明誠觀者吴大宗師河圖仙壇也天且暮乃明火趨宿主祠者曰吴從善氏善日者術延談竟夕明日乃還所賦詩若干不覺盈袖成巻矣孟頊乃次苐成帙而告曰人生行樂耳今夫名山大川為仙真之窟宅吾聞有年矣不啻蓬萊閬風方壺圓嶠之勝也世之願一遊而不可得者多矣或聞而以為恠誕之誇而未之信焉今也幸遂一覽若安期羨門飛仙狡獪之適盡在目睫間矣豈不自幸也歟願序諸作之首以紀一時之勝集而遺之無窮也余不辭而歎曰夫開闢以來天地位而山川有焉兹巖也屹立曠劫曷有傾圮前乎千萬載莫知其閲廢興消長之幾何也其能同此樂者已幾何人矣後乎千萬載孰知夫能同今日之樂者幾何人哉然則羈馽軒冕沒溺氛垢或風雨之晦㝠人事之欣戚不可勝紀而不能從兹遊者其相去豈不霄壤之間哉矧是遊也且有詞章絃詠之樂視昔之赤壁剡溪之興亦未必多讓也其能已於言乎抑世之躁者思靜勞者慕逸其有得夫天趣之真否乎遂樂其請而序之還真集序仙道自古尚矣由黄帝問道廣成子世稱黄老盖廣成即老子也仙之説始焉若唐之籛鏗夏之嘯父商之宛丘周之王喬三代則固有之而周穆建草樓以延士其説始著殆秦皇漢武惑方士藥石之術雖有王次仲東方朔之徒而不知師而其邪説滋蔓淆襍卒以殞身則世之鴻生碩士並起而訾斥之亦宜矣若漢魏伯陽倣易撰叅同契本古文龍虎經而充越之於是丹道倡明不溺於金石草木雲霞補導之術一明乎身心神炁自然之理假卦爻晷刻以則之靡不合乎竒耦象數也厥後由鍾離雲房授唐吕巖則祖述其説而歌辭論辨庶得乎指歸之正代亦不乏其人焉若宋之張紫陽石杏林陳泥丸白紫清李玉溪李清庵皆一時傑出凡其辭㫖亦不下伯陽而互有深造黙㑹者焉夫相去千百歳之間何言之若合符節者不期然而然哉此無他千百世之理同也心同也其所以淆異者必邪妄詭誕之説非取誇於時必鼓惑於後其能果合於身心神氣自然之道乎此古之人必得人而授而道不虚行也抑亦非師之秘𤣥藴奥不妄啓示而學之者不累功積行之實徒飾虛文偽與馳聲揚耀者無異尚何足語道哉其能見諸言哉南昌臨江混然子以故姓博學嘗遇異人得秘授尤勤於論著予讀其言乆矣間會於客邸匆遽未遑盡究今春吾徒袁文逸自吴還持其所述還真集請一言予味之再信達乎金液返還之㫖其顯㣲敷暢可以明體會用矣使由是而修之雖上􅑴紫陽清庵亦未知孰後先也矧予嘗憫夫世之膚陋狂僻之習駁潰滋乆有莫得而盡絶者猶喜其言足以振發末季之弊也庶或志士貞人有碔砆美玉之辨焉則遊神胚腪馮翼之初煉氣混芒溟涬之表為不難矣是所以盡乎原始返終窮神知化也歟尚容招黄鶴凌空而下相與共論乎湘濵岳渚之間未晚也是書于編首以俟記蚊睫窩記吾里象山之麓綿亘數十里起伏百折隨其淺深逺近皆秀結炁融而幽室𤣥館必踞其㑹篠嶺最幽而甫近由嶺南行數十步至榆原茂林曲磵聲潺潺若環珮泉石幽僻而愈勝行不半里為朋山山之耆徳士張君如愚栖息所也以樂其勝與朋友共因以名焉洪武辛酉薙榛莽築草廬數楹環堵一室左右竹樹交䕃磵鳴鏘然丁夘秋予與如愚登龍井象山還即其廬指而告曰此吾蚊睫窩也予少讀列禦寇書聞老商氏之道其言曰焦螟羣飛而集於蚊睫栖宿去來蚊弗覺也螟至小而栖於蚊之㫸蚊非大而可容况其睫乎吾少志瀛渤視湘海不啻㘭水山嶽不啻犁土直欲遊乎無形達乎無隅栩栩而快蘧蘧而覺不知天壤間果何生何化而時其來順其去而已矣今已息我以老其放藪澤逃榛萊所樂也衣短褐食茂菽庇蓬室視昔之志者大而翫物小其大者若此况其至㣲者歟吾居窩中不知其幾年矣忘形忘物不知有短褐之衣茂菽之味蓬室之覆但存乎一息之㣲亦不知其居蚊之睫也亦不知蚊之睫果能容乎果不能容也耶予諤然若不知所止與之徜徉樗櫟之下坐臃腫之栂執支離之疏而歎曰予聞之損一毫以利天下去一毛以濟一世士弗為也子非不以一毫利物舎國而隱者歟畊者物之以其利而有焉故不以一毫為小也矧損我一毫無益於世世亦何用於濟此非聃尹禹翟所以異而不為也乎蚊之睫以一毛㣲於肌膚螟栖而弗覺此其忘於一毫之容也尚何損益之累亦無所用其覺耶然蚊之睫且望之不見聴之不聞惟心死形廢以神視以氣聴然後見之若崇山之阿聞之若雷霆之聲其能以一毫利天下濟一世乎始之不可聞不可見而卒無不聞無不見也其無形之與有跡之相去也豈不甚逺矣哉遂兩俱黙然莫知其孰為湘海山嶽之大而蚊睫之小也亦不知卧於樗櫟之䕃也惟栩栩而蘧蘧亦忘其何所從來復何所止也返而命其弟子執簡書以為記靜復山房記吾山上清宫之洞𤣥院居宫之奥地僻而林水最幽東則象山巋嶷其支隆然特起院據其㑹西則瓊林臺鬱然前則雷壇丹井在焉其重屋奥室皆畊隱劉真人元盛時所建也其徒呉尚絅闢堂之奥室以靜曰復命之㫖扁曰靜復山房一日請以記昔其祖張貴徳氏職教幕間延登覽焉凡庭宇軒户皆佳山美林不知去廛㑹而幽僻者也天光四明幽趣互發信足以凝神澹寥日造乎道矣而尚絅居是也不寓於水木園池之好不洽於塵垢凡易之見而獨志乎靜復可謂善矣夫學必靜而能復復所以靜也止者動之君闔者闢之根易之復也動初之體隂剝而陽復道之復也靜極之真夫物芸芸各歸其根若冬之藏氣所以培若夜之息動所以寧物之復也人不能復乎靜也萬變汨其靈府旦暮作息之頃意慮交擾機欲紛鬭動者流闢者散矣其體天地之運行順隂陽之消長潛於寂感之前發於顯㣲之際惟能審乎動靜賓主之辨外物不能窒其虛外欲不能蔽其明則洞達融徹周子之謂無欲故靜也若循天地之盈虛齊萬物之生化流行不息推符候以乗其進退抱㝠寂以絶其染奪然後若太虛之瑩而不翳止水之凈而不波此守靜之篤也然儒之謂誠之復也道之謂命之復也豈至幽至㣲而與天地參矣故非造天人一致之工未足盡事物本然之性也若翾飛跂行不能離乎靜轅趨軾憑不能舎乎動大而風霆之變江海之奔龍蛟之怪始寂而忽喧方往而倐返其來莫測其止無跡惟能養其至者所以備其神也乎抑余聞呉為撫之望族世以儒顯尚絅少穎秀質純而氣清余近職以文史力從山中及江海髙人異士究性命風霆之説其志篤於自修視古之超逸者其將輝揚先徳有不惟吾之所謂也豈徒使人歆豔誇譽之為足哉且學之至養之素久則神發其知妙著其用視天壤猶一息六氣輪轍八荒庭除不知遊乎溟涬胚腪之初觀乎沖漠虛寥之表非動非靜而與天為徒是豈一室之足居我哉尚絅勉之因記其槩以俟焉資深堂記吾里為天下名山川故士生其間必多出類之才而吾於黄君叔寅見之叔寅少穎敏有志習進士業值元季弗利乃止遂鋭意詞章而尤業醫時嚴胡稱精于醫皆師問焉是名一時余識之已年七袠與縉紳之士遊老且弗倦觀其論議譚諧常若無慮於世者其非有得乎學哉故其嗣孟律亦以學聞有司薦擢永平推官轉長州丞而歿其孫伯儀幼從良師學業克習嘗請曰某遷今之居也麈湖琵琶聳其前華臺之山俯其後東為古象西則雲錦若夫澄溪激湍層岑秀麓朝姿夕態舉在乎目睫間矣間蒔花卉沿畦圃或閲詩書之腴或佇林泉之幽適足以自娯而尤有慕夫為學之道以資深名吾堂願有以發焉乃復之曰儒之宗也孔孟孟氏之謂君子深造之以道欲其自得之也自得之則居之安居之安則資之深其㫖大矣蓋君子之學必造乎道乃所自得也非自得者皆外務末趨豈能造道也哉其自得也故居處之安固資藉之深逺則日用之間無往而不值其本逢其原矣夫乾之資始坤之資生此萬物之所藉也生生之不息係焉是心也乾坤之體同吾所資也深逺而乾坤始生之道存焉則安愈固而深愈逺是所以不息無窮也伯儀之蜚英騰茂已譽於人尚充所聞擴所知則仁義之趨誠明之則根乎心而備諸身矣養其生生不息之仁推其餘以濟之醫則得乎内者博外之可娯者皆所自悦哉抑世之所患者曠安宅而弗居舎正路而弗由故其所謂得者特簪組之榮紈綺之華寳金玉而違粟帛燕穹廣而陋卑隘其盛衰欣戚有不免焉其得之豈常也歟惟得乎已者可終身焉或不惟終其身將以遺其後而不失者有焉顧所持循之慎否乎矧古之人所以過乎人者非後之人異焉在乎守之篤行之著也伯儀其勉之則兹堂也䝉祖澤之逺據山川之美思有以光其所付焉則亦命扁之志歟予既交其祖若父尤與伯儀善豈不樂道之勵其進也遂為之記倪氏東園記江西為郡與閩浙並雄於四方故名宗大氏多出焉吾里倪氏始唐為鄉之大姓凡鄰境邑代推其盛子姓皆簪纓相續非他宗所及也先輩倪君晉明甫博學有智略少從鴻生碩士遊元季兵革嘗謀以寧鄉里衆戴其安暨天朝平一海内君誓以有年遂即所居之東園闢畦圃蒔花卉建齋曰慎獨齋之東象山雲臺巋然而特立南則麈湖琵琶卓然而隆起臺山華顛秀其後澄溪激湍帶其前竒峰偉岫之覽佳花異木之娯圖書之列詩酒之樂靡不畢具籬菊牡丹之殊品者時則遺親友以花餘乃貯之穹簷廣庭烜爛若綺繡年八袠餘尤培撫不倦暇日徜徉其間擷幽芳而䕃喬木聴逺籟而挹層岑信忘其居乎廛闠也余家於倪為世戚去東園相望不數十步若其幽勝雅麗嘗或濡其故家文物之流風矣間相謂曰余樂兹有年可無一言以紀之乎夫時之代謝物之盛衰今古若夜旦然若夫金張陶猗之徒誇侈於一時使後之慕者求其雕甍綺閣之華絲竹聲容之美相去不數十載逺而百餘歲皆為深榛餘礫荒煙白露之墟其能竟保其久哉是惟世徳之厚猶本植而末茂乃繁衍碩大之無窮也倪之系相傳數百載可謂悠逺盛大矣而東園之勝雖遭時變遷而卒宥其存豈茍然哉况君以髙年耆徳與乎喬松鬱柏齊其堅貞於嚴霜畏雪之表為其後𦙍者宜思以不墜其先業克昌其家他日客有過東園者則指而告曰凡其蔚然蒼者益固燁然鮮者益繁皆某祖之手植也可不慎䕶之哉則視昔人之特為耳目之悦其賢豈不逺矣惜余不足以發夫將來之志也遂書其所樂者以為東園記安素齋記西原汪氏為吾邑故姓其上世九膴仕學仙者有之以徳澤之厚族蕃而子孫多才也大椿氏循秀雅飾知嗜學尤為穎敏者間偕吾友龔君克紹請於予曰鄉里雖原野之僻而山水最秀若雲臺鬼谷逍遙峰諸葛嶺皆四面環挹清流曲澗抱其前層巒疊嶂擁其後腴田沃壤深池茂圃錯列左右某世居其地而近復增廣之事親之堂曰嘉樂堂之西屋數楹間凡山霏林靄朝姿夕態舉集於几席間而某慕學之久亦知素乎安適不事進取幸有以扁而記之余曰子知素乎安適豈非能安於素歟宜以安素名齋夫物生天地間自形自色皆禀其素有之質而榮落聚散乃若安於自然也人霛萬物而乃不能素其所有而皆有所役焉何也傳曰素其位而行素富貴行乎富貴素患難行乎患難是以先儒致戒謹防閑之工必操踐存養以底于成立者得夫素有則能安而行之安而行之則庖鮮飲醇不足甘其味裳綺衣縠不足麗其服居華燕廣不足悦其處金玉不足謂之富爵祿不足謂之貴則驕吝奢僻之習無自而入惟學之趨之為貴也是乃不汨於利欲不溺於嗜好所志者無非得性情之正其視内重而外愈輕矣故處富貴福澤之常遭貧賤憂戚之變須㬰不能動其心蓋一視得喪不易於常變而然哉抑其係乎天者具夫吾心同也其休祥否泰在已有以致之而後至焉茍能持於儉約謙虚心與天一是存其素有者得矣必充之以弗怠無俟乎外非安於素而然哉若然者家益固徳益厚學益充其光先裕後者又可量哉不徒已之安適而已耳大椿未知以余言然否乎曩姻且契情有不得而辭焉他日尚容登其堂觀其規制採其言論必不惟耳目之娯以自足者哉矧克紹得館授之賢足以資所未逮因幸質之余言也遂為之記妙靈觀記天下名山川古今真仙之名蹟在在有焉而大江之東西尤為仙真窟宅晉許旌陽興於豫章以地靈而法闡既祛蛟孽遺五陵八伯地仙之䜟嘗遊郡之建昌道過南豐州望軍峰之秀曰異日當産一地行仙也迨宋王侍宸以道著則其人矣按行實侍宸姓王氏名文卿字予道號沖和子世為撫之臨川人後徙居建昌之南豐今為縣神龜岡去縣五里而近大溪南環軍峰北峙支阜蜿蜒而氣集者嘗産異龜地因以名母夢赤蛇蟠於庭紫雲覆上因躡其首蛇奮起化黒雲騰空而去覺而有娠生宋元祐癸酉二月五日也幼卓異不凡事親以孝聞嘗為詩以告其父有方外志父歿辭母逺遊將度楊子江行野澤中雨暝失途㣲見若燈明前就之有一老嫗若為逆旅者得書數巻篝火燭之乃致雷電役鬼神之説因錄之紙盡繼以木葉雨止天且明乃息大樹下也及渡江遇異人舟中神宇超逸遂前禮之叩其姓名答曰吾乃玉府火師也今治華陽洞天子既得法當佐君祐民以應𤣥徴他日俟子於神霄玉清之天復出絳囊秘文以授之竟失所在已而還軍峰宻修大洞迴風合景之道飛神玉京遇徽宗駕於帝所顧目之進曰臣昔為三天都史掌文吏陶伯威降世為王文卿乃臣也會上夢亦然召侍宸林靈素訊之對曰臣向所奏王文卿是也即詔求之時方以法稱驗名聞江湖間累召莫可得間遊髙郵軍皇叔祖亷訪巡歴淮南且卧疾有請疾徐愈遂聞於朝詔真州守臣賈公望以禮聘之力辭不赴復詔道籙董沖元同監司守臣厚禮之乃行時天子崇尚道教入見以肖前夢問對大稱㫖拜玉府右極仙卿寵賚益厚每固辭不受時宫人疾詔劾祟禁中俄雷震擊白龜一上飲之酒拜太素大夫凝神殿校籍父肇贈承事郎母江氏贈宜人京師有狐為妖率祠祀之又黒鯉為妖奏詔劾之即築壇墠置鐵甕雷震狐鯉皆磔死奏建司命府於壇上未幾乞還上命修錬度齋於内廷若有現於前者上神之是年冬將有事於明堂雨命禱之立霽有詔奬諭拜金門羽客由校籍升侍宸賜號沖虚通妙先生加贈父曰承議郎母曰宜人淮南北以無雪來奏上憂麥以命侍宸遂雪麥且熟賜金帛辭不受盜起山東徒黨號巨萬累遣師不利上召見便殿以為言對曰請醮於内廷命神力助討他日獻捷者言交戰之頃天大雷雹賊乃潰上遂歸功侍宸轉沖虚大夫奬賚有差揚州守臣以旱告上以命侍宸對曰下民積罪凡川澤帝命悉禁惟黄河水可借三尺乃仗劍役之數日揚州奏得雨皆泥潦上悦侍宸知天運有變數以青犬之兆為奏請修政錬兵不聴遂請歸時三十代天師虚靖先生林侍宸靈素劉宗師混康㑹于京侍宸嘗請於虚靖先生甲庚混合之道深奬語之復力請還上繪其像親為之贊㑹金人犯京師欽宗受禪靖康元年賜還山將上道京師有於元夕為妖婦馮者來告亟與符遂愈暨還惟怡神山水間郡有妖怪皆頓息髙宗都江南聞侍宸猶存累徴弗起紹興二十三年癸酉八月二十三日為酒食召鄉里飲别命弟子視雲起西北俄雷震書頌而化既殮遂葬神龜岡舉棺甚輕蓋尸解云後或遇於龍虎川蜀其神化常莫測凡經籙科法秘奥之文傳於世嗣其法系者若上官氏而下靡不顯異侍宸歿數百載凡水旱疾癘禱之輒應是能福其一鄉而澤乎無窮者也元至順三年夏同知南豐州事蒲汝霖禱雨應上其事於朝時臨川道士唐樂真以法術承應内廷亦禱雨應復聞於朝加贈靈惠真君在元盛法大闡由樂真發之也洪武二十三年庚午予謁神龜岡時祠墓榛穢弗治遂命建昌之嗣法者章恢彦宏募官重構葺之彦宏志惟謹余仲氏彦璣克贊其成以洪武甲戌某月某日始工而是年某月某日落成凡殿宇門廡像設之具皆畢備仍題曰妙靈觀舊址在城之南久益廢曰更名是祠云其明年伐石請記其槩惟仙真靈化之跡所以相傳弗泯者蓋其至神與天地並行而不息焉侍宸之功行是也代祠於其鄉以昭其惠宜矣今幸易弊以新之孰知其神之不格降乎烟霞空漠之表歟異時一鄉之人將千百世䝉其靈貺神休之被又豈前之顯著而已哉主祠者必慎其操束善保其廢興以相承而弗墜也則其悠久尚何啻璿宫琳館之無窮期哉是不獲以蕪陋辭為之記正一𤣥壇題名記道書所載洞天三十有六福地七十有二而吾龍虎山居福地之一也山川雄秀風氣融㑹有非他山比者是以名聞天下為道門之洙泗東漢之季我祖天師以豐功神徳親受太上之傳肇業伊始而子孫世繼之今凡千有餘載自宋崇寧間遷真僊觀為上清宫厥後莫盛於元而上世之傳以正月七月十月三元日建齋於宫以傳經籙願授持而有請禱者居其首焉凡其澤幽濟顯則隨所請而從於首者禱之此其代傳不息四方皈仰之衆愈久而愈著焉余不敏襲教以來上際熈朝聖神撫運凡故家巨室願有請者歲無虚或聨驅並進不期千里而同者有之是按前製為之建齋三日而其齊明盛服通誠天帝羽節霓旌星裾霞珮敷闡𤣥範於陟降之間恪盡寅敬務竭孝感若雨而月霽晦而日麗嚴烈而風和皎亢而露潤所謂祥鸞瑞鶴飛繞乎上下祥風慶雲升騰乎逺邇時若有之而形乎夢寐見乎薫蒿皆精神之所感其祥祉之集禬祈之感有兆焉是蓋由乎神而通之其㝠合非可以法術徴測之也然而所藉者國朝之鴻禧祖宗之宏烈山川之神霛有以黙符潛運而至是又豈余之行能足以致焉因恐其歲月之久姓名無所紀載日至迷墜是倣古官署題名之製刻石于亭其氏名歲月之先後用昭一代之盛典非欲矜已之私以取譽於後世也抑其黙運𤣥機隂翊皇祚因以識之亦抑惟恐有弗逮焉間詢之故老曩嘗立石而後廢於兵燹逸不復舉矣亦甚有足慨者焉而四方之善士其睹夫是也尚必思夫吾名山之重天下在在聞之欲一叩而莫遂者有焉矧獲紀名於無窮也哉然其趨善之澤宜有以同躋乎不泯者焉頥萱堂記頥萱堂者九江衛指揮僉事孫君奉親之堂也堂成之明年以書介其甥彦璣屬記於予曰世為鳯陽著姓上世多顯宦元季兵興我先君以丁酉於揚州歸附上度江之初守禦嚴州戊戌正月克婺源再克嚴州以是偽呉張士誠寇盡平己亥克衢州庚子克和州討浦城䇿兵以應諸暨復應衢州攻紹興壬寅遷守金華再轉諸暨應建昌取龍游復遷金華甲辰取溫州五月以功除守禦正千户乙巳克桐廬富陽餘杭杭州悉平呉元年改除安慶衛正千户洪武改元戊申討建寧延平遂涉海道克蘭秀山捕松溪寇寨悉寧復守金華二年己酉授流官四年辛亥贈大父某某官祖妣某某夫人九年丙辰遷建昌千户十一年戊午誥授世襲武節將軍建昌守禦千户所正千户十七年甲子以疾辭某遂襲前爵二十年丁夘討贛州賴寨卜山盜平是年復廣東程鄉興寧長樂義化諸寨二十七年甲戌制下是年復以年深起赴闕擢九江衛指揮僉事二十八年復討廣西盜平守建昌時以女歸彦璣予觀昔之興於一時故皆雄特英鋭之姿必有王佐之才以成之若漢髙起而其將皆産豐沛光武興而其才皆出南陽是豈茍然也哉皇上混一海宇一時大將皆鳯陽故姓若千户公以雄才大略佐有疆土是其天將降大任於至治必假命世之資而後成其股肱心膂之托者焉若摧堅破鋭儁功茂烈雖亷李衛霍殆莫是過也此其家益大而裔益盛天之報施亦有在焉僉事君驍勇善騎射尤溫篤嗜學如弗稱廩祿養親以孝友聞三十五年克五開以天子嗣位賞賚有加擢河南僉事則千户公之善尤可知矣母夫人頥甘㫖於髙堂之上視子若孫累䝉眷知簪組相望世之至樂曷有逮此者也昔曾子之仕也三釡而心樂復三千而心悲蓋以願養而親不待也今君以厚祿穹爵以怡壽康之親而九江為地雄勝匡廬彭蠡森鬱竒秀冠于江左朝姿夕態交映乎几席之間承歡膝下化日悠永又豈時之所多得也哉予以仲氏某於君有通家之好而雅相善惜未能登君之堂而徒欲誦其榮遇之至者焉為其後者尚克謹其承世濟厥美而勿墜詩曰焉得諼草言樹之背惟公以之是猶無媿乎忠節之大也矣福慶觀記吾道之謂洞天福地者皆據東南山水之竒勝故非人跡所宜栖息而必仙真之奥區也信之玉山又曰暉山蓋嘗産玉而有輝因以名焉舊之宫宇益廢黄谷山始於道㑹李顔則也洪武十五年壬戌皇上聿興𤣥教詔天下府州縣皆設司以隸從道者吾山祐聖院李顔則以法術稱於人有司檄至命趨闕授縣之道㑹以董治之所未宜十九年丙寅秋予入覲間指示之曰溪南之峰特秀整下宜居必往擇焉道㑹遂旋登之遇樵者因問諸樵曰此黄谷山昔謂大王峰也其地去縣二里許崇亢聳拔髙可數十步山之半折逕而上有泉出石竇中布石為井曰冰壺徑左一石洞去洞數步有石若鑼皷状擊皆有聲石前近溪為大黄潭溪之濱曰功曹山山之下為龍洞唐相國閻公立本宅其東禪師貫休寺其西東嶽祠創寺之右即懐玉山也寺之北為三清山峰秀若筆立呉葛仙公𤣥暨徳興李尚書某修錬其間宋端明殿學士汪澤亦居其下青鼇峰拱列其北二十年丁夘道㑹乃剪蕪芟穢中建三清殿後為法堂堂之東曰紫雲軒若廊廡庖庾皆畢備翳以杉松竹柏風磴雲檐迂回隱約軒之前下俯鄽邑闤闠近接袵席間而其平洲逺水竒巒秀巘皆層見疊出於雲煙出沒之際惟身與太空為隣不知其有塵世信所謂仙真之境也余趨京還輒登而樂其成道㑹請以舊額合而命曰福慶觀觀乃宋侍郎韓公某創于鄉廢且久因復以名云玉山之東嶽祠也山水雄麗甲他郡由懐玉山之金砂玉龍洞為江東發水之源閩水逆出其東而風氣㑹焉故世稱其祠為泰山之貳余嘗謁其下必低徊不能舎去而黄谷山近在目睫間其爽塏幽勝不亞外祠是豈非宇宙清淑之氣發而為山川也待其人而後興焉矧道㑹光際天朝優眷非昔倫比其統隸乎一邑也必發揚吾道之𤣥徳靈休上翊皇祚於億萬年則山谷相與無窮期也使吾徒涵泳乎鴻釐之間雖居閬風𤣥圃殆不是過也後之繼者亦必是志乎則黄谷之謂豈非吾老子谷神之㫖也歟道㑹名顔則字自勗為番陽令族其秋還山状其實請記因嘉山水之勝是不能無以紀之翠㣲觀記撫之翠㣲觀道士嚴與敬氏間持揭文安公所撰翠㣲觀記其修創之顛末謁余文余未遑執筆今春謁南豐侍宸王真君祠道過翠㣲其膏田沃壤溪山迴揖皆層青疊翠蜿蜒十餘里而岡阜支麓起伏不已信風氣所㑹之佳處也按文安公記應真之山在旴汝之交是為金谿之南郡唐天寳元年有道士結廬其下扁曰谷林宋宣和元年賜額翠㣲觀元泰定二年住持周君應悌復撤而新之是為之述焉歲久弊陋元季已為榛莽之墟我朝國初金谿后車何氏以資力雄鄉里嘗延旴之南城延禧觀道士羅則銘住持延壽觀其徒則熊益謙嚴與敬也與敬於洪武六年請部牒度為道士七年禮部起充太常樂舞生未幾丁母憂還八年起服仍就樂舞員十二年以故得請賜還益謙則居青州齊府十七年道㑹疏延主翠㣲觀事二十二年則銘解化與敬厚塟之遂率徒黄用素李用光領延壽翠㣲二觀事凡殿堂廊廡多繕葺之三十年秋構亭山之顛松竹薈蔚顔曰翠濤且得文安公記於里之李尹誠所抑符其增創之志因重有請焉余聞古之仙真靈跡率據山川之雄秀所謂地因人勝者信矣吾郡山水豐麗莫過旴撫而翠㣲始於唐而興於宋元豈非地勝而人傑也哉矧獲託不泯於當世知名之士有如文安公者可謂盛矣而與敬以俊敏之姿善鼓琴繪畫其興創改作必尤有侈於今日也則主觀事為得人矣余豈不樂道其成而記之其山川觀宇之規制已備前記兹不復贅義渡記南豐之為州今為旴之上縣山水崇秀人物繁黟而商帆賈舶常往還為市其道則上通南臨袁贛下達旴撫閩廣而義渡適當其要衝舟不可不設也溪去縣五里而近溪上重岡疊楚引映若環帶北面軍峰之秀是為神龜岡也宋崇寧問侍宸王真君以道行之著受知徽廟晚瘞蜕其地而神龜之徴益名邑之賢良有鄒鐵璧者嘗受法于上官氏上官侍宸甥也已而復遇侍宸親授其奥而道亦顯時有知南豐州事王質嘗師事鐵璧及付受之頃忽雷震壇上鄒曰吾將度矣王驚喜遂傾資奉之鄒謝曰吾雲水徒也用此奚為王乃請以廣妙靈觀以祠事侍宸故舊觀在他里乃遷而新之以是凡旱澇疾疢者居民禱之必應懇謁者日至而渡猶病涉有不惟利趨之弗宜也是設舟於渡而亭其上因有以憩息之地焉元季兵興亭廢而舟亦毁洪武庚午春予嘗謁真君祠時妙靈蕪穢弗治是命旴之嗣法章恢募力新之工既畢歲乙亥復新候仙之亭設舟以為義渡且施水田若干畝以贍舟師而備易舟之費其為悠逺之計亦至矣而惻隱病涉之仁具存矣數徴文以記之夫義者事之宜也舟之象渙以濟不通此聖人於物取象之宜也雖凡溪渚不通者皆得設而濟之矧南豐為之上縣而神龜乃仙真之遺跡流澤在焉使無商賈往還之劇舟故不可廢也今彦宏推其慕道之心傳於仁愛其亦功用之勤且篤矣尤將托之以義其為悠逺孰大焉蓋義之所在㑹衆心而一於久者也衆必持乎義以成彦宏克紹之志尚何廢興云哉然嗣其守者必公是心以慎其出納則雖久而勿墜必資弊者可集守失者可易豈不仁人之惠無窮也哉豈徒便於趨謁之一而已耳予聞而樂其成也遂為之記詒善亭記吾山上清宫之寮院凡三十有六其源同而支異故毁而復興者有先後焉至正辛夘宫災越數年延焰而毁者更新之紫㣲李君仲冶作曠逸堂於丁巳冬巳巳歲復構亭堂之南友人周君孟啟為顔曰詒善仲冶揭扁於上請記於予曰吾鼻祖都監洪公始得於淛之紫㣲閣因號曰㣲叟宋天聖間入道於吾山嘉祐間知上清觀事度弟子王太素等時徽廟崇道益篤太素嘗侍天師虚靖君領祠事於朝寵賚有加及易觀為宫賜田畝蠲賦税築闕靖通庵成而院亦就因曰紫㣲者示不忘也派久益盛五傳為沖靖鎦公道著孝光寧里間宫賴以顯重元戊戌壬戌院災者二隱居史公倡諸徒擬新之嘗以上世曠逸金公有光於院宜揭號於堂致存思焉言未就而歿未幾兵興先師汪君伯清遷安山堂同草創故址間方如治命也而祖覺庵朱公嘗建𤣥潤齋以訓其後亭之建尤不忘金史二公慮迪之意亦將若覺庵之有所資焉故孟啟謂雖君之祖詒謀之善而君亦善繼之宜寘是扁歟非賴一言以警勉吾後可乎亭成余聞而善之仲冶具告其志此受托於其先者之盛心能無言乎抑心為身之靈府善吾所固有其或欲蔽物奪而有弗善焉茍能克已自反制諸外無移其内則善固存矣雖然仲冶學吾道者其以禍福之戒之為善則與孔孟荀揚施之事為者異焉然發乎心而復反乎心理一也是必抗節勵行汲汲於自修則蘊諸心而存諸躬者無不善焉則福不待希而集禍復何自而至哉然人人之宗祖期於將來拯於已廢者莫不欲善而福而後卒以不善而禍古今何紛紛也故凡為人後者視其先詒謀之善豈不甚可畏哉非慎持而敬守其可謂之能嗣乎矧仲冶敏厚而文於孟啟雅交厚是扁深有契夫望於其後也其必求諸實積深而培逺則不徒繼乃祖之訓亦以副孟啟之命於余言豈不重有勉焉是為記企雲樓記元運方興天地渾厖之氣鍾其餘於山川者一時鴻生碩士並起选出黼黻皇猷以成一代之盛典而遺澤流芳不世而益永者何其偉歟旴為江西大郡山川之雄秀人士之宏雅風俗之淳美他所不若也是時程文憲公以儒而登顯要光際累朝文章徳業之懿穹爵令望炫赫當世有如趙文敏公揭文安公胡僉事公皆一時以學行名者悉出公之門凡懐才抱藝紆朱曳紫之流多所薦拔者焉其言論文㫖雄毅贍蔚具見于忠節集晚以髙年退老猶時錫存問宜其鴻聲峻耀埀之汗簡光昭於無窮也哉公之子若孫簪組蟬聨代官翰苑故以名家顯宦冠於旴焉曾孫彦錫生於燕暨長侍提舉公南還少穎敏有文蓄先世手澤具存以元季避兵遷嘉禾因家焉得西南爽塏之地卜居之已而親老去旴猶數舎身不克侍養而興旦暮之思焉别構重屋數楹日以企望之因顔曰企雲蓋取夫狄梁公之義也軍峰峙其北神龜聳其南大江環於前崇麓負其後而麻姑芙蓉諸峰逺近映帶乃引流為池植木為林而亭其上若嘉禾之勝舉集於目睫間矣洪武丁丑春予因謁侍宸王君祠獲登其堂而故家餘俗藹然具存予之祖妣而下世戚非一日矣然而婣舊凋落豈不重予之感且喜焉間延覽于斯樓也屬以記予辱婣婭不獲辭夫人之營居室也率嘗娯山水之秀城郭之麗溺田疇之養植蓄之奉此特茍一身之資而已耳則托之得所用之有餘其志為足矣若斯樓也山烟水靄之出沒商帆賈舶之往來魚鳥之適花竹之玩皆足以悦乎心目發乎詠歌者也而彦錫眷眷不忘其親一舉目之頃猶侍親側可謂知孝之大倫而賢於庸衆人逺矣是猶見夫詩書之澤所有庭訓其所企慕之切有不惟梁公之望矣哉且提舉公嘗迎養于兹其奉甘㫖篤溫凊必踰年而後還得不謂之盡孝矣乎暨公捐館且斯須不忘時有松楸之慨焉抑上世之休徳嘉猷垂裕於無窮期也而彦錫之企慕亦將無窮也哉後之嗣人尚克厥承異日或復登斯樓其聲華之著殆不惟是而已哉是為記靈谷山隱真觀記洪之曰名山福地仙真靈跡之奥區者莫甲於旴撫而撫之竒勝必華蓋三真君居焉按傳記真君為秦人即古浮丘公也王郭其弟子焉往從之遊已而俱升真矣世謂三仙云靈谷山在撫之臨川三峰峭拔去郡邑三十里而近髙峻雄峙冠於他山山顛東有古牛石南則漉酒泉西為石門闗退心石瀑布泉北連文印峰山之半有南北二井水清冽不竭井傍立駐雲亭棋枰石靈鶴常集其下西南第二峰為謝靈運洗墨池旴江之水縈迴於前西若龍虎之麈湖琵琶雲林諸峰暨巴陵華蓋芙蓉軍山麻姑羊角諸山皆環峙互拱於目睫間其層見疊出一舉而皆仙都真境也宋大觀己丑冬十月山人丘祜樵于山巘遇星冠霞服者三人奕於地遺祜以桃奕畢叱祜歸徐莫之見祜及家越三載矣祜復往奕所掘地得陶燈器三香爐一衆異之即累為龕像三仙祀之疑奕者即三真君云正和丁酉道士易安寧始建觀其上請於朝賜額隱真凡民之旱澇疾疫禱之輒應元盛亦顯著累毁於兵旋復修創我朝衆日益繁而舉廢為多觀之張大順氏洪武十五年壬戌授府之道紀葉良貴氏二十七年甲戌授山川壇署丞或謂皆山靈之隂有祜焉而皆以法術名間請記於余余方退偃林壑有髙蹈逺引之志凡仙真靈異之跡豈不願遊而樂道之故不辭然余嘗觀堪輿家之言凡山川風氣所㑹皆合乎天之星曜地之精英聚焉是故扶輿清淑之氣所鍾亦豈茍然哉若靈谷之勝雖相去不數舎聞而未即而三仙之霛休偉貺在在有之其著於是也宜必與山川之壯同其無窮期矣士産其間亦豈非宿修預植而然哉良貴溫實夷靖知其必能大先業矣尚當挾冷風擷飛珮一覽其上或將有異遇焉乃記其槩以俟凝正齋記凝正齋者從兄用鼎名其燕居之室也其言曰昔元盛時我宗第宅之壯雄峙於閭里皆彫楹彩柱干霄麗日而東南莫之能儗也自燬於兵而向之穹廣者率為灰燼矣是構居故址之側丘園林麓環其中溪壑洲渚固其外其峰之卓然而秀者山迴之地之偃然而紆者逕縈之雖接闤闠而幽深自宜吾於是樂夫古之人謂小隱者亦未絶乎市朝也歟乃環吾居植以佳花美竹通以虚簷敞牖蔚然而翳菶然而滋舉足以娯目適懐乃闢一室凝思怡神以致力乎道家縱閉之工因顔曰凝正蓋有取夫易之鼎也吾曾大父三十七代天師希㣲公視先留公為之伯仲則某於子宜親且宻矣幸有以發之予聞易以道隂陽聖人所以極開物成務㣲顯闡幽者深矣大矣是豈易言哉夫五行根乎太極也隂陽判而為一竒一耦而六十四卦由之以變易焉鼎居二隂二陽而兆體於臨遁次革而受震鼎之象吉亨以木火從飪而足以享上帝養賢也以柔進而得中宜致亨矣君子之所以正位凝命者觀鼎之象端以正位止以凝命則正其所居之位而凝重其明命也必矣若初之顛趾三之耳革四之折足皆能無咎終吉蓋知慎所之也其二之有實五之黄耳六之玉鉉以剛柔節而無不利矣豈非命凝位正而獲吉若是哉是故天之明命自降衷而具夫人可不克修以致夫吉亨之道乎柰之何悖而趨乎凶者衆矣抑易之道有以見天地之至賾非惟鼎然哉六十四卦吉凶進退靡不然也是以聖賢必正心而後意誠正徳而後道凝道既凝矣其所以㕘天地贊化育成變化而行鬼神也者亦未始與吾道異焉從兄嘗以文學見稱而猶篤於致雨暘効鬼物之説求之於雷風相薄水火不相射鼓以雷霆潤以風雨剛柔相摩八卦相盪之機尚必資於易以充乎道也則其探幽致逺以盡乎窮神知化之工將學益深而徳益茂使予之慨乎族姓凋落者宜必有以振大之抑予之志乎退藏於宻者久矣尚當洗心以聴餘論或必有以啟之是記其言以竢桃溪丹室記凡山水之雄秀名天下者莫呉若也其地廣人繁最名者錢塘姑蘓江右則㑹稽上虞予嘗愧不能遍探力覽以盡其勝而昔幸托知於時彦或從而詢訪江湖之故跡閭閻之餘俗文物之遺風猶足以少慰凋落之感相去不十餘載舊交殆盡予亦退卧山谷志與世遺間涉乎經行目歴之地惟歔欷慨慕而已此亦古今代謝人情所寓之常也乎蘓之呉江有桃溪焉去太湖三十里而近東西洞庭二山不數十歩聨屬其上大河繞其前四面膏田沃壤南連沈漲湖東通驛河西接苕溪而桃溪縈帶左右長堤小蕩僅通舠艇而入呉氏世家溪上凡上世隴兆具據其㑹丹室則文剛氏所剏也嘗以記請于予曰世為汴人鼻祖諱充宋神宗朝入相其下數世皆顯宦六世祖諱思賢以䕶駕髙宗至臨安䝉錫田宅於蘓之松陵因占籍焉以是簪組代著而文剛雅不樂世味自髫稚慕道篤學嘗棄生業留志雷法鍼砭之術窮探博究束書千萬言猶孜孜㕘問不怠乃别居溪潯之幽日與清湍脩竹竒峰逺渚為之賓友可謂超逸絶塵者也夫士之窮達或出或處惟義之從初未嘗容心於其間哉然而存心養性之地必山幽木腴則穹若崕谷茂若林麓坻島垤伏汀渚迴合是乃崇其居環其室而栖焉則户庭之間檻牖之外有泉縈焉有池湛焉有卉菶焉若山之髙溪之深皆争妍獻伎於目睫之頃是乃心融神釋内虛而外暢足以潛心進道於寂寥閑曠之濱其視轇轕塵垢汨溺紛華者為何如也雖然文剛生貴富間一旦能舎妄返真棄末求本抑亦賢於流輩逺矣獨未知其曰丹室者果神氣之變化風霆之鼓盪水火之運行而亦金石雲霞之謂也耶然其得乎溪山之適心虚慮澄發而為法養而為丹何莫由斯道也他日浙水之西能以符藥已人疾疚者大其功用非文剛而誰哉因其志之足嘉也是書以俟充其未逮者歟歸明軒記凡士之處顯晦榮悴其窮達常相代也此古今之必然其少也血氣之剛心志之鋭凡耳目之嗜好事物之酬措櫛比綺錯於前莫非聲色勢利之競情慮交擾旦夕無須㬰之息其能少寧乎中哉及夫血氣之定心志之一其視向之膠擾乎耳目事物者如脱氛垢去桎梏所謂聲色勢利競乎情慮之間者雖燕趙之麗鄭衛之音綺縠藻繡之華旌旄車馬之盛舉不足以動其心則拳拳乎反身修已是務直欲絶紛華并峻鋭懲忿欲而日趨乎髙明正大之域其有不造乎充實光輝者歟雖然求能一旦舎舊習故染而思志乎是者亦甚鮮其終身溺而忘返者衆矣饒之安仁箬嶺張氏為邑著姓其先皆以儒登仕籍思禮之曾大父伯逺元以能詩與黄公均瑞張公仲舉並名當時大父子東嘗從遊趙文敏公善真行書父叔達值元季兵興以驍勇授職千户叔達以老辭冢子某襲未幾不祿姪某繼不踰年陞廣東指揮遂家于番之雙溪日有林麓魚鳥之樂詩酒足以自娯若忘乎富貴榮達者也雙溪據湖山之勝湖水周環數里丘樊墟浦挹其涯沍島洲渚抱其中其山之巋然而秀者湖泛之岸之穹然而髙者水帶之浦之窈然而深者阜縈之若夫烟雲起滅鳬鶩浮沈與波光雲影上下隱顯朝夕姿態舉集於几席間堂既成乃䕃以松筠蘭竹被以菱菼葭葦襍以魚鰕雁鶩望之蔚然而幽就之邈然而邃凡遊觀藏息之美悉專於是矣思禮乃闢一室以篤慕吾老莊氏之言日致力於虚極靜篤之工今夏過吾里與之道宿昔叙契濶間請顔其軒予告之曰吾老子之言曰用其光復歸其明子嘗從問乎縱閉之説夫以簪組之裔撫事有道是用其光也而能探乎操存之要是能歸其明也斯足以顔之夫老子之謂知子守母塞兑閉門者道為萬物母也得其母是子萬物也故知其子復守其母即返其本還其源也能返其本還其源必致塞兑閉門之工焉則終其身而不殆矣茍開其兑濟其事而不知返求其母則危而不救矣是以其所見者大小而盡其㣲豈不明哉所守者剛柔而去其鋭豈不强哉以其能見小守柔是以善用其光也故善用其光則必復歸其明用而不知歸乃遺身之殃矣此所以歸其明則造夫天地之始矣抑亦一隂一陽為之闔闢動靜往來周流不息内而守之曰道外而施之曰法何莫非斯也尚何縱閉雨暘袪劾鬼物云乎哉其有見乎是者必重内而輕外一毫不足以累其中矣矧思禮生豪右之門長奢靡之日能無浮侈驕逸之習乃知求乎返還之道也可謂賢於流俗逺矣斯軒也湖山之幽勝若有待焉而嘉子之志知樂夫靜逸也歟思禮勉之他日或道過湖上尚當相從於煙波雲水間叩其所願講者未知滄浪釣徒能與語是否乎歲寒亭記洪武三十二年春吾邑長史林君子行來佐邑事未幾有善政或謂其世業儒誠方正士也暨冬予朝京師獲㑹焉目其言論容止知其譽信矣頃以督務過吾里且告曰世為閩人年未冠為邑庠生甫四載居母憂服闋以薦貳教延平之順昌洪武二十五年謁告居閑憲府辟郡從事不受送京師達天官以故役淮西二十九年謫戍威虜某年以薦來佐邑事某之居塞垣蹈桎梏被艱涉險非一日也無異歲寒後凋之木雖難霜病雪靡不磨礪而幸不至摧圯今復䝉國恩食三釡之祿猶履顛危而復坦道也異日將以歲寒顔吾亭以識是焉請為記蓋士之處窮達得喪也必以其心志之不移行操之不改為難能也然求為士之道則固當然哉若夫平素居富貴處安逸事物之頃無不適其志意則雖抱道懐義之士猶未之見也一旦不幸遭困阨罹險阻事物之變無不折其心神而能凝心正慮以居而處之若平素無悲戚憐悴之色視去就得喪初無容心于其間者復幾何人哉若吾子行先後凡經危難得喪匪一而能攻苦食淡不改其志操而乃脱然若去榛棘而步康莊之衢遽爾際恩命於休明之世斯亦宜矣是所謂不遇盤根錯節不足以别利器也歟此其謂歲寒也不徒若世之士人有取夫友于松梅柏竹以契其孤髙迥絶而已矣雖然抑亦同夫四者之堅貞也當凝寒沍凍天地晦暝之際與烟雲水石相吞吐隱見於寂寥浩漠之濱惟冰霜並潔亦何異夫居洪濛之表也哉是所以盡其固窮守約之操益確而益固然後能蟬蜕人欲之私而春融天理之妙也然而隂極而陽生剝極而復至故易曰厲艱貞乃所以用晦而明也碩果不食君子之道不可消也此其致命遂志之道而能終亨也乎子行以學行之懿宜知之素而行之篤矣來佐吾邑也獨尚志節不為庸衆人之歸而澤夫人者已悦於民矣茍持其志之不怠異日之光大顯赫必若松柏之凌厲霄漢傲睨風霜之不可遏又豈暇顧競桃李之紛華也哉予方髙蹈乎穹山宻林以銷聲閟華為務亦若志乎歲寒者矣惜予無似不能有以發其未逮焉若亭之規制景趣以俟諸後記者孝節堂記番陽周氏世為宦族而在元尤多顯仕攻篆籀書名四方者伯溫父也公歴仕于朝暨出蒞江東海右其冢嗣克復公未嘗去侍側元季兵興克復之官山東道過廣徳值盜起妻子奔竄有女甫八歲背母失所向天下既定亦聲跡不聞洪武間番商人往來於濡者告曰公女曩以兵革流濡幸故契張光弼氏為妻許明道生子三人光弼且訓以孝傳女則克家有成立甫長知求父矣公驚駭悲惻久之己夘秋二甥彦升某竟走番迎養焉公且愕且喜詢其母年已四十有七明道早卒以節自勵明日鄉里婣故交賀焉公益少自慰已而與偕往焉父子相去數十年有死生之隔感慨留連道説故舊聞者莫不異而悲越踰年還番今年秋來遊吾山且告其顛末而復感愴焉曰子知我厚幸記之予不獲辭夫孝節所以勵風俗厚彛倫也予嘗觀劉向傳烈女自三代而下兩漢多善俗美教而貞順孝淑者代有之然能若曹娥朱女其孝行卓卓可稱道者亦鮮矣今克復之家世承簪組詞章之後其流風餘澤之薫陶宜有自矣使居庸下之質亦將有以覺焉矧其聞習之有素者哉其所難能也值時多難奔竄流離之餘猶能習詩書亟求父所在而苦節自持可不謂之賢矣乎且兵興以來若此者豈勝道哉而公幸以耆年而存生死一見則尤世所稀矣而光弼亦可謂篤於友義矣可無一言記之乎是書為孝節堂記澄清堂記江西僉憲林君子潤清漳右族以胄監生授職憲臺敭歴清要而有是命焉蓋由皇上御極以來勵精為治猶以憲綱為重以糾百司為要必遴選天下英俊之才任之此朝廷所以澄源濬流之盛典也子潤以成均令器遭際昭明足以展其涵蓄之素矣間道過吾里予獲承顔論挹其辭氣之溫動容之粹不大聲色而人知其為寛厚君子也今年秋介書來曰吾以澄清扁官舎之堂以警夫朝夕澄心清慮之志也子知我厚幸記之不獲以蕪謬辭惟君之志夫澄清者大矣予幸目濡而耳接矣其養夫内者若水之浄若鑑之瑩淵乎澄潭之不激浩乎長江之不竭不以泥滓而溷也不以炎涼而動也不以垢穢而昏也湛焉廓焉其清明昭晰之體莫非全天理之公而人欲之私不能蔽焉其見夫外者若陽春之溢凝冰之潔不以矯亢為能不以苛察為明而凡郡縣聞風慕誼而見之者莫不畏愛之也是以所歴之治必振風紀勵俗化而事無不舉無不敷也此其不踰聖君慎簡之盛心而抑亦善澄其源流無不徹之驗也歟然而天之清者氣也翳之則晦地之清者水也汨之則昏人之清者質也蔽之則昧物之清者性也誘之則喪所以聖賢之謂學也致戒謹存省之功惟養心寡欲之為難也子潤以充粹之質窮經好古之學已經明行修矣非發乎至清至明之善而能哉尚必濬流激濁誅强鋤梗而民必阜物必育矣則以子潤之才之賢施之廊廟去痍瘵之色回中和之醇其所澄者又豈一郡而止澄之天下宜無不清也亦豈昔之人之謂澄清者乎且堂之構俯大江臨雄藩鑑之於水滌之於心其所涵泳宜何如哉吾莊氏曰水浄猶明而况精神水浄則明燭鬚眉吾子潤可謂得矣則斯堂也他日豈不重吾民之思乎是有以知君之善不可以不記尚義堂記徽為文公朱子之闕里朱子繼孔孟不傳之學大倡濓洛之緒天下後世莫不宗之固其流風遺澤猶耿耿在人耳目而不泯者徽若閩尤最著焉是以其民俗士風習厚而義篤皆詩書之澤有所致焉亦宜矣程君彦亨忠壯公後也為徽右族世業儒大父德正父以誠暨彦亨三世以義顯其言曰大父徳正以坐事徙邊年且邁彦亨上書陳情髙帝憫之即詔所隸釋徳正還始其徙邊時坐鄉人與俱一日舎道傍鄉人夜飲酒家暴雨水大至行囊盡沒鄉人責償徳正償如數未幾至徙所病且死徳正棺以塟之鄉人子來省中道聞死狀亟返越四年不至徳正命彦亨負骸歸子復不至彦亨致骸其家人稱為長者從父以忠洪武間尹潮之程鄉幾絶音以誠趣其子往省不行以誠冐瘴險視之以道病卒于吉安時彦亨居太學員請扶柩還哀毁盡禮鄉里賢之彦亨官遼府長史博學强記有文聲王嘉其賢大書尚義二字以旌其堂使來以記屬予不獲辭夫世之於義者不代見之何程氏之訓其敦厚至若是歟自徳正逮戍能周其鄉人以誠復命負骸歸竟以視弟卒皆人所難能也彦亨獲生還其祖而後終父喪躋顯仕豈非天有以祐之而彦亨之食報也驗矣他日程氏之昌大又豈惟是哉蓋君子之所尚者莫先乎仁義之歸莫急乎義利之辨也觀其所尚則知所趨矣彦亨生朱子之邦其尊仁安義行之素矣矧以是三者徴之槩可見矣兹以經明行修以佐藩屛凡厥操踐惟義是遵是以受知賢王徳契志符其為一國之模楷非彦亨而誰哉予也銷聲遁跡退卧林谷抑聞而樂道之彦亨尚必以是為子孫訓則伊洛之慶其不在徽矣乎三峰堂記撫之金谿呉氏為邑著姓自五季而下世業儒往往擢髙科躋膴仕簪組蟬聨非他姓所及殆今才儁有文必曰呉氏其居曰呉塘新田曰吉原雖疎戚逺近之異而皆自呉塘支分而派衍也其地多據山水之秀或謂風氣之㑹而然歟予嘗辱交元厚伯宗獲讀其譜牒凡書翰文辭皆當時元夫碩士珠暉玉瑩煥耀几冊間信近所鮮見而呉氏何獨得此哉孟啟之居吉原也膏田沃壤去呉塘不半舎三峰卓然而起峻拔若筆立岡隴林麓環抱映帶中寛而外固溪流畦圃增濬益植回視雲林呉塘層岑疊巘數十里皆黛蓄膏渟獻竒發秀若不可遏孟啟築堂其間修篁嘉卉植焉泓池曲澗鑿焉良疇廣陌闢焉久之山幽木腴豐暢薈蔚日葛巾野服枕藉芳縟相羊乎喬林曠渚之濱惟岩霏谷靄朝夕應接于目睫間不知其有軒冕之足動乎中而枘鑿之足介乎外也以是教授鄉里有司薦弗就今年春從子從之遊始識之端厚謹愿言動不茍一日以記屬予予獲託知數世矣而孟啟且塾客也言能已乎抑予聞古昔之以文鳴且顯者非不多也而其名卿巨夫求其胄胤之逺克紹先緒之不替者幾何人哉是非志夫辭墨之學而於聖賢之謂返諸身心者求之鮮焉其能逺且大乎江右之學宗象山陸氏而求合乎考亭朱子者也呉氏世稱行修其於誠立明通見諸身淑諸人也久矣宜乎詩書之澤不徒衍迤于子姓而其淳風厚俗有以被其鄉里是以益久而益著豈不與山川之勝同其悠永也哉易曰履道坦坦幽人貞吉予於孟啟之素履見矣尚亦以是訓諸將來則後之登是堂者猶造乎朱陸之閫奥又豈聲利之足盡呉氏之賢也夫端本堂記饒之番陽守禦千户髙君旭瞻來守饒嘗顔所居之堂曰端本偕予弟彦衡屬記於予其言曰世為句容望族洪武初髙帝有海宇父某以武勲授撫之所百户未幾旭瞻襲爵廿有八年以功擢饒旭瞻質溫而氣和少嗜學一無介胄習予識而愛之宜彦衡相與雅厚也饒為魚鹽之地通江倚湖其河山之雄曠物産之豐庶城府之壯麗自昔甲於他州是乃闤闠輻湊雖洲島沍渚之間卑濕隘陋而屋瓦鱗集商帆賈舶簪盍襟擁此塵氛轇轕之不足恃也而其長江巨湖千里一碧波濤之衝激雲烟之吐吞鳬鷖之出沒與湖光山色下上聚散於天塹之表協逺瀨而凝遐飈朝姿夕態應接不暇舉集於几席間皆足以怡心悦目而與造物者容與蕭閒乎埃壒之外宜非弓矢狗馬之好所能過也而旭曕乃於是亦無所嗜焉獨有取夫周元公之謂端本者也可謂知務學之方矣元公繼孔孟不傳之緒於千載之下其立言垂世實秦漢諸儒所未造而濓洛獨得之而天之所賦若固有者萬世人心之所同然也其曰治天下有本本必端蓋端本誠心皆切諸身之謂也由家而達之天下在夫身修而已矣身修則本必端而心必誠矣豈曰齊之難而治之不易也哉矧本端者末必茂使致於治其有不足者歟則上而􅑴之聖人之道入乎耳存乎心以誠為之本元亨之通利貞之復皆誠之所以具夫五行之性也雖天地之大萬物之衆不能越乎是焉又豈齊治之効而已哉旭瞻於學優矣以纓弁之胄際熈洽之朝其有得夫本者信矣尚力行而不怠必以賢聖為之模準楷式則將見其大而忠君顯親以亢厥宗小而捍禦疆土克盡智略其不媿亷李之才必矣異日爵望之重可勝量哉凡其胤胄尚當以旭瞻是則焉予因其志之足嘉也是不辭為之記新城縣金船峰甘露雷壇記江右真仙霛跡之勝莫著於旴若南城之麻姑仙壇南豐之神龜岡新城則金船峰甘露雷壇居其一也峰髙踰百仭蜿蜒支阜數十里許去縣十里而近日峰削其前香山挹其後峰之顛為三濟禪師壇元至正甲申有為白蓮師者虞覺海聞閩之杉闗戴某延武夷山月閑汪真人禜禬有竒驗遂迎居焉真人姓汪氏諱道一字朝道世為信之龍虎人父文富真人生有異徴暨長超悟不羈丙子秋武當山張真人守清來遊龍虎嘗旅文富家一見異之謂曰是兒非庸質幸侍我後當為令器遂挾入武當守清授以金丹雷霆祕訣一語有省復往武夷禮蓬頭金公埜菴卒其業元季兵興閩多疾疫光澤杉闗為甚戴某黄某聞其賢首致之皆驗一日登髙歎曰旴之新城山水差秀麗吾當往焉未幾覺海果延居之所治輒神邑大姓若范張王劉者皆禮之于家以是凡雨暘疾魅叩之皆驗一歲三月不雨士民遍禱弗應縣令苗侯命釋道禱復不應時達嚕噶齊特黙齊獨延真人禱于靈山寺真人穴地而坐烟松葉為雲須㬰雨大注士民争迎之間乗竹輿從數十童歌呼而行雨隨至禱畢即火磚撫身自謂假以補真陽云縣北石硤龍潭深㵾莫測一日褰衣躍入竟日乃出衣不濡袂或問故語皆神誕厥後言輒隱異人莫之悟迨辛夘民罹兵燹言皆驗或復叩之黙不復語壬辰兵愈熾覺海延真人居三際壇登山右低佪久之見山勢竒絶曰此勝地也宜居之因藉茅栖焉其徒陳覺堅復欲募衆充大之真人笑曰焉用是為異日自有成者是豈久耶翌日果災隨復新之山素不泉或請之曰但居無憂也一日酒酣踞山隂巨石注酒其下曰是當出甘泉也旋命工起石泉奮出且甘冽雖旱弗竭因題曰甘露雷壇云已而或數日不食或一日輒累食人莫能測癸巳二月久不食惟飲荆汁數斗仍火磚撫身起謝衆曰吾從此逝矣乃端坐而化二月二十有六日也世壽五十有三衆瘞于山側其徒盧濟川居焉逮我朝洪武癸丑秋旴江李大顛同邑人黄徳繼裒略庀材度工剏正殿兩廡未畢工邑人裘可大募瓦石完之大顛從子道𢎞克紹先志禮裘為師力修飾之甲子建飛天法輪于堂後凡殿廡像設皆邑人江興翁李黄琛成之且甃路百丈以便往來復置水田若干畝以給衆戊午秋衆起藏塑飾事之像儼若生今年秋道𢎞走謁余文將伐石刻之余嘗聞於閩人曰真人居武夷時民有女疾瘵叩之諾命闢宻室抵足卧塌上女號甚踰頃蟲出於口疾隨愈時有為邪所馮亦叩之召健兒數十人以椎交擊真人欣笑若常馮者旋愈其怪誕神縱多若此惜未能盡述也予讀馬湘傳觀湘狡獪竒誕若投深淵踰日乃出自謂項羽召飲而酒氣猶逐人未之盡信今觀真人霛悟曠邁之跡不異於湘始知其言之不誣也嗚呼吾道之士一志於超脱幻化必外形骸絶氛垢其視埃壒紛華若蟻羶蚋腐乃一切屏斥卓然髙舉逺引而遊乎物初是以餓寒顛困不足動其中日與太虚溟涬為徒所適者惟恍惚寥廓而無一髮之可拘也故乃雲馭風行而乗天地之正御六氣之辨而超乎無窮與後天而終者其亦灝氣之專而然歟其真人之謂乎宜其委形若蟬蜕初不繫乎跡之存亡也兹雷壇之建葺飾彌備豈不使真人若遊神閬風𤣥圃間而或來歸也哉此予聞而樂道之後之人尚克謹其承使悠逺弗墜乃經始者之志焉易書齋記上登大寳之改元監察御史蔡公分按江西郡邑之間聞風嚮仰其摧奸剔穢不勞力而畏懾而乃濟以寛厚詳審以是民徳之是年冬道吾里余適蹈晦林壑獲挹其儀度貌溫而氣和宜有得乎儒先君子而然也且告曰吾家廬之舒城為邑右族嘗受易於先君子而學書於芒先生以是二者揭於齋居以勵志於學焉子幸有以發之予不獲辭乃作而言曰儒之謂學也莫大乎六經而經之所載凡道徳性命仁義禮樂刑政制度學術是非治亂隱㣲鉅細靡不具焉而潔浄精㣲莫妙於易疎通知逺莫盡乎書而易之本也順性命之理通幽明之故盡事物之情聖人將以憂患後世而作焉故其有聖人之道四焉以言者尚辭動者尚變器者尚象筮者尚占所以觀象玩辭觀變玩占者皆備乎吉凶消長進退存亡之辭也於是乎推驗隂陽竒耦之變化有以彌綸天地之隱賾者焉其至㣲者理也至著者象也孰有外乎是心之太極也哉必審乎先後天之謂也伏羲之畫而無文此易之本其精㣲奥宻必深玩力究而後知未畫之妙也庶有以合乎文立而理備者乎書之三墳言大道也五典言常道也其精一執中世為帝王相授之心法故二帝三王其治本於道其道本於心純其心以事天謹其心以治民其為訓模教令典章文物皆存亡治亂之具也必得乎心則危㣲之機可見矣雖易之傳疏自商瞿受於孔子五傳至於田何若漢之楊施孟梁丘賀焦費髙氏京房之徒後漢之陳鄭晉唐之韓孔率皆卜筮名數之説迨宋陳搏种放邵雍者出而後明夫理致於王弼之説焉而莫備於程朱則理象兩明矣然後四聖之心法足以開物成務者一旦昭晰乎體用一源顯㣲無間之極矣暨孔子刪書斷自唐虞以下秦火之餘孔鮒伏勝僅存於屋壁漢伏生得其殘缺作傳授之鼂錯張生張授之歐陽生至歐陽夏侯而劉向亦為傳後漢賈逵馬融鄭𤣥隋之王通晉唐之陳孔皆續焉而未盡夫道也逮宋蔡沈以朱子之授始發乎堯舜傳心精㣲之本經世廣大之用非徒記誦訓詁穿鑿模儗之謂也其體立用行必一本諸心焉噫三才萬物之理二氣五行之妙凡備於河洛範疇之祕者未有過乎是二經者焉茍有得乎是也雖官兩儀裕萬物以極㕘贊之功為不難矣豈特用之家國天下也哉今公以積學之懿由成均而登憲臺上際聖朝之運獻替補納將必盡其職矣至於本植而末茂綱舉而目張其振風紀宏憲度者皆已見諸平素所操而適於今日之用矣予也方退卧窮僻山益髙而林益深其孤陋荒槁尚何以塞公之命乎然公之揚芳邁烈方志於是他日之所造就尚可量哉抑何俟予之勉也歟姑以致予之願求正於公者以復焉且因自勵云杏竹軒記松為浙之右府且多佳山水士生其問皆有文聲佘友江西左㕘議胡公為松右族世業儒公博學有文洪武間有司以能名擢春官居無何官署東偏杏數本竹十箇益繁且茂公暇則適乎生意之悦焉上登大寳篤於為治以史事為先務首詔京之儒臣以行能稱者纘輯焉公預首選今年夏史成進奏間上悦寵賚有加陞今官予辱知雅厚聞而喜且幸未幾㑹於吾山且屬記曰吾曩居春官杏竹之悦子所知也其肯靳一言乎予方幸公之佐吾郡也豈不樂道之惟杏也孔子嘗壇而植之竹也淇澳之詩嘗以美衛公矣則之二物者豈不有取夫聖人也歟豈他植物者比哉蓋杏之質文而表華君子足以比言以暢其辭竹之中虛外直足以比徳以勵其操然杏之繁也當春陽既敷羣芳競麗力與穠艷郁縟争妍奪媚於和風煦日之際風雨不搖其姿其所悦者且皆遊士賞姬相與誇多競美於粉黛間也似與竹之静也值歲律冬徂霜雪沍凍百木零謝而獨挺拔森蔚凝蒼卓秀於寒烟肅露之表寒燠不改其色不逐浮脆摧靡其所契者又皆幽人介士相與抱道守節於清苦間也則與杏之濃淡喧寂將大有不侔者矣雖然而其材也杏可為棟梁為欂櫨竹可為管籥為簨簴則皆清廟之器也皆適於用也其植于斯也知幾何年矣何晦於昔而顯於今也其亦若有所待焉􅀈竹與杏京畿之廣何地無之而獨有取于公形之詠歌可謂托根得所矣今公上際皇明撫運豐亨豫大之時以夙徳雅望見推於名公卿間則前日杏竹之榮豈非今日之休徴也乎抑公也學聖人之道經明而行修其舒翹振華已名垂金匱又可謂托不泯於千載矣而公不假聲色篤於撫綏康濟使斯民濡公之徳化日躋於太和之域猶植物之育春陽而不知其盤根勁節之敷茂雖凌厲霄漢莫之可禦矣又豈區區佳葩美竹之悦而已乎而予之望於公者亦豈止是哉請記之槩以竢崇仁縣玉清景雲觀記撫之崇仁以山水穹秀道家所謂洞天福地者多居焉凡邑里皆浮丘王郭三真君顯化之地不啻數十區輒據風氣之㑹而獲悠永者也景雲觀居縣之西不數里而近巴山屹其前浮黎峰聳其後由峰之隴蜿蜒數十步觀建其支也其南則澄溪激湍北則方池涵碧平衍虚曠林木四翳雖居闤闠猶處山林之幽寂也觀創于唐景雲間因以是名既成額未之書忽一道士夜至篝燈大書而去筆光煥動急追之顧曰吾蕭子雲也其識之因珍飾以為門扁後危太傅全諷為州將奪寘黄田寨乃逸去蓋以子雲嘗為梁黄門侍郎以善書名後於玉笥山仙去而異焉舊懸大鐘一夕遯去漁者或覩溪潭間取竟弗起後鳴者開元二十七年物也殿設大爐上題旌陽許真君名相傳皆以為異云昔之穹檐廣宇自黄巢之變迄為灰燼顯徳間彭城劉元載尹兹邑乃延道士蔣道𤣥闢而新之道𤣥善科典祈禬乃復振焉遂謁前進士樂史記之皆開寳九年江南李氏未附時作也暨宋復興迨元道士黄養素力新之未仍舊觀其徒傅自成克相之洪武初以樂舞員召赴闕居祠宫者三十年辛巳春始獲請老還復新其未備者授教檄某法師采遺文以記來請予嘗謁三真君兩過其地今年秋復叩焉則刪薙榛莽建立殿廡曩之狐兔霜露之墟一旦豁然髙出烟霞之表是亦霛蹤竒跡晦於昔而著於今也殆亦有定在矣其非自成才能幹濟將亦終為荆棘埃壤也矣尚能使山之秀者益明水之麗者益瑩艸木之蕪蔽者益挺拔矣乎􅀈自成嘗受法於仙官傅公同虚究靈寳雷霆之奥尤以道術稱焉則他日之纘承先業者能不失所託矣後之人尚必是志焉則其悠逺弗墜也必矣又孰知其虚寥㝠寞之際不有若浮丘公者擷飛珮御泠風自華蓋巴湘之山飄然而來下也而其𤣥休霛貺其有涯哉可無以紀之也歟是次其實以記稽古齋記聖人於易則曰探賾索隱鉤深致逺以其精㣲幽妙也於書則曰稽古師古學古以其㣲危精一也皆所以致力於學焉聖賢相授其曰博學切問慎思明辨蓋非稽諸古以盡其幽㣲蘊奥豈足謂之學哉是雖孔子之聖猶曰祖述憲章而於夏殷之禮為不足徴也當是時已典籍散亡而况下逮秦焰之餘也乎故六經火於秦後多漢儒穿鑿附㑹失聖人之遺意者多矣其非稽探考索之能至哉余從子懋孚穎敏嗜學間請鄉先生楊君孟頊顔其讀書之齋曰稽古謁一言記之予雖志乎古其能以已之不逮而淑諸人乎然予聞羲農而下二帝三王為世至古為道至尊稽諸開闢之先鴻濛溟涬邃古之初六合之外不可得而盡知也自結繩書契以來墳典而下鳥跡蟲書孔孟之所述惟黄帝堯舜始太史所錄其稽諸載籍未之先焉柰何世之嗜古厭常之士鮮知求夫堯舜禹湯文武周孔之謂道也徒知寳夫三代秦漢之器若神農之耒耜黄帝之裳衣兑之戈和之弓垂之矢軒轅之鼎陶唐之鬲有虞之敦夏后之璜殷之爵武丁之卣伯乙之罍楚姬之寳盤仲之誥義母之匜崇磐離釡湯盤孔鼎桓碑罘刻岐陽之鼓鄒嶧之碣均所謂至古者也人得其一則緘縢庋置扃鐍祕藏若有神䕶而不敢忽極其嗜好者且求之故家大宅山崖墟莽仙蹤鬼塚竭其才力而取之不倦將以怪竒偉麗有足誇一世之雄而然也故雖湮淪磨滅破壊之餘愈弊而愈貴之也亦宜惜不能以是心求諸六經皆上古聖賢為道之要得之弗逺搆之弗艱返身而誠皆吾固有也古之賢哲是以孜孜屹屹不遑朝夕含英茹華研精毓粹於訓詁詞章史氏之末若鬻吕楊墨荀揚管晏莊列申韓騶慎之述屈宋班馬董賈商孫燕丹淮南之言靡不蒐羅纂拾攟拾離合該博㕘互以充其識博其趣焉庶將有以極其探索考輯之工也雖然而其汗漫浩漠雖皓首不能窮者有焉夫聖賢之謂開物成務也者將以彌綸天地之道輔相萬物之宜凡形諸六藝大而㕘贊化育立民命建人和皆由得諸心而措諸躬也必求濓洛闗閩之緒非徒事編簡惟操觚秉翰於佔畢之末以争妍取憐於雕繪剽竊之謂足也則不徒志稽古乎哉抑予家上膺祖澤世載厥美某知求乎古而不流乎貴富之習驕逸之趨則其度越庸衆人之歸也必矣尚必旁摉逺紹涵泳膏腴浸漬穠馥然後明體適用真知力行以觀厥成也則其所造詣又豈讓桓榮專美於前哉此予之望於將來也惜齒髮向暮日就荒落因嘉其知所趨也姑以是勉其進焉存有齋記浙東為文獻淵藪以婺為首稱其風習多尚節義知詩書是皆東萊吕成公之遺澤也故宋元以來鴻生鉅夫每産焉豈非山川穹秀鍾清淑之氣獨厚而士生其間必英鋭卓絶之姿皆沐其流風亦豈偶然哉其篤夫義者世稱鄭氏由五代迄今數十世矣一門之間藹然三代之風凡其鄉邦里閈皆目濡耳染其化焉馬君全初世簪纓家居諸暨去婺為鄰邑溫粹有文嗜古博雅曩官廣東僉憲改佐江右都司所至有能聲道過吾山且告曰某鄉曰雲泉山曰冠山山産石五彩其下為龍井旱禱之輒應岡隴延衺數百里自東海迤邐不絶越之勾踐嘗居焉東為陶朱山范蠡巖島夷井西則婺之東明芙蓉諸峰近在目睫間宜隱君子之所居也且於胡文定公為世婣而得究學於諸孫間吾師南郭黄先生為顔齋曰存有以勉焉願屬記予弗獲辭且存有之命大矣而世所鮮言者豈予之足知也哉然儒學自宋季以來多剽獵膏馥惟希利祿是趨其不知究濓洛闗閩之緒者皆然此世之所謂學也全初獨知求夫聖賢之道是亦成公遺澤之所薫毓然哉抑孔孟之謂存性存誠存心其揆一也吾之所受於天者吾固有之特知志夫操省之工則存矣茍失乎存則放舎而亡矣是以返身而誠不逺而復時有以致戒謹恐懼於慎獨明善之頃則塞吾體者充乎宇宙矣又豈若珠璣象犀金寳珪璧之為世所貴者惟有力者所可有也其好而不能有者雖歆艷嗟慕卒不能至焉彼能有者亦必窮力竭智得於囏危摧困之餘而吾之所固有者惟制物欲之蔽絶膠轕之溷則静虚而動直至正而明達不勞形苦慮而無不存也矣抑惟持敬矣乎予不敏願學而未逮其樂與全初講益者必習之著行之力則其所造詣當何如哉豈徒舒翹揚英角藝於仕進之途而已矣因以期於全初者記之并以自警云思植軒記儒之以世徳聞者予行四方久未之見焉其亦何鮮得也若是哉蓋君子之於學也徳為之基文以華之而已茍徳弗之修雖誇於文辭無取焉撫之金谿呉氏世為衣冠家族大且蕃重珪疊組蟬聨不絶者數十年矣而子姓皆以文鳴非隣邑他姓所可比儗斯非世徳之厚而孰使之然哉率正氏居吉原之奥由呉塘而支分焉間致書耆山中曰某家吉原數世矣其山之穹者泉泓焉谷之幽者木蒨焉池之湛者澗迴焉故凡軒牖庭楹之闢林巒隴阜之邃篁木菱蕖之茂鳬雁魚鹿之稠皆足以棲遲藏修以自娯適者也是不忘其先徳所致而然歟而旦夕之思為人之後者敢不求以承先啟後也哉然其所以克厥承者非植徳於將來復何逮焉乃顔吾軒曰思植非徒佳花美竹之玩叢芳異卉之悦而已耳乃所以永吾孝思也幸為記予辱知呉氏頗詳其能辭一言焉夫人之於居處也舎闤闠而宅幽勝多志夫隱約潛退而後樂之亦或非脱略榮耀而畢於無所用於世也乎是故其居也必窮經廣業以擴其體其出也無不濟其用矣豈皆曰忘情斯世而然耶且呉氏之居皆山舒水抱而其臨清挹秀也宜矣而率正乃不誘於外適而切於惟徳是植豈不賢矣乎且徳之積於先也施於後者可見矣後復思以植之孰不若木之根培者枝必掩矣未有本植而末萎者也是以植之力則已繁者愈茂而未孽者日滋矣待夫春陽既敷其豐暢薈蔚雖干霄聳壑有不可遏者矣一或弛於培失於植一旦霜露殞悴其摧折圮腐幾何其不為荒榛穢壤也哉學茍怠焉必徳墜業毁孰異夫是哉率正少警敏從鄉先達遊克志通經學古間試其所用也嘗尹湖之武康居二考以能聞于朝擢山西太原守未幾請疾還教授鄉里學者無逺近皆從之遊而率正怡情閑曠學益充而徳益懋未嘗無山水之適而獨懼夫徳之未植無以訓將來雖昔人孝思之感殆不是過矣為其後者必斯志是繼焉則其追逺之思無窮其克紹先徳也必亦無窮期矣是樂為呉氏勉焉而為之記建昌府武當行宫記旴為江右郡治之首稱且多名山川若麻姑之著於唐王侍宸丘河南之名于宋皆他所莫倫儗其亦仙真之奥區也歟武當行宫在府之南去步而近始南唐昇平間以隂陽家拘忌或謂不利午水之衝因以祀𤣥天上帝而鎮之且傳帝嘗降武當太和山示創於旴若有黙符云已而有司請于朝賜今額逮宋咸淳五年安撫使西郢程公飛卿命郡之延禧觀道士宋養浩主祠祀而朱沖虚繼之已而宋社既屋廢興亦靡常元至正元年辛巳翰林程文獻公鉅夫有聲于朝宫賴以振予叔母公之四世孫也施水田若干畝以祀其先大夫敬甫公而衆藉以安至我朝髙帝有海宇凡郡治釋老之宫總轄者咸新之時嗣領者則張太古危本初危大有利洞𤣥皆以行能稱於人洪武九年大有懼其創始之艱泯而弗舉命其徒王思㣲具顛末請文刻諸石思㣲善科典禜禬克志葺治凡象設法器靡不繕飾之增贍水田若干予少遊旴嘗即其地雖處闤闠而爽塏可栖息故仙真顯著之久其亦宜矣然旴之繁麗常甲於江右自宋元之更絫冒兵燹雖昔所謂大姓巨室鞠為灰燼者有之其亦造物者消息盈虚之常理也而宫迺巋然獨存廢興相續則上帝靈庥神貺信有自也若叔母昭祀之孝其不有所感而至焉今兹增益之備猶先志也後之繼者守而勿墜時能格神明闢氛滓以貯其陟降則儼然雲旌霞斾凌厲乎埃壒之表霄漢之間若旴之人必皆䝉其休矣則其宏久之規又豈亞於麻姑諸峰也哉峴泉集巻二
