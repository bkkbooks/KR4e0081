body:
  text: 峴泉集巻三明張宇初撰墓誌故上清宫提㸃樂丘王公墓誌予友王君樂丘卒之二月其猶子無逸狀君事行泣以請銘予辱知君厚義不辭君諱某字亦顯福州長樂人也王氐世為閩衣冠家君自兒時無凡俗志年十九以兄足事親請從道父命擇師龍虎山遂禮崇禧院李公見山性敦厚警敏公甚器之暨公營繁禧觀於溪濵未完而歿畢工而増大者君力也時予先大父太𤣥公遭際元盛任才慎許可以君淳謹命為侍職若吴大宗師之門南野毛真人盤中李真人皆聲耀特著俱勉進之晚謁翰林虞文靖公掲文安公於臨川皆美以詩文無何運移兵興壬辰聞四方溷擾以君善保持觀賴以存洪武初以租賦繁劇累以顛困嘗傾私帑力扶樹之尤汲汲以葺衰廢度嗣人為志故殿廡益拯徒不下數人他所莫及先君沖虛公嘗嘉其善欲擢用之君以宫才能讓一志閑曠間徜徉溪南麈湖琵琶諸峰間得勝地編茅為舎引泉為池植竹樹闢田圃日陶寫自得素不妄與人交鄉先生張公孟循周公白士獨相契善間過之必樂飲而告曰樂㢤斯丘真子所居也有詩若干篇因名其居并自號焉十四年春予舉為宫住持公謹不少怠以修治為己任僅二年辭老肆意山谷延名師訓育子弟營蛻藏于菴北暮齒雖貧窶接賓客濟貧困聞義樂為其敦厚每若此少通經史大義尤以古賢徳性行為慕或為古詩以自見盖嘗從山之有道者金公野庵何公心月逰時有聞焉晚則􅌼君子正周君孟啓皆雅相厚二十二年春予䝉上眷許新上清宫以蒞事非君不可是年冬致書千餘言强起之君倡義復出今年春有以觀役誣之者如京事明以疾卒於朝天宫九月某日享年七十有五無逸扶柩還訃聞悲悼不能已巳或謂舊塋不宜遷兆於其左以是年十月某日塟焉嗚呼予齒齠齓知君為温厚君子及辱交垂十年出輔教樞端謹自居處憂患進退猶一日也矧受知予家已三世其所推重宜有在焉惜乎既逸而出未久遽止竟以是而弗終于家乎然得其壽有其善是固不足揜也已其潜徳信不可泯况有請焉遂不辭而銘曰世逺道晦言益墜美質温粹篤操礪夙躋盛隆沐先惠克昌厥猶慎終衛晚蹈林泉絶氛翳𤣥樞振綱肅浮逝邈焉天逰廊無際刻銘幽宫昭百世故上清宫提㸃朋山張公墓誌有篤厚君子曰張公如愚諱迪哲福州長樂邑三溪里人也其先叔祖見獨公為教門講師㑹元盛輔翼居多公夙質慕道年十六以親命入龍虎山師事山外孫公于崇禧院越數年孫歿哭盡哀治祠墓且其時院徒尤衆公以亷謹稱有命俾董院事不踰年蓄廩有加衆恱服歲壬辰兵興上清宫烖院亦燬時各散處公嘆曰人生若夢泡父生師訓曷能忘耶請還省親墓且悲不能舎去雖奔走間未嘗棄書其里有觀曰朝元公先世所塋祠張氏系時兵勢浸隔因葺舊構廣門廡樹墉植木闢岩洞得深谷曰歸愚洞釣鰲石汲古泉日與文士觴詠其間時清碧杜公泰甫貢公來閩交益厚適歲旱邑請禱公嘿坐一室兩三日官庶神之居六年廼還先宫之推名者𤣥卿薛公蘭雪周公客翰林㬅石掲公詩士均瑞黄公公因師禮之由是詩文篆𨽻書俱精尤究儒釋家言若丹㫖法奥祕篆洞文亦極探討至正間山之有道者埜菴金公心月何公嘗叅叩之故其平素涵泳自得處得䘮未嘗改容而學且不輟洪武十七年予擢為宫住持僅四年請疾居榆原菴常瓢笠杖屨曠意林壑間雖樵豎值之皆疑為仙間尋流而入得僻奥地樂之結茅其麓以與朋共曰朋山庵室曰蚊睫窩因以終焉廿二年春予䝉上眷許募力新上清宫及還以公端厚宜謁顯貴者秋八月如京寓朝天宫請命有次辭翰尤動一時上嘗優問焉乆之謂弟子董仲璣曰吾志報公家恐日衰不能見宫新汝宜促還翌日就途及抵山不踰日寢疾予往視之語對如平常越二日疾且愈言别側卧而化閏月某日也生延祐乙夘享年七十有六以是年十二月某日奉柩塟于外石埉其弟子上官某等録其實告曰知公辱素厚之其學行不可以不銘􅂅有請予愴其辭且感焉閩世為詩書之邦公生世胄温厚博學予辱交有年不惟克輔教樞而講習居多惟其徳操之純無賢愚皆慨悼之可不彰其潜曜也哉是為銘曰張氏著姓族蕃于閩公稟天質學優行純被囏際盛佐弼温文發用𤣥造雨布霆奔師古克粹譽顯志敦出勤報功問下明君適還而逝厥真常存遐佩靈躅歸神峽原銘石斯立庶貽後昆故後軍府經厯周公墓誌洪武十四年七月某日後軍都督府經厯周公孟啓卒于官予適留京為經紀其襄事命其甥某負柩還越四月其昆弟將卜塟甥蔡孺敏狀其實泣以請銘予辱交厚誼不辭且其歿嘗告焉予悲不勝尚忍銘哉按公諱某字某姓周氏世為閩大族自祖某由三山分處信之貴溪遂家焉大父某以信行鄉稱長者父某隠徳有文母倪氏某書院山長某女公幼穎敏年十二三通書史能屬文有聲於鄉里讀書夜至漏盡祖母愛止之亦不怠時縣之北鄉聶先生義方以進士業授徒於家往師焉業成元季兵興弗利乃止鄉先生彭君孟恱明陸氏學為時所宗公師之久之於性理有得先生益竒之某年盜掠鄉邑伯齡遇寇死野曠罕人跡公冒鋒刃遍求得尸慟哭日夕哀不已聞者悲之倪氏先㡬年卒繼倪氏有男某甫五歲罹兵荒貲産䘮盡廼教授鄉里給衣食養母撫弟鄉里賢之居無㡬皇朝混一海宇郡邑累已才聘獲辭洪武十三年上遣冑監生持勅符求士縣以公薦入試内廷以文學授太常司賛禮郎公恭謹嚴祀事侍天子親祀引賛升降必盡敬及祀陵廟亦然處官舎甘澹泊罕與人接雖尊官顯人欲交卒辭十五年壬戌以父䘮未塟請歸得給驛還太常博士薛公為銘其墓暨入朝上命建湘府社稷壇壝其府衛官以朝使務盛饌以禮公公止不納惟掄材木善陶冶以勸懲之衆皆恱服工畢還朝御史驗裝於道惟書衾服陛見間上嘉其亷謹賜衣一襲十八年乙丑仍代祀皇陵居太常凡八年寮屬皆以敬慎推二十年丁夘蜀王守中都奉命佐王祀皇陵者再王嘉其誠篤命譔詩文進廼製詩以寵其還二十一年戊辰丁母憂營塟哀盡禮服除入朝未㡬授後軍都督府經厯秩奉訓大夫階五品居官竭忠盡慮朝夕無少怠常懼耳瞶多忘恐失職二十四年二月弟某甥某偕往省某歸勉留侍七月二十日奏給某官糧誤批上㫖復奏改正近侍紿以坐侵欺公歎曰吾耳瞶誤聽何侵欺耶及夜食浴就寐凡夜必戒僕𨽻報更漏五皷則入朝率為常是夜𨽻報四皷弗對駭呼勉急明燈視乃自縊死遺文置几上别同佐及旦都督木公以聞上憫悼之命具棺以塟九月柩抵家權厝享年五十有七以十二月庚申塟某所子二人皆夭死以弟某之子為嗣女一人適劉娶吴氏其詩文若干在朝曰容臺稾曰詠菜稾有軒曰詠菜素庵蘇公實記之故皆尊稱曰詠菜先生公少嘗從逰鄉之張先生孟循夏先生柏承學古詩文以才見稱及仕受知博士薛公文舉僉事謝公原功儒士戴公叔能皆雄扵文故學亦贍予及樂丘王公子正倪公交最厚嘗圖林泉結托素庵題其意云嗚呼公生詩書家少貧篤學晚際明主厯職清要日承寵光榮亦至矣盖其性度淵雅於文辭精麗不茍雖夢寐有得必起燈以書兩還鄉里遂論友好所益多矣惜再任將幕雖抱忠篤不克顯用而竟以懼終聞者莫不愴慨矧予託交之乆者乎强為之銘亦以致無窮之悲焉銘曰維學也䔍以昭其身維仕也慎以竭其淳維歸也誠以潔其屯遺徳有輝聲業斯振孰啓嗣人銘示弗泯故上清宫提舉矩菴胡公墓誌世生大有為之君其承運而際者多出類拔萃之才故協賛其成者亦必雄鳴潜躍之士豈非時符氣合而然哉先君沖虚天師國初受知皇上凡宫之稱才者皆佐以行而祐聖院胡公叔直披艱竭智之功居多暨予襲教尤協傳有年此天之所以啓𤣥教之隆而産是人以輝大之也代固不乏其人而豈不足方之其先者哉洪武二十六年冬以疾卒於京明年冬將營塟其諸孫李某狀其實以請銘嗚呼予若先君皆公輔成焉先君既往賴公以夙勲元舊足以傳焉方喜其康健豈遽衰者未㡬竟逝矣惟哀之無窮尚忍銘哉按公姓胡氏諱某字某號矩菴始祖諱某自南唐從歙避地饒之樂平梅浦因家焉世業儒為昔衣冠家暨宋擢進士第者相望髙宗賜里曰梅府淳祐間昆弟四人同登甲科是建聨登書舎鄉里榮之因以訓礪其族人公十五世孫也曾祖某祖某皆隠徳弗仕父某元皇慶間厯宣徽院使公仲子也幼穎敏嗜學即有出塵志年十五辭親入龍虎山上清宫佑聖院禮煥文朱公為師年十八度為道士弱冠卓立有譽尤究儒𤣥百氏之言善歌詩駢麗為時所稱若先輩李先生仲公前博士胡公士恭前翰林危公太樸鄉先生張公孟循盧公伯良夏公柏承宫之能文者董君蘭深柯君天樂張君鐵鑛皆所師友焉嵗己亥先君始襲教公披草昧每身任之無難色凡道家經籙科典皆綴飾之因命掌焉洪武元年戊申詔先君入覲公侍行越踰年又召凡禱祠禜禬問鬼神之事皆賛翼之禮部給符任教門掌書謹静有謀先君深契厚之十二年新本院十三年予䝉召首相行承寵錫如舊典十四年升𤣥貞文肅淵靜法師教門賛教法籙局都提㸃十六年皇太后崩有召予及道録建黄籙國醮於京之紫金山公職監齋糾劾有文衆咸傳伏十七年教疏升上清宫提舉其柔退謙畏常度越人二十三年予入覲又侍行奏建上清宫上嘉納之二十四年道籙司承㫖召赴闕清理道教公復相焉奏䕶符籙賜銅印示六品命公掌之廿五年秋以宫事如京十月十又三日示㣲疾終于寓舎生延祐已未九月二十四日享年七十有四其孫朱某侍側負柩還公職教幕㡬三十餘年侍行㡬十餘覲及新宫宇其協謀宣畫靡不致力焉若天師世家族氏譜系及宫之仙籍皆考訂詳盡其里之聨登書舎經兵盡燬出已帑新之擇族之良子祀焉又求當世名士大夫文以誌之予數擢以本宫提㸃力讓未遑詩文若干篇名某集以廿六年癸酉十二月十又三日奉冠劍塟里之夀春觀祖隴之次嗚呼予觀古之人身達而業舉足以托不泯也豈虛𤣥之教獨不然哉若公之遭厯前後於吾世有勲勞而文彩尤足著其緒餘此豈世之多得者哉是次其實而為之銘曰維胡之宗文徳是基公挺𤣥胄克賛明時被榮際耀實天人師嗣爵既襲曰傳曰持金科寳訣鵠斾鸞儀領䄂名山温言淑􅐾誣吝孰翳逰神天倪空歌靈音雲霞與馳潜徳弗泯昭于銘辭故原宗傅先生墓誌撫之金谿在宋季已稱士鄉予友傅君原宗生故姓家與予有文章交相聞十餘年凡兩接談必極傾倒文成必命從子槖以示焉方惜同輩凋落賴君未衰冀有以麗澤焉間為序予稾恨不盡以正其可否而有召赴闕未㡬歿于京訃聞哀且慟何天奪斯文之甚耶越二年冬將塟其從子某以狀請銘予知君為深義弗辭然豈忍銘哉按君諱匯字原宗永和白膳里人也曾太父某太父某父某世業儒皆隠徳不仕傅氏之先自五常侍公某由上幕鎮之五岡徙居是焉實唐文宗太和四年也以學顯者五百餘年而尤著於宋建炎間天下靡寜有諱安潜者集鄉丁仗義與里之鄧氏團結保障衆賴以寧五世祖字子雲號琴山為象山陸文安公髙弟某年登進士第授從仕郎建寧府甌寧縣主簿學者皆師事之尊稱曰琹山先生云君温厚明敏七歲入小學舉動異羣兒長習進士業從鄉先生葛公元哲遊先生目其文首曰簡潔不雜諸生莫傅若也學成值兵興然研㡬析微未嘗少輟元至正丙辰與從弟元藻同中江西鄉試時南北道梗不獲赴廷選乃止自是杜門克志古學從逰者益衆講說五經論辨昭晰時其里朱公元㑹師授吴文正公以文稱扵時君獲卒業焉是以文鳴洪武初天朝一海宇首崇學校有司舉為儒學司訓居七年琢礪有成歲無虛凡自撫之選者必曰傅先生徒也以是鄉試必禮君總之學者得一言皆矜式焉逺邇推重每若此廿七年夏有㫖翰林召儒士校書經孟子君預舉列七月朝臣馳驛起之即日赴京師燕諭者再退而注釋經傳凡客二旬餘君力居多某月某日以疾終于官舎執政者聞扵朝上嗟悼乆之賜衣冠以􅀈復御製文勅禮部遣官吊祭有司命下孫某載柩還朝之士人聞者靡不羨歎之君生元至治癸亥享年七十有一自號西堂小隠初娶劉繼室倪俱先卒男二人長某次某先十九年卒女二人長某亦先卒次某適黄某孫男一人某經義詩文凡五十巻以十月某日塟里之南山嗚呼古今以文鳴代者不一二人非學之者寡焉其在乎踐之之力授受之明也歟君以經行修明措之言辭視不難矣然居庠序樂育才儁足以充時之用晚節操慕有以副朝廷之眷其終也上寵悼之以文君為不死矣其潜徳幽光可無以發之乎銘曰維古之學兮粹乎聖經斯吾造之兮既裕而明有是而施兮足以訓後宜達扵朝兮蔚乎已榮卓彼南山兮林谷茂清啓兹後人兮昭于厥銘故上清宫提㸃了菴李公墓誌有學道而文之士曰李公仲冶諱𢎞範號了菴其先世居成紀唐為著姓李衛公靖之後也建中兵亂上世南遷新安有諱某者避黄巣於黄􅞁仲子諱徳鸞因遷婺源之嚴田南唐散騎常侍之後諱仕言宋嘉祐間復遷番陽之萬源遂𨽻番江書院儒戸十一代孫也曾祖諱夢科咸淳貢元祖諱又新元縣教諭父諱雷啓隠徳不仕公少頴敏年十三請於親從外兄金君蘭石學道於上清宫之紫㣲院受業史公隠居至元乙亥得部牒度為道士㑹鄉先生祝直清父創陸文安公祠于里之象山因從之逰仲丁與舎菜禮以是遍究儒道家言其秋偕宫之方壺方君叔祚吴君拜金公野菴于聖井山復從􅕋先生西州逰于鬼谷山請益朱公覺庵戊寅冬謁李先生仲公父跋板橋阡表因命萬源祖祠曰思堂是師事之吴待制養浩實記之己夘春覺菴授𤣥學嘗逰金谿之祈仙觀㑹黄先生殷士偕儒彦講學半山池上公極談陸氏本心之說或異之指曰此小鵞湖也至正辛巳奔祖母䘮適母疾且亟公奉湯藥惟謹未㡬母卒䘮祭如禮庚寅太乙天師張公命掌符籙辛夘上清宫烖公奉祖命新其院立紫㣲西院法𣲖其秋歸塟父于板橋壬辰兵興建策宫之耆儁舉義保障丙申避兵于閩䝉副都元帥吴按台不花咨聞東華天師保充延平路𤣥玅觀主領壬寅族議以元中仲子為公嗣甲辰以師命買田若干立儒道二書院時先公沖虚天師命掌宫之文籍丁未遷安山舊居於院之故址洪武戊申復買田附祀宗逺乙夘陞副知宫事屬院有出祖隴者公争於有司逾明年復入於宫丙辰作肇堂於琵琶山陽翼以文潤齋以祀親丁巳易隣院基以新舊構并建𤣥潤齋於西承㫖宋學士濓實記之詒善亭則予記也戊午預卜兆成復以白金搆水田市屋入宫以祀木主癸亥嘗嘉號𤣥文真士甲子譜序成擕孫侄拜萬源祖墓㑹族而還辛未陞宫之住持提㸃時朝廷以清理給印視六品䕶宫公掌之越三年以疾辭乙亥十二月某日公無疾適自外還徒且出既還笑曰吾待乆矣爾還斯往矣遂端卧而逝生延佑丙辰享年八十惟公少有大志有文尚義累從名師考徳問業而端厚篤實為時推慕故於出處不易其操予雅交厚非忠謹之言不相告也其匡賛之益不少矣丁丑六月某日塟里之山田諸孫狀其實請銘焉予知公為深義不辭是宜銘曰李盛於唐番為令族公質純明問學惟篤早味𤣥言嘉訓彌敦蒞職公敏拯毁復存廣業勤本以紹以葺克大儀刑耆耇罔及黙探道腴不疾而遺允式後裔永昭銘辭故紹庵龔先生墓誌予友龔君諱繼祖字克紹信之貴溪治南裏源人也君之學行修於身聞於鄉里信扵士君子益久矣家世業儒唐宋多顯宦而君温厚篤實有古隠君子風凡士之知言者皆推其性行純潔其上世受業予家君是踵之因獲託交焉若其言論造詣愈叩而不竭而似不能言嗚呼可謂成徳篤行君子也曾祖霆松諱某元漢陽府教授博學能文嘗輯朱陸二氏書為㑹同為時所推重及受知曾大父留公割地若干築室鑿池以居之遂遷吾里若道門𤣥典増輯之故漢陽勅皆留公力焉今藏于家世稱艮所先生其自號也祖某某州學録父某隱徳弗仕君少端謹嗜學甫長從鄉先生彭公孟恱究陸文安公本心之學盡通經傳大㫖涵泳精粹而尤切於躬行力踐也元季兵興遁跡山谷抱遺經蓁莽間謌誦自得潔身無事扵時人亦莫知也少孤鞠於祖母克孝既歿每言必涕下尤篤於友弟一門敦睦非他姓所及家素貧常教授里中洪武庚午始賓予家其訓育務篤慤間為古詩文蕳而嚴無何予以誣咎趍京君日禱之既還憂乃釋質素多疾丙子正月甲子以疾卒享年六十有六其疾亟也予往視之泣以别歿則偕諸弟弔哭賻紀其䘮妻張氏先某年卒繼周氏皆里故姓子一人某孫二人紹武是年某月某日塟里之城門學者尊稱曰紹菴而余與友生私謚曰純徳先生惟君之善學也去華反實視古今之言學夫聖賢者惟争妍競麗之務而戾扵行義之實也其賢亦逺矣故其隠顯出處志操不易舉不違乎本心之明也哉是以君子不哀其貧窶而樂道其徳業之固也夫友之輔仁不慎乎擇而能為身之益哉君扵予世契而交篤所謂仁輔而益友也能不思以盡夫道乎其仲氏克誠請銘于墓予方悲夫失輔也尚忍銘哉銘曰道逾晦經弗殞履囏貞克純謹志韜藏徳彌隠銘于宫昭不泯故道録司演法朝天宫提㸃曹公墓誌道録司右演法曺公以洪武三十年十一月十五日卒于京其徒吴某奔訃與柩還明年十二月某日將塟焉乃狀其實請銘扵予予於公雅相善義弗辭且公之持安扶危友誼最䔍吾道日就凋落方賴公有克匡輔者焉曩予免朝還期必再㑹遽爾遐棄遂不一面寜不深抱無窮之戚尚忍銘哉按公諱某字希鳴號沖陽子别號光岳道人世為番之餘干人大父巨川元以儒學授本州學正父慶善隠徳弗耀家世業儒為鄱之右族尤明隂陽家言公幼穎特不偶塵習貎竒古不常父異之命學道龍虎山師事仙隠院太虚薛公凡道家仙經洞籙𤣥奥靡不精究初鄉先生孟循張公伯成夏公皆師友之尤善詩歌時贛之紫陽觀元陽趙公以道行聞公事之謹盡究諸法品益名於時洪武十年秋上有祀於岳瀆北岳遣公代之明年復代焉皆有異徴十五年設道録司命下掄材赴選上目之知為純謹者授司之右演法踰年正一員缺公掌司事并授朝天宫提㸃公性素純䔍尤慎于焚誦雖寒暑不少怠衆遵服之故扵禜禬之頃無不應上益嘉之二十五年公以宫之玉皇殿弗如製請於上勅官新之未㡬復廣三清殿廊廡三門畢具二十七年春賜洪鐘一二十八年賜夀星像凡若干軸其年大祀命分獻天下神祗廿九年分獻南岳三十年分獻厯代帝王歳如式是年春宫中有初育兒夜輟啼勅内侍索符夜即止上嘉其應每譽于朝廿八年以科典試天下道士悉度以文未習者命再至人皆徳之居職凡十五年世累一不繫其中凡道家内文祕授若太上實録𤣥史皆捐貲廣其傳四方聞者尤歆慕焉盖日潜心虚寂處已斂約有髙視逺引之志云故於易畫動静亦善知來也多寢疾自視若常卒之前三日㑹賔僚酌酒極歡語若有違世意衆異之未㡬示㣲疾終十六日左至靈吴葆和聞於朝上嗟悼乆之即御製文遣禮官祭於宫遂殯焉執紼者以千數時人榮之是年冬吴某達京至靈亦聞之上悼之如初賜楮若干為道里費生元辛未十有一月十八日享年六十有七塟里之通真橋某山嗚呼公生詩書家是於𤣥學之有聞也洎官于朝遭際寵榮雖一時之穹赫者之所弗至而王公貴卿皆以敦厚禮之其終始暉耀若此亦宜矣及柩還而上眷不已賚以内金當是時能䝉眷渥之厚迨此復㡬何人哉吾道孰不光焉是宜銘銘曰有文之裔克志虚𤣥洞篆天章志純學淵夙被殊渥昭祀名岳旋佐道樞益範先覺於皇聖神寵錫駢臻繒衣紈綢嘉譽如綸奥論宏㫖廣探宻啓霓盖雲珂式降繁祉巍巍貝宫厥跡孔隆帝曰俞哉鎮以金鏞榮煥其逝神應斯契刻銘幽扄永昭百世故岳州學正倪公墓誌吾里大姓世稱倪氏為右族其紆朱曳紫者蟬聨櫛比他所莫及也非徒簮組之誇詩書之澤亦不怠焉故扵予家為稠戚而先輩儀型猶扵黙菴公見焉公諱日新字晉明號黙菴其先真定稾城人唐尚書右丞若水之曾孫康民避兵南徙保歙之祁門官兵部尚書贈魏國公子匡義為常之無錫令子亞昭宗時為信之雄石鎮鎮遏使鎮今為貴溪縣累官至銀青光禄大夫御史中丞贈奉化郡王家鎮西之仙源鄉即龍虎山也歿塟其地乆之族大以蕃以是名倪王里迨公十七世髙祖應雲宋沿海制置司叅議曾祖南杰得朱陸㑹同之説元授徽州路紫陽書院山長祖以忠舉遺逸徴弗就父志文善易學授饒州路初菴書院山長擢鎮江路儒學教授母張氏黄岩知州張公與韶女也公幼穎敏始就學不伍庸兒即岐嶷如成人徴士公每鍾愛之建家塾曰溪山書塾延鄉貢進士祝先生蕃逺甫修明理學公從之逰日益有得作堂扵後以奉親學且有聲湖廣叅政蘇公伯修舉以茂材異等授岳州路儒學正以養親辭未㡬祖若父俱殁始有仕志值壬辰盜起衆推公招義保障鄉賴以安雖奔竄山谷凡先世手澤必負與俱甲午嵗大歉周貧困以粟丙申秋江淛行省以偉迹聞授武略將軍浙東宣尉司僉都元帥同知慶元路總管府事檄下公曰天已厭元用是奚為遂不赴皇明有海宇公年日益髙乃屏跡弗耀即所居之東植花竹闢園池顔燕息之所曰慎獨列古書名畫彛鼎之類風日和美每徜徉自得尤善博雅素不妄接人若井巷浮薄者妄慢之終不屈翰林危公素鄉先生張公率盧公貞夏公衍皆師友之賓至清談竟日一言不及世慮皆尊稱曰黙菴先生云洪武二十八年乙亥十一月二十又二日寢疾終生宋延祐辛亥九月二十又三日享年八十有五娶金谿周氏先公四十年卒子男五人長易以賢良舉授髙州府茂名縣丞調湖州府知事階將仕郎幼厚授䕫州府達縣尹階承事郎皆有能聲次時暠昱必皆先公卒女一人適劉素孫男七人昻旦昴景愷晁隆昻為縣庠生俊敏有學孫女七人曾孫男五人政理信憲徳曾孫女一人以戊寅冬十二月庚申塟里之長湖山先塋之側持其族叔祖彦敬所狀請銘扵予予扵公辱知厚義弗辭曩公嘗告曰吾老且病異日吾墓非子誰為銘予謹諾矧諸孫之有請焉而里閈凋謝莫斯為甚求公之孤風逺操他莫之倫九原不可作矣誠可悲也夫是銘曰繄倪受姓邾武子稾城儒宗蕃左史柝圭儋爵曜珩玘維公淵靜而山峙披艱摧兇保閭里夷猶卉木誓弗起龎眉鶴軀安足止子裕孫謀才檟杞清白爾模慎無弛確懐雅操慨流駛刻銘幽宫著千䙫故神樂觀仙官傅公墓誌龍虎之稱福地也為道家之奥區凡學道者皆名宗美質斯足以翊輔教樞者焉神樂觀提㸃住持傅公諱某字若霖號同虛子撫之金谿人傅氏五季為縣著姓大父文二元學録父艮齋廣東路教授公幼穎敏有出塵志甫九歲艮齋命入山之崇𤣥院師仁齋馮公習道業既長通經史尤嗜符法凡𤣥科真典靡不該究年十五嗣洞𤣥法扵性安吴公事之敬謹盡授其要元辛夘旱公黙坐間若有神命其出乃登雷壇召役天雨已而有禱􅂺應復嗣天章靈寳法於復齋戴公公以夢號為驗徐得之乆復得黄發二字復齋異其符遂悉授之是年職宫之𤣥壇書記凡科典訛謬者咸正之丙申冬本院灾公之祖與齡祝公寓居東山家益貧公養之盡志既祝歿公以髙道留京聞訃還塟祭盡禮庚子夏復旱禱亦應教檄授教門掌書記法籙局書記兼靖通菴焚修乙巳秋捐已資新本院録諸徒相先君沖虛公入覲燕賚皆預之洪武五年壬子先君入覲有㫖選髙道侍祠以張鐵鑛黄象南留京六年癸丑公亦應是選居朝天宫數召對錫燕者再嘗應制賦詩講道徳經修較道門齋科行於世教檄且授教門講師禱雨雪復應凡侍祠八年寵眷有加十三年庚申冬請老還十五年壬戌詔設道録司復召赴闕以老辭是秋孝慈皇后崩召予建黄籙大醮于紫金山皆公賛恊之十七年甲子教疏授洞𤣥文素貞靖法師教門髙士龍虎山太上清正一萬夀宫提舉知宫十八年乙丑有㫖扵龍虎三茅閤皁三山選道行之士充神樂觀提㸃僉推公應召赴京上恱授格神郎五音都提㸃正一仙官領神樂觀事勅禮部鑄印如六品命掌之仍依階給俸公固辭乃已十九年丙寅正月三日大祀南郊公𨗳駕趍前上頋曰卿年幾何公對曰臣年六十有五又曰卿出家年㡬何曰時甫年十一上笑曰誠老山人也每歲乘與大祀輙道拜于前上必呼曰老仙官及還目送者乆之是夏六月有㫖免朝二十六年癸酉教疏陞充本宫住持提㸃二十八年乙亥上致齋别宫趍召仆地上憫其老賜還越五日頒誥奬之暨辭闕上眷餞之居神樂者凡十年䝉眷如一八月及山始任本宫提㸃逾年謝退恬養自適捐已帑新鐘臺樓作歸来軒於院南己夘夏六月公遍謁謝語諸徒曰爾等善自立吾將返吾真矣未幾示㣲疾端坐而逝七月二十有一日也生元至治壬戌閏五月八日享年七十有八嘗於石硤原築藏蛻所建祠曰老山人庵前翰林編修蘇公伯衡實記之故凡當世名卿碩儒若翰林宋公濓中書朱公孟辨皆相善咸美以詩文公能詩鼓琴有觀光等集若干巻其徒李唐真以明年某月某日塟焉狀其實請銘於予唐真䔍厚善繼其志嗚呼若公也賛輔我先君暨予二世矣其嘉猷善跡居多敢不諾而銘諸抑公遭際寵榮發揚道典始終之眷弗替及以老而歸夷猶泉石樂天而終豈世之所多見也惜公之逝予方卧疾不能問弔之豈不慊然而悲乎銘曰撫在五季傳為令宗公生盛元道器是充早受𤣥㫖揮叱暘雨克禆教模累祠皇坻宸眷益曦祕宫鬱巍啓奥演範樂音禮儀匪曰優耄殊恩彌造言旋故丘鸞躍鶴導再宏祖庭金奏孔鳴髙逝悠邈永昭斯銘說太素說子列子之言曰有太易有太初有太始有太素太易未見氣太初氣之始太始形之始太素質之始氣形質具而未相離故曰渾淪渾淪者萬物相渾淪而未相離也夫氣形質之始隂陽未分而體渾淪分則竅鑿而混沌死渾淪者離矣然三者常包括終始環互栖伏外若離而須臾不離於消息間者去渾淪未嘗逺也盖氣行乎天地者為風雨霜露山川谿谷具乎人與物為四體百骸雖飛潜動植一本萬殊皆囿扵形質者也未見氣之始固莫得而測其備於質者可得而窮焉天之蒼蒼太虛澄澈其正色也而晦㝠變化起扵倐忽蒼蒼之色遂翳然非晦㝠變化不能盡其在天者矣人稟氣質之正其情熾欲濫則剛柔善惡著是漓其淳襍其粹湼其潔若質之素則駸駸乎混矣然非剛柔善惡亦不能盡其在人者矣物皆然動靜往復均不嗇焉故物之質者非文飾不華味之真者非鹽蘖不調音之澹者非律吕不和此物性之必然也人之所以必懲欲復初而後淳者不漓粹者不襍潔者不湼其清明之體昭昭焉具矣是足以見吾剛柔善惡猶天之晦㝠倐忽其本質之素未始有動静者焉雖然世或持其說以自修特養素而未能逰乎太素非逰乎太素其能見質之始乎抑質者常華者弊質者汨人華者恱人志夫道者必去華以返質能返乎質則慮精神明表裏貞白萬物渾淪而不離是非見其始哉君州武當山五龍宫髙士練君太素學博而行端居吾山二十餘年持踐克䔍常静處一室不與世接昔先君常禮之及予襲教凡吾道家言多所資究焉是豈不能逰乎太素而獨若然哉今秋欲還予固留不可因謂曰古今名山川必仙真所居皆所栖息亦何限乎是歸也然予聞是山竒秀冠天下豈無若安期羨門者潜逸其間太素其將徴㑹焉以廊其渾淪而返乎溟涬之初外乎形氣之囿尚何求乎質之始歟扵其行并合其說君喜請書以識别純一子說旴江張彦𢎞氏家世著徳望予去春謁西山華盖道旴而還始識之愛其姿純䔍因語焉知求吾道言尤切嘗以純一子自號值還未暇論也今春來逰吾山予同弟彦璣與之逰龍井觀麈湖琵琶雲臺藐姑諸峰之秀濯狂瀾坐磐石若與天逰莫知其人間世也彦𢎞因請曰嘗告以純一子之號今獲侍兹逰敢請發其義予指水而與之言曰水静物也深源窮壑泓一澄掬及發其窟怒騰躍百折下走不知其幾千百里大而江海小而溪谷觸石則怒激風則鳴雖遇棘而塞遭穢而濁魚龍宅其深林木翳其幽風雨晦其潤無能禦滯之晝夜不息須㬰莫可遏者其勢之所遇然也扵其體之浄明非棘能塞非穢能濁無不容而無不燭者元氣行之道之所謂法者本諸氣水行天地間猶氣行乎身動静往來一呼吸之頃盈虛消息具焉人心制乎氣本净且明其虛靈昭昭若泓澄焉惟其徇欲而蔽感物而動稍不加持治之功其役扵外者顛仆交錯猶水之窟怒騰躍勢不可禦其氣散而為思慮情欲若塞而濁者宜矣是故聖賢訓之防閑其心正以覺其誤復其流使求猶水之所遭者使然其净明未嘗溷焉而昭昭者存而謂之道行而謂之法則周流六虛與天地並行而不違者發而為風雨雷霆若固有之何哉盖河洛二五之數與雷霆三五之道萬有生息一是本焉是以養之為至和施之為至神孚以盪磨通以誠慤則玅用之契若返掌矣特有幽明鬼神之異彼所鮮言吾兼用之也夫是必純而後能一一則性命之道備矣尚何法云哉故觀物之性則知己之性能盡己之性則知天矣知夫天則在我之天即彼天也感通之道孰得而二焉故内修之士多佯狂使酒談笑怒罵皆可役風致雷頋豈茍然哉彦𢎞既備究法奥純一之功熟習而嘗驗者也尚何言乎且予聞其上世有聞道而超脱者其好尚之䔍豈非宿習也哉彦𢎞勉之旴為侍宸王君之邑里尚振其遺傳以啓將來是所望焉因請志之遂筆扵磵上志學說學之大本存乎性命道徳而已矣夫心統性情而性稟天命之所賦也四時五行庶類萬化莫不出乎命四端五典萬物萬事莫不具乎性然而萬殊一本其理未嘗不一焉是以率之之謂道脩之之謂教而必學而後知也其始乎孝悌忠信成乎升降酬酢無時而不學也經之謂學肇扵説命曰學扵古訓乃有獲念終始典扵學此聖之學也聖賢知全乎天理之公則清明純粹之體具愚不肖惟溺夫人欲之私晦濁邪僻之偏固學之者求去其蔽而復乎本有之善而已耳故必究夫盡性致命明善誠身之道焉是以禮義為之品節防範以言行為之涵養省察然必隆師親友而後得則持敬以居之由義以行之乆之入乎耳著乎心無入而不自得焉今夫造父善御羿善射師曠之律倕之弓奚仲之車杜之乘雖工伎之小且猶志彀而後中焉􅀈學也聖賢之事乎夫子既聖矣而不自聖猶曰吾十有五而志扵學當是時以及千萬世豈有過聖矣乎而猶志乎學哉其設也在唐虞曰成均殷曰太學又曰瞽宗周之太學為東郊小學為虞庠此漢唐所以發之也而唐虞之君皆聖矣亦未始不師焉若堯學扵君疇舜學扵務成昭禹學於西王國湯學於成子伯文王學扵時子思武王學於郭叔此性之身之亦有發焉夫子亦嘗問禮扵老氏訪樂於萇𢎞問氏扵郯子而孟軻學扵子思之門荀卿學於鄒衍此儒之所相傳也倡之為董韓繼之為濓洛卒求乎中正仁義之歸而確乎其返身之謂也得乎六經之膏腴者粹中閟外足以叅賛化育而形諸至和者著而為之文經緯錯綜託以載夫道焉是故衡璜琚瑀之儀彛鼎簠簋之制有不待飾而知其為清廟之器也豈徒若懷竊鼓鑄之流誇浮文偽惟雕蟲刻鏤以争妍取憐之是效也茍不能達乎正大髙明之域徒競扵矞宇嵬頊之趨若之何而謂之學哉必造其指而底扵成也視向之得夫師友者不啻言之於檃括陶之於埏埴不勞力而有矣盖得諸己者道之精㣲學之淵宻充實光輝而日益其視錦繡纂組不足謂之華茵鼎圭綬不足謂之榮是雖絲縷菽粟之薄蕭藋抔水之陋不改其樂也乎抑亦一毫不足累其中而然哉然而騏驥一躍不能十步駑馬十駕功在不舎然其所至雖有疾徐之異在乎息與不息哉斯其聖人志而不厭也歟予猶子某純敏嗜學嘗以伯氏某扁其進修之所曰志學請一言申其義予之於學也探蹊而未入扵閫者也其能有以啓之乎某尚勉之使其習之至行之著予將見其所成立詎可量哉是為說以俟傳紫虛元君傳元君姓魏氏諱華存字賢安任城人晉司徒舒之女也魏齊王嘉平三年辛未生天質卓異少讀老莊言即慕道嗜閒居獨處年二十有四父母强適南陽劉文字幼彦生子二璞遐㓜彦為汲郡修武令二子粗立乃齋心别栖絶飲食反修初服太康九年戊申十二月十又六日夜半感太極真人青童道君扶桑暘谷神王景林真人清虚真人来降謂元君曰聞子宻緯真氣太帝君勅我授子神真之道遂出太上寳文八素隠書太洞真經髙仙羽𤣥等書三十一巻授元君曰是書昔受之西域總真君今以付子且語以存思指歸之訣乃去元君時年三十有七咸和九年甲午清虛青童君復降與藥二劑使旋服之尅期㑹洛陽宫是月七日夜半太乙遣飈車来迎元君用藏景之道託形神劒而化享年八十有三遂往洛陽山明日青童君太極四真人清虛王君再降會元君扵隠洞雲臺衆真各標至訓三日而去元君積誦玉書顔如少女扵是西王母南極元君來迎晨詣上清宫玉闕玉宸大道君太㣲天帝金闕後聖君各致命授以玉札金文位為紫虛元君領南嶽上真司命秩比仙公使治天台大霍山洞臺之中主下教學仙者次司命神仙請𨽻屬南嶽諸真乃與元君俱詣天台大霍山洞臺道過句曲金壇茅君叔申燕㑹二日夕乃共適霍山矣興定二年乙丑六月二十三日元君與衆真降勾曲金壇楊羲家華陽之傳始此是為上清第一代宗師宋元祐間進封髙元宸照紫虛至道元君云金野菴傳金蓬頭永嘉人也名志陽號野菴因蓬首中作一髻世呼蓬頭云生故姓家鄉井徳之幼果敢有大志不羈甫長知慕道棄世慮遂師全真李月溪月溪白紫清徒也一見器之命逰燕趙齊楚求正焉及叅先徳李真常益有省行經袁州遇守城校尉顛軍子狀貎偉素曰不與世接夜宿神祠間蓬頭異而師之既乆語益有得時紫山鄒廷佐慕道建長春觀禮之未㡬命其徒劉志𤣥典觀事乃逰武夷龍虎二山時龍虎主先天觀者傅師正館于蓬菜菴菴據徴君聖井藐姑諸峰之㑹蓬頭攀陟崕壑侣鹿豕藉雲霿視以為常間夜坐磐石蛇虎值於前輙􅕎而遁去因得夷曠地命其徒李全正趙真純築天瑞菴于峰頂時四方聞其道著無逺近有疾患輙叩之以所供果服之無不驗由是禮者日集嘗天旱叩龍井召龍出語龍出聽踰時漸小躍入袖中乃警以偈龍騰奮入水未頃天雨元統癸酉復隱武夷山居紫清之止止菴淛東元帥李太平聞而禮之謂曰命嚴則君治心清則慮寡李益敬歎及叛賊李志甫寇漳州國朝以其地同知吴公知寇道命為先鋒平之其子仲良願師事之不許隨果夷滅衆神服或倦請謁者衆謀藥死之即預知命徒鑿竅地中果服出之今名吐丹井云至元正月一日同輩桂心淵世稱桂風子坐解于廬山旋聞之於四月十日命徒書偈坐逝越十三日面頳若栗肢體温軟猶生其徒瘞于菴側之古梅下生前至元丙子五月四日髙弟則勞衍素郭處常李西來殷破衲方方壺皆以道法聞世云芒芴子曰古之烈夫義士必苦行潔身以成其志故其視裂肌膚摧筋力若所固然是以其卓絶特立足以垂示千載若金蓬頭是也然欲立名於世且必是而後可况其超脫幻化者哉求能若此而於道無成焉未有也惜能是者代亦㡬人哉趙原陽傳趙原陽名宜真吉之安福人也其先家浚儀宋燕王徳昭十三世孫某仕元為安福令因家焉原陽幼穎敏知讀書即善習誦博通經史百家言長習進士業未㡬試于言以病不果赴乆不愈夜夢神人曰汝吾家人向望世貴父遂命從道已而篤嗜恬淡學益進初師郡之有道者曰曾塵外嗣諸法要間有缺文必考述盡詳復師吉之泰宇觀張天全别號銕𤣥張師龍虎山金野菴得金液内外丹訣後復師南昌李𤣥一𤣥一薦之師蒲衣馮先生馮亦師野菴云嘗逰白鶴山永興觀乃西晉匡仙故跡遂居焉間以所授致雷雨度精爽皆有異感聞者越千里走從之㑹壬辰兵興挾弟子西逰吴蜀暨還逰武當謁龍虎訪漢天師遺跡時天師沖虚公深嘉禮之欲留不可宫之學者多師焉還至贛之雩都紫陽觀因居焉凡道門㫖奥皆綴輯成書或為詩謌以自警尤以醫濟人且絶交遊寡言笑聞者願禮不獲其髙行偉操為時所推慕從逰者益衆歲壬戌正月朔謝衆曰吾將逝矣自今日始鑰静關慎無有干迨四月三日夏至啓關祝弟子善自立漱浴更衣趺坐適縣導詔至樂鳴即書偈擲筆而化雷電驟作白晝晦㝠明日官庶瞻敬者羣至門人𠂻徳淵輩請以棺殮肢體若生既畢汗出周浹越三日瘞觀後之鳯岡乆之草浄鳥不巢其徒則曹希鳴劉若淵尤入室焉有詩詞若干篇已行世凡奥宻言論則見諸法要云賛曰𤣥門之書千萬言内聖外王之道既備其神仙長生語特曰虛静恬淡寂寞無為可謂易知易行矣故代之出世拔俗者必苦行峻節以自持信非志見卓異所不能造又孰可一以眇漠病之也乎若原陽言足範世道足啓後曷可無以紀歟然其昭昭不可泯者亦何俟信乎是耶書通彭先生書去春獲詢動履之詳莫不推先生純篤自守為學明正不為事物所移變素以古道自任此某之願見之急也苐念志力駑鈍讀書究理未知趍進之方雖欲致鑚仰之工不可得也况日羈塵俗跡與心違負愧萬萬雖嘗欲絶交獨處以守道自期庶㡬有足繼乎古人之遺轍者也猶恐世殊時異動招訶議惟坐歎其不可追也然能不力致心其間乎盖今之言學也鮮與古先聖賢真履實踐有所契合者非道不同學之不同也今之所異也誠不過循習腐朽之說以意見疑測未明謂之明未得謂之得即輙自盈足不惟以古人為不足追及或以為不已若者有之及求之竒言卓行則甚相懸絶又豈得以是責夫世哉矧將以究濓洛之緒㑹朱陸之異則猶親師取友之難而同異邪正不得不辯也古之言學也先儒碩徳之徒言不可泯行不可揜此無他皆由操踐之實也豈茍且循習之可儗似也哉既知所趍矣必底乎是而後可非是則不足師友矣子正兄嘗辱不棄每相指明其啓發琢礪多矣若俗學淺陋之弊故嘗粗知鑒燭而日有得矣别後凡過山間者皆未足以真實研究人情薄惡不怪以迂必非以癖豈果盡知所從哉竊惟古之人以道徳性命埀之萬世具之經史子氏者億千萬言充塞煥耀流之無窮而與日月並明天地並乆者非積諸中者至大至幽而發乎外也能若是哉其繼承末緒何代不有之而卒若牛毛之扵麟角又何若是之難哉抑道之明晦亦時之係焉况文墨之小道義之大也乎故知言力行之士特立獨行其所造詣必異乎流俗者也雖未足抗行古人其無愧乎道則亦庶㡬矣士之所以擔簦躡屩雖祈寒隆暑驅馳道途所以汲汲不自安席者誠亦已分所當究而已矣先生相去不數舎嘉言善行聞之扵耳見之於目茍不知所從焉是舎近而求諸逺也豈不甚愧乎千里之行也哉異日專圖躬侍講席面究欲言惟左右以先徳接引晚學為心萬有以終惠之也幸甚通蘇編修書某不奉起居倐已一載前冬處城人回貢書想達續於杭城領發下陋像辱賜賛語頋其塵容俗狀何敢煩瀆且䝉與拔之至惟增愧赧後數尋便奉書問斾從赴召晉府遂乃不果及秋京還聞已回至鳯陽甚欲扵杭候謁復以人事窘冗而度留王門必未即返駕遂不獲一視顔論此某之分薄心違相去聲聞不逺而不遂一見何賢士君子面提耳教之不易得者若是哉迨今徒深悒怏往來中每䝉齒記及孟啓還獲誦大文并承命録登巻此又所過望也某向之冒昧達賤姓名貢二三書於座下蒙不鄙棄而教之然某之有請者非世俗徼譽於明公之門也古今之道同託言以顯道是不可無也抑亦健而不息明而不昧塞乎天地與日月並明四時同序雖川流山峙鱗躍翼翔靡不同乎是者所謂理性命也惟誠明中正以脩之皆相傳不易之説雖立言或殊究其實踐無以越此者也凡修之扵身必行於當時澤及後世茍行無所立必託言以自見此文之得之心而所以載道也故先世師匠觀其有徳業文章者皆然且三代列國有文矣兩漢唐宋之文不愧扵古雖吾道若關文莊列者皆善扵言是於道勝者文不難而自至也某之志者非欲眩俗誇時記姓名而已思有以造乎道焉往歲䝉賜書開性命之道發經史之㫖為學為文之方盡矣此某之至幸而至感者也嘗研心編冊雖未知有得必待磨光濯潤以揚其光澤闢窒去疵以發其蓄藴此非惟一鄉之狹陋不足以自廣求之四方亦鮮所契合非有望於明公之門而復何俟焉况此學者之所當盡心也乎兹儗刪訂平昔所作一二俟秋間躬謁庭下以卒所願惟髙明幸不斥棄先尋便下舟抵盛郡納之以進鎔其炁質發其言辭拔其沈溺使淺陋者深廣之卑隘者閎大之一返乎髙明宏逺之域若道徳之源文章之授必不待加驅䇿而盡得之則其不能甘與草木同腐者一旦可託之千載之上非先生而誰之賜耶非不親謁括庠以職所拘諒不見咎干冒清崇伏祈寛宥以兾終惠不具通徐教授書某乆慕髙風無由瞻謁曩者不愧庸陋以仰慕之切妄以堂名干大文非惟賴傳永乆實候有以開發之旋蒙不鄙允以譔至惟増悚恐今嵗秋京還遂獲承顔接論以及古文述作之訓惟髙明已不固靳與之以進教之以方苐某深愧率然輕瀆乃沐過愛奬納甚至諒某晚學無聞何以得此於明公也哉迨今徒益感愧違教日乆逺惟文候起居康裕為慰某自抵山塵俗紛冗幸以平素聞師友警䇿之言不為事物所羈每求索於編冊雖未能有進足以優泳扵内及發乎筆作終爾蹇鈍自揆養之未至求之未達若古人之所積藴未能混融故也或居山菴去塵濁安寂静旦夕充擴所志者或有以自慰惜去執事日逺音問日疎不獲證是否扵宗匠碩師之門為歉耳且今鄉邑間求講學明道之益卒所未見况文辭之大者乎或往還郡邑者特汲汲扵口體之累尚何足與論古人身心之事哉近䝉以古先聖賢格言至訓開其隠奥寢食欣快私竊慶幸惟執事既以允請必不中棄幸推儗師匠之法經史之訓賜之裁成與之修潤某雖志力駑困不足以光斯文顯傳緒得無愧乎今追乎古義之所在豈不感扵中而思以報也執事實以道誼與之故言不能已矣是乃悉敷其情萬乞鑒詧心腑何幸如之兹便翔謹布區區以致萬一之謝遇便無靳賜教不勝至望臨楮無任瞻慕伏兾愛重以肩斯道不具通吴待制書某少有文好嘗慕登先生長者之門討索古文探研經史發其所藴蓄以卒業焉初承鄉先生方壺朗亭草堂諸師與之以進開廸其説未㡬師友淪謝漸益荒怠深抱感惜扵是數年遂銳志求之京師及四方先達之士且亦罕遇豈果無其人哉實未之遇也盖以賤蹤徃還迂逼不能詳求力叩故也往嵗獲侍顔論以醮修拘暇不獲請益繼而嘗於闕下瞻覩儀采亦不果盡其所請迨今惟增慚歉曩聞車從賜還田里實深欣羨以執事文獻名家厥有端緒是欲願見之切也嘗過蘭江念欲趍謁間值令似直閽相過必言療疾鄉戚間相去稍逺又弗果一聽誨益諒非髙明欲固鄙棄而然何以縁羈分薄一至是耶然昔人之相慕平生或合復離盖其所願見也欲究古明道而已道同言侔則若合轍同席互有資益其未逮也必有以啓激之非徒若世俗之謂學求口耳之辨聲光之誇合則就不合則去而已且嘗求之四方鮮能有以激發頹靡振卓沉俗者正此也某嘗取六經百家之言求其㑹歸㳺泳晨夕若知所趍又嘗慕為古文章苐未聞繩說而求之浙東西間或得一二庶幾有入盖非欲勉强扵言以希名眩俗而已維道之在必託言以傳逺固非學貫天人所不能也况某空虚窮陋所慕若此亦豈不深不自量也哉尚冀有萬一之遇故舟便間累欲往見盖有請於是焉惟賢士君子必有以成人之美宜不固靳也後容叩謁勿拒其愚銘感萬萬答程訓導書僕自未冠有志扵學若鄉先輩靡不師以求之未之有得而思之反復求亦愈切及長親殁襲教雖肆力吾道家言而誠身脩己之道自見必求諸濓洛關閩為備遂易所習而力求之卒無所逮乆之先輩頓益淪棄四頋凋索雖志夫特立獨行豈其才質學行所能至哉况日以塵累之纒憂患之逼乍作復輟始明復晦求向之所得已日廢而何能日進焉及奔走京師上而舘閣下而所歴州邑凡知名之士莫不親益以達扵成而其施之言辭昧扵事為務誇一時以取利禄者往往皆然其誠能以周程朱張之謂學者擴其所聞大其所養以致君澤民為己任竊未之遇焉矧文章家有諸内而形乎言此其立言君子遇之尤難也乃退而反求諸己以自省思為自昭之工復每為虚譽所牽不能躬踐明公之訓多矣雖然豈能舎近而取逺以名自足而不知求正於友朋哉閣下以家世之舊學業之素於僕雖未之面交而觀其求諸逺者若是盖有可驗者矣况每往還吾邑其往也以敬君之心不敢少怠莫能延滯而還也又以桑梓在望别去之乆其情益切故所以不能少從容几杖間以承誨論此素所慕而有歉者寜不間扵執事文字間興愧焉夏間忽辱臨頋得遂欲言曷勝慰浣使平昔有所願講者沃洽扵一旦寧不私竊自喜焉别去音問少疎而常扵往來者詢動履之祥益增慰快夏末以召赴闕羈留連月縻跡粗安回過溪上甚欲胥㑹又以匆迫不果旋䝉惠書辭義周至奬拔過情自非以家學之厚其見趣言論豈能至是苐愧僕疎陋無似不足以副所許儗者銘刻何已即欲奉答以乍回塵務所稽兹敬此以復緩慢之咎首希寛抑辭不盡意尚圖别究所諭朱進士文就此發上録畢幸即擲還辰中乍寒餘惟珍愛以益斯文不具通倪教諭書逼歳承别後稍乆不知音問伏想抵京動定履端百福區區臥瘡日甚雖杖屨相從而惡俗交沸排遣之餘徒增感惜而已臨行䝉發至陸門論太極往復諸書及諸先哲狀銘抱疾研究深所警發區區力駑志下其獲聞先儒之遺緒皆託友愛之切鄉里之重故也銘刻髙誼豈能少忘嘗欲充其見聞雖修踐未至常若洞徹清快於事物間少所忤累矣自聞先覺之訓與世推移言寡合而行不侔往返山舎託興丘壑間俯仰陳跡切所自奮惟加省察耳雖不能表裏混融較之汨沒愈下者或庶㡬焉此皆吾兄切磨之益也奈何今之學者率難以實理相究縱有體認模測之工守之不固執之不確其淪溺廢墜特返掌間耳此世之通患而流蕩忘返者莫之知也其亦斯文凋䘮之極師友授受之不明也哉此正吾儕自持扵識察之間無所愧怍所以不求知扵人而亦不侔之大端也古之人扵經世出世之道豈視之兩途故其出處有在焉雖嘗致力求之又豈能心符志合者哉亦必惟超出獨立邈與世絶庶㡬扵己有得無咎於人也書至幸詳箴教是所望焉左右去就想日見次第有便萬即見示兹便敬布區區臨楮不勝拳拳闕間萬冀以時自重為斯道砥柱不具通王博士書竊聞道之在天下無乎不寓焉雖天地之大萬有之衆舉不能違乎是也何哉盖理無不存焉由理無不存其間而後知道之大也無不著矣求道之有扵己者知率其性則道之在我也若固有之知存其固有也則能立其本以齊其未本既立則末不治而齊矣然率性之道莫先乎窮理理窮而後能盡性此周孔思孟之謂學也其大中至正之謂歟及夫致命之工焉舎理而言氣不兼乎理氣而專乎天命流行者言之此老莊關列之謂學也是以自二帝三王之道熄秦漢以來楊墨之言塞而孔孟之道晦下而襍為申韓刑名若前之荀楊後之韓歐以孟氏功不在禹下以其闢楊墨云耳或謂韓愈氏足以配孟氏以其闢佛老之功亦大矣此無他非吾老子之言有以取先儒君子之觝斥也盖學之者不善師其道焉若夫内而丹砂方術禜禬祠祭之説外而刑名兵數權謀機符之用老莊之言似是而非也周衰之時天下糜爛直欲以是言拯時匡俗以拔溺捄焚于己弊壞之頃也豈必立其說以惑當世而取誇于後世也哉故其立教初無神誕譎偽之詞不為怪竒可喜之論其於窮神知化之機六合之外不論也後之為其徒者務蔽庸俗之所嗜好而一旦舎源求流耽為狡獪詭異之習飾華背實蜂集羶附號呼而起其趍世競利尤有甚乎弁冠縫掖之士扵守中抱一之道歸根復命之說果何在哉是亦何迯乎不取訾毁扵當世也哉奈何千萬載之下豈無卓識獨行之士或有見夫是也一以清静無為隂翊王化之言為任也哉亦豈無柱下史之職哉亦豈無老莊關列之謂道哉某也質愚且陋今生四十有三年矣少從鄉先生逰所習者辭章翰墨而已其於濓洛關閩諸儒先道徳性命之說壯而後有聞扵是致力乎性理動静交養之功其扵天人一致之理或若㣲有入焉而後一棄舊習之所為辭章凡六經二史而下若夫孟荀揚韓之宏深左馬班賈之精雅栁歐蘇曾之雄博皆常研精覃思扵佔畢之未而未之有得焉然後扵守中抱一之道益有以見夫内聖外王之實也是以常歉乎其不足者願求正乎朝之公卿縉紳迨夫湖海聞望之士有若宋潜溪吴蘭江蘇素菴徐林叟髙嗇菴皆獲師友焉獨以未謁執事為歉也曩嵗幸于姑蘇請益山莊一見之頃歡如平生挹其言論風㫖自恨識荆之晚也未幾執事以召入朝往還京師幸托一日之雅又獲承誨扵客邸雖匆遽不能少傾别緒而一面之慰何可言喻去秋復聞承恩寵擢有加此固執事名實之效遭際之盛積之有素而發之以時故也豈不於詞林交友之輩預有光矣間嘗不揆㣲陋以精舎碑文為請實以託雅契之厚知學業之詳必不固靳也而閱時且乆未䝉付下切恐玉堂應制事繁未暇故耳諒不為世俗貴賤之棄也且某之願託于當世名筆煥耀泉石者非有勲業之盛譽望之假特所以記其歲月述其出處而已矣又豈將藉是以誇世駭俗以誣將來也耶矧某雖素庸鄙承乏祖烈其所深愧者不能以盖公之道上佐明盛而其厯事兩朝每沐隆眷徒竊譽無補此其寢食負赧不能少效涓埃之報為大咎矣又豈能汙合流俗以鼓惑詫衆茍徼一時之趨而取議扵後世也是以恭黙自守隠約自固毁譽不足動其中抑亦薰蕕之不相入也因皆短之曰彼學孔孟者也是舎其本矣亦宜而又熟知某之學夫老子者與彼異歟其躭玩泉石若將髙蹈逺引超脱幻化託空言扵千載而將亦視其無所用扵世也非託執事知之益深愛之益篤言不及是且昔人云士為知己用女為恱己容以執事豈非知己也乎孰不有以啓而勵之也乎深愧縷䌤煩瀆惟執事裁而教之幸甚與倪孟沖鍊師論火候書日者承過訪山舎髙論竟日足洗枯寂鄙野之懐甚􅇺甚􅇺念欲少淹一宿山雨夜話亦見林泉真味何御風長􅉨飄飄然不可追及耶遽增怏怏耳繼辱示髙製洗心玩味涵泳之乆誠有黙識心通者矣吾友之學可謂博贍宏逺矣又豈僕之足盡窺盡聞也哉然而正欲探賾幽㣲攅礪隠奥者邇者罹不測之禍譛諛浸長僥偽競起一時傾危覆奪之勢若火之焚水之溺莫可得而避也惟容之以黙委之以愚引咎自責而已尚復何辯哉當是時求能卓然不改以禮節相扶未之見一人焉何薄扵道義趍於流俗者皆然抑世豈無若馮驩朱勃之才者亦固鈐口結舌熟視而不發一言乎乃為濡足之故不救溺人可乎幸賴髙明在上藉祖宗之遺澤獲全而歸而卧疾且乆人情世態雷動川湧何一變至有若是之甚其亦可歎也已是以處蹇困之中將以省心克已戒謹恐懼修徳以俟天命此古人之處榮辱得䘮安扵所遇而已雖愛者戚戚而悲憎者欣欣而喜舉不足動其心干其守也故其居屯艱險阻迺所以驗進道之力也是以文王囚而作易宣聖厄而修春秋下而學業文章未有若班馬楊賈韓栁歐蘇者亦常困於放逐貶竄而其學不廢而徳愈脩者所謂不遇盤根錯節不足以别利器者此也豈欲文其過以欺後世哉􅀈僕以慎而取咎思患而預防之乃所以致患也此非命與數而何然而傳曰惟彼譛人投之豺虎豺虎不食投之有北有北不受投之有昊今斯見之矣其獨無愧乎中者雖屈扵今未必不伸扵後也幸復茍安泉石日與木石居樵牧逰其去野人㡬希廼得肆志扵性命道徳之言視彼碌碌炎涼之輩奸囘譎詐肩摩足躩若蠅聚蟻附之逐羶鯹然羣議黨計朝􅉨夕違亦獨何心哉又熟知處進退存亡之道者惟義是從耳雖死生窮達之所不論尚何奔競恱媚之下者哉且人受命扵天者必有定在焉豈以一人之私可得而拒哉此固非世之所能知而亦古今之通患也而僕之潜心力究扵吾友之言深有取焉而學之未逮切有疑者獨火候之傳凡叅討數十載往来方外之士靡不討論鮮有契者其言之荒唐謬悠者悉歸扵虚則以卦爻晷刻之設特其規式耳循而不必泥也其言之幽深㣲宻者悉詳扵實則以符後斤兩之數皆其法則也守而不可違也則二者孰善焉若夫乾坤坎離金精木液火龍水虎水中之金火中之木返還顛倒之玅鼎爐藥物之諭皆嘗聞其槩矣獨百日立基十月胎圓脫胎神化之機火符下手之工卒未之決其疑也而坎離之真隂真陽升降往來周流不息即五行一隂陽隂陽一太極也由太極而生四象四象生八卦八卦演而為六十四卦六十四卦演而為三百八十四爻循環無端往來無窮雖天地之大萬物之衆有不能迯焉此人身一息之呼吸而與天地之道合而人所以能盜天地之機也以是觀之則一年十二月一月三十日一日百刻也一月總計三千刻十月總計三萬刻三萬刻之中以奪天之三萬年之數一刻之工夫自有一年之節候所以三萬刻可奪三萬年之數故一年十二月總有三萬六千之數是以三萬刻刻刻要調和或有一刻差違則藥材消耗火候􅃜缺火數盛則燥水銖多則濫火之燥水之濫不可不調勻是故攅年歸月攅日歸時十二時中只一時也其間晦朔弦望沐浴刑徳盈虛進退不可不知也有曰南北宗源翻卦象晨昏火候合天樞隨日隨時則斤兩毫髪差殊不作丹由來庚甲申明令以時易日法神功其火候之有記而聖人傳藥不傳火之言信矣而又曰冬至不在子大藥不記斤真火本無候夘酉時虚比箇中得意休求象若究羣爻澷役情則符候之謂信虚言哉此必始扵有為終無為也若天地一年一周日月星辰一月一周人身大藥一晝夜一周一日之内陽生扵子極扵已隂生扵午極扵亥陽始扵復隂始於姤一月之内朔始扵屯䝉晦終扵既未自巽至坤皆未生之卦故知來者逆自震至乾皆已生之卦故數往者順則一年二十四氣七十二候所謂一月一還為一轉一年九轉九還同仙師之言詳且至矣考亭朱子則謂火候之法乃以三百八十四爻為一周天之數以一爻直一日而爻多日少則去其乾坤坎離四卦凡二十四爻以應二十四炁炁至而漸加焉况一日之間已周三百六十之數而其一炁所加僅得一爻重輕不相權準其䇿數之法盖月以十二卦分之卦得二日有半各以本卦之爻行本卦之䇿其䇿多少陽即注意運行隂即放意㝠寂十二卦周即為一月之工十二月周即為一嵗之運反復循環無有餘欠是則大易之妙豈不與大丹允合也哉以此抽添進退必有消息増減之異豈若沉空滯寂之偏即禪宗所謂黒山下鬼窟者盖以黙坐扵隂趣故也殊與吾命宗之㫖大有逕庭矣惟吾友皓首窮研遍厯湖海必素㑹𤣥㣲幸有以啓之使僕齒日向暮茍獲有尺寸之進以俟其成其能忘所自哉此非山林契合之乆鶉衣惡食與世相絶者共論之豈誇耀當世茍媚聲利之輩之足語是哉然亦察非其人言不及是庶不失扵知言也髙文謹用返璧拱竢一發駑鈍幸甚幸甚畣張司業書去冬留京獲承枉頋客邸傾慰渴懐誠如執熱而濯清風也第以人事匆冗弗克少盡欵洽臨行又不獲告别迨今愧慊何可言喻及還急欲貢書首謝又以世道之艱不敢造進以此廢禮負咎知萬萬矣諒閣下以婣契之舊必不譴及其如自愧甚若芒背何近便間附繆句至達善先生處亦嘗附寄未審一達聽否益深怏怏耳不面者㡬不知梧楓之又秋矣方欲貢狀遽承惠問且沐鶴箑之賜揮沐仁風感怍不已從諗履貺康裕甚􅇺甚􅇺某也碌碌無似叨襲宗緒自揆徳之不修學之不逮惟忝竊是懼少從問學數年以來幸獲從縉紳縫掖之士逰篤扵窮經學古之志而道徳仁義之説或有聞矣而學不加進悠悠駒景復何成焉比者以恐墮覆轍之戒實出愚暗盖以山林樗朽之資不意獲咎乃爾幸䝉茍全誠出望蜀自知運數蹇晦學力荒陋一至是耶惟困卧泉石期以自勵奈何志􅉵願違宗嗣無託每一興懐寢食不遑少寜惟痛心疾首益増悵惘而已而晨夕切念遭際兩朝國恩未報雖攄所抱已度無所用扵世矣徒憂患日至疾疚日侵撫視少之所志忙然若夢幻耳雖欲綴輯一二所見託空言扵千載固不足擬諸作者而才思荒鄙竟莫能就俯仰愧歎惟不能自棄而已復何聞達之求哉此固古昔之人處困亨夷晦之常也特未知扵天人一致之工宜何如哉自非託知非一日言不及是尚惟閣下憫而誨之不咎其率直可也詞林諸宗公巨伯幸念平素之誼明有以教之植之亦仁人君子之䔍扵交處者也昔人云士屈扵不知己而伸扵知己閣下非知己何哉抑亦士君子扶植斯道之盛心也裁荅簡慢首祈寛宥臨楮不勝馳情秋熱自愛回吴文正公宅求親書伏以陽回冬序候應秋成恭審某人尊親家叔翁家承天爵望重儒宗台候起居神相百福某伏領華緘深慚瓊報尚祈曲鑒庶迪淵衷某啓牘馳誠循彞致敬尚期瞻謁兹獲叙言即辰菊綻暄風梅含霽旭敢兾善調茵鼎樂御琴尊茂介休禎容敷悃愊某敬惟先學士文正公道徳淵源文章模範實當時之師表垂奕世之輝光簮組相承芝蘭並秀以紫電清霜之威略兼烏臺柏府之權衡世之所稀古且未有恭惟某人尊親家叔翁珠玉襟懐丘山仰止盛徳冠名門之長斯文紹家學之宗宛䝉葑菲之勿遺自愧葭莩之有忝幸聨婣好敢拒親盟攀附無辭含宏有賴某𤣥樞末緒學域疎才慕登四行之門忝繼三傑之裔昨以執柯之善諭擬諧擇徳之良縁謂令姪孫祕譔夙資英粹才不下扵馬融而長小女粗習儀容託必慎乎杜衍盖所尚者先儒道腴徳博之尊豈乃墮乎世俗銖較寸量之陋特承雅命欣挹嘉猷猶俟吉占先圖治復某僣易恭問貴門淑眷髙第賢宗伏兾慶衍鴻熈福資燕祉引忱聲謝不及别緘或有委裁拱俟條目回吴宅定聘書揆辰臘霽松簧春融梅蕚恭惟某人尊親家叔翁學專詩禮志適丘園盛徳日新嘉祥咸集某采露華扵仙掌濡月穎扵墨池庸復菲辭式干籖史某仰惟源分世胄百八十載之名家自愧派系仙傳千五百年之流裔當寰宇雍熈之日並風雲步武之姿祈茂著扵芳猷是克彰扵慶緒某再惟廣經史而昌文獻典模景仰扵東周叶帷籌而衍宗風道徳益綿扵西漢幸荷儒𤣥之重復諧劉范之盟感挹蘭金慙依葭玉某伏承髙誼以令姪孫祕譔與某長小女為姻對者言念玉帛徴賢之後衣冠侍帝之宗起華盖之卧龍旋青城之鳴鶴唯此江南之閥閱乆齊海内之聲光以先聖之甥得大賢之嗣令姪孫才倫氷雪長小女志謹閨闈吴罕駕並扵張喬劉向言符扵賈誼期謀斯逺結托猶長不揆其愚并有少請俾室家之好既翕而絲蘿之附維新爰表一忱次脩六禮尚祈嘉納允副崇瞻某敬問怡恱桑榆雍和琴瑟珠璧華棠之彦雲霞裳被之儔列致興居咸膺景福某才雖疎鈍敢効役令有事扵斯請問其目頌華陽吴先生夀頌有序余友華陽先生吴君至徳篤文行而年益髙垂六袠有四歳十有一月六日其夀辰也世家饒之安仁為邑大姓近遷吾里幼知嗜學凡其鄉先生若李公仲公張公子東黄公均瑞而吾里張公孟循盧公伯良夏公伯成皆從之逰其友則周君孟啓龔君克紹也故凡翰墨詞章之學靡不精究而性敦克為斯文所推重暨授業扵西塾凡五六載扵吾昆弟相與研偲之助居多今年冬夀將届予孟弟彦璣持觴而告曰吴君學力而行修為吾從子師歲且有成􅀈講習之益尤至焉扵其夀願得一言以頌美之予喜而嘆曰斯文凋謝莫甚扵斯若前之所師友者不可作矣而旦暮所資迪者賴君耳宜其獨年抑經曰仁者夀智者樂凡君之怡情乎林壑之幽閒文籍之淵雅莫非存乎仁則養扵其心者益充而益夀矣然㣲吾彦璣嘉斯文之好友誼之厚其奬勵輝揚能若是哉予雖鮮文敢不思一辭以永其夀焉頌曰斯文之宗蔚乎山嶽粹徳淵光龍翔虯躍凡我鄉邑耳薫目濡君為時彦涵澤茹腴曰經曰史聖訓是緝逰藝其餘繇羲斯習漢跡魏模晉唐實工崕鐫石刻遺玅曷從恱懌無厭日造其藴㣲言大章雲行霓暎暨授我賓惟貞惟純式範有猷介壽斯仁既康且祉孰匪天厚偃兹丘園采豐植茂崇酒扵觴福履攸綏峩冠博裳百禄是宜惟我友朋允資麗澤撫凋感殘永爾碩徳貽厥孫謀是則是承仰止先哲協于嘉禎黍珠龕頌有序晉王殿下既膺祖訓光嗣大業留神聖學有取扵存養之言質諸方外臣芒芴生曰子形如槁木心若死灰類以道自樂而不偶扵世乃鶉其衣鶡其冠與荷蓧抱甕之徒相忘乎大林丘山之間所栖者鷦鷯一枝尚何異夫居一黍之小乎子之所樂而世之所悲也其若是歟然吾志造夫誠明之學㑹夫虚靜之工嘗有取夫老莊氏黍珠之言暇豫之頃趺㘴一龕廓然虚中心與天一子能進一黍之得以告于我不亦善乎芒芴生起而歎曰夫物有生扵無實形扵虛者皆然心為形之宰形為神之宅非中虛則神窒而不通心晦而不明是以學夫栖神鍊氣之道者虚𤣥關之規中若浮逰之潜深淵也始則固鼎爐調火符採鉛制汞以鍊之已而金精木液坎戊離已不頃刻而㑹乎中黄之宫一炁五行周流六虛化為黄芽白雪若粒黍之㣲而後返乎黍珠之中隂滓盡而陽質成乃所以為仙矣即釋之謂真如圓覺者以其圓通周遍大千之界凡所有相盡入無際光明藏中皆此珠也其質雖元始説經之前空懸去地衆真交㑹而入莊周求之㒺象皆所以盡變化之神有無之幻也以是亦不知珠之為中而中之為珠也則有無虛實之辨復歸扵胚腪馮翼之初尚何究扵言哉抑守道之極惟𤣥惟黙惟慌惟忽生亦莫能造其極焉莫能言其至焉乃稽首而獻頌曰帝青混芒閟奥靈編浩漠中扄一黍空懸愽大真人鍊質大淵凝玅紫虛養珠幽𤣥闢乾闔坤虎伏龍纒茹和金宫百霛翼翾黄輿流液玉芝産田嘯咏九辰動熈靜專㝠栖鬱藍駕景雲駢廓落逰初青㝠倐旋梵樞洞陽髙視八綖溟涬赤明瓊文内研佇膺寳書浩劫綿綿箴藏修箴方寸之心宰乎一元所以配乾坤而同體為三才而並立者曷由而具焉夫必曰理以為之主極以為之淵非理不立非極不全不立無以制諸内不全無以合諸天蔵以自晦修以自率庶不為塗人而已其無昧扵虚靈者孰愆是以靜一以固其本健順以濬其源充之以仁義裕之以辭篇返而求已用則以兼善當世之責舎則以守吾之𤣥此之謂遁世而無閟居敬而守中古之學者孰越扵是吾何敢怠扵希賢雖然究老莊之道探周邵之言固吾之自礪而不偏惟斯言之確踐必日夕以拳拳銘書室銘有序予年未冠知嗜學有志儒先君子之言凡詩書六藝之文悉嘗記誦之甫長自揆扵文章家未之盡究凡通都大邑以學行著扵時謂之先生長者又從之逰扵是經史子氏之書逮老釋之文庋置日衆然後㑹其指歸反身而誠乃知皆備扵我也扵道徳性命之說自孔孟而下周程張邵朱吕焉文辭篇章之習左氏而下班馬韓栁歐蘇焉越周程諸子而言學則不足謂之學違班馬諸儒而言文則不足謂之文是以非載道之文雖工不取焉古之謂學也為已豈岐而二哉由是而充之上􅑴墳典經傳不逺矣其不探本索源而足謂之學哉豈徒纂組葩藻之習以為取利禄之具而已耳所以克己誠身乃希聖希賢之大端也􅀈養諸中者厚發諸外也和大而天地位萬物育幽足以承變化而行鬼神明足以修禮樂而賛化育豈惟致君澤民者哉所謂經綸大經者也然而出世之道必資扵老關莊列之言又豈申韓刑名䖏士横議者可同途共轍哉若釋氏之特立獨行明心見性抑亦出世之一助也其邪說戾行則有不能無可訾斥者焉烏可一以虛無空寂病之哉下逮術數禨祥之文則所不暇究也所愧質性駑劣不足善繼其志嘗闢室以儲蔵之因銘于屋壁以自警且貽諸將來以朂厥志其無忽諸銘曰繄自書契稽于典墳彛秩由序道義之門惟帝降衷皇建有極天命流行必順其則純粹誠明是復厥初形役物化孰潜吾虚惟聖惟賢昭示謨訓慎思䔍行滌滓融藴體立用行動静克持含英咀華發見乎辭心統性情百慮一致廣帙崇篇大音醇味燭妄返真探㣲造𤣥氛垢洞釋不違乎天聚辨而居孰貴圭組永言珍之尚友千古古琴銘有序蘇塊生家藏古琴一或謂雷氏所斵也生嗜琴尤切嘗告芒芴生曰予生也後道不能窺聖賢之域志無聞達之期其託跡扵丘林者惟鼓太古之音與林風石泉相酬荅若之何而非羲農間人也予雖非伯牙之善鼓也而子之善聽豈獨非子期之所謂髙山流水者哉是宜為我銘銘曰質潤而清于以發吾鳴體圓而方于以持吾莊恭黙齋銘有序芒芴子短褐敝裘逰于鳳臺之顛客有咲而告曰子學夫䝉莊氏者也其所知惟淵黙之道乎其亦知夫吾儒之謂恭黙也乎芒芴子避而趨客曰子何懼歟是果不願乎其外也耶吾王賢而愛士自胙土扵安非道徳仁義之說未嘗入乎耳存乎中也是以力學篤行而不怠掲恭黙二字扵坐隅盖將以自警且遇子厚豈無一言以進之哉辭不獲因作而告曰夫道之於物也雖天地之大萬彚之衆無古今之殊晝夜之異極其㣲玅窮其精粗盡其消長詘信通其往來變化舉不違乎寸心之㣲可以配天地之至大萬有之至衆隂陽動静循乎無始無端者雖萬殊之紛紜而實具乎一本而已耳操之要執之固則無存舎之失而融㑹乎天理本然之實也茍息乎操弛乎執則人欲之蔽何狂瀾逸驥頃刻千里之不若也哉然操執之工其惟恭黙之謂乎恭近扵禮也允恭以成其徳靖恭以守其位克恭以致其節是以禮盡乎恭而後安也黙近扵道也守之以慎黙思之以恭黙養之以淵黙而後極乎道之工也若黙識黙容黙契不假力而至矣雖然其亦必有以致乎其中也庶無過而不及者哉故行不過乎恭黙不逮乎隠則其恭也盡乎禮之不可不恭其黙也存乎心之不能不黙也則其動静語黙皆主乎一矣非外欲之足汨吾中也設宜恭而失乎殆宜黙而失乎躁是不足以盡隠㣲之至也矣所以恭則無息黙則無欲無息則一無欲則靜一則足以制紛静則足以御動若是也雖極夫存心養性以全已之天亦莫是過也其逰乎沖漠之初乎又豈雷聲之轟乎幽黙者獨何異哉今賢王之有國社即知考徳問業䖍恭慎靖孳孳焉以藩輔帝室為心其問學之端厥有源委上際聖明在位友愛彌䔍猗歟盛哉敢系以銘銘曰於昭上帝降𠂻在兹凡厥懿質斯具秉彛卓哉賢王允矣自持克一克存㒺敢勿隳于莊于敬曰志緝熈既恭既黙曷或殆違穹齋言言令訓巍巍不邇華靡髙明是資守之勿斁執之足熹益佐藩屏益廣徳基世際厥美皇眷赫曦茂翼千祀永昭鴻釐九光丹室銘有序京口侯鍊師公勉學道馬跡山世傳太上嘗降焉遺馬跡而升居福地之一也性敦厚嗜岐黄書以求養生焉洪武初以選侍祠竹宫者有年法術亦著于時今皇上嗣位授遼府典樂善訓育受知賢王非一日也暇日大書九光丹室寵之公勉居開元闢室燕處掲扁其上以昭寳翰之重王徳之隆也走書黄箬山中以言屬予乃躍然而喜曰吾道之榮幸也亦何至歟公勉尚以昔所聞扵其師者修之䔍行之習將見蓬壺中虛黄輿運周金液内凝玉華流輝則其神光􅂱煜上衝璇霄溢紫極而與三辰争耀扵穹漠矣異日挾羽翰凌倒景尚當囅然一咲相從乎塵垢之外廓落之墟也乎遂為之銘以為後之徴歟銘曰乾坤為樞闢虚室泰宇發光注金液神丹九芒兆無質火龍飛奔水虎逸坎離媾精凝太乙有夫峩冠珮鏘翐寳書垂輝耀星日風行雲馳駕軿軼古硯銘小序蘇塊生少嗜書蔵古硯一紫質而白章或謂端溪歙者疑若是矣間請銘于石以示諸將來云銘曰質之澤因以静為徳章之素因以嘿而固惟其容斯以書不窮養性齋銘虚靈湛然淵澄鑑浄毫髪溷漓狂瀾垢鏡秋宇涵空寒江月瑩孰持炁機静而後定晦息齋銘萬有一源洞然至理操存以誠端本克已汨昏蔽妄念慮紛起動静交養復斯敬止勗哉士徒聖言是啓向晦而息惟仁吾體凜焉廣居慎求厥履賛月鼎莫真人像賛心逰乎太初跡超乎空漠施之則彌六虚斂之不盈一握是乃佯狂於麴蘖亦或曠譚於糟粕其餘事也可涓滴以寓靈即霆奔而川愕世孰睹其身外之身奚可得而描䫉瓢笠像賛猗予之生𤣥胄少趍學問之門長有圖史之癖謂其為顯也則曷嘗析纓衣組謂其非晦也乃已嘗枕流而潄石是豈不羈窮達之所移也必矣惟其脫落扵世故凜乎若孤鶴之唳清霜冏乎若澄淵之湛寒碧夫又孰庸其博聞强識之所寄抑將寓其髙潔聊託單瓢而自適者耶孔子問禮圖賛孔李殊途道本同源禮吾所履持敬克存天地經法商周典墳大音稀聲余欲無言伯夷叔齊像賛商弊周隆運移鼎逝道在彞倫確乎仁義曷存曷亡孰鑒孰眎言采其薇髙風百世重陽王真君像賛道著元興運移金墜樓觀終南蓮芳衍系虯龍之姿風霆之炁廓然天逰仙風奕世樂真唐真人像賛縱閉𤣥造光振真宗肖形象外合景規中玅運風霆心見帝則宸眷赫曦湛然淵黙希夷陳真人像賛蕐山白雲惟意所適曠謝浮榮黙守𤣥極至人無夢乃踵真息控駕扶搖象存太易侍宸王真君像賛宿資霛質道契真傳囊括暘雨超乎象先光賛宸猷淵澤之㑹木葉遺傳啓我䝉昧雷淵黄真人像賛博大之資清明之炁混融萬殊了徹無際𤣥經至道妙範㣲言俯仰今古具乎一元衍素勞真人像賛江海之器山澤之臞發揮玅用莫測有無秋空林籟石室囊書洞視遐邈風霆巻舒貞白周先生像賛於維皇元顯達斯盛徳義之容仁淳之令有大厥宗昭文斯永平湖静淵氷雪齊勁潁濵蘇先生像賛雲日之姿芝蘭之炁忠肝萬言文采百世眉山蒼空潁水天際千載遺風肅瞻光霽耆山羽服像賛山林羽服江海清衿氷雪其操春陽乃心翔鶴扁舟飛鴻素琴匪象可圖寥寥大音峴泉集巻三
