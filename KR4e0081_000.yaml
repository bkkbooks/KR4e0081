body:
  text: 峴泉集目録别集類五明巻一雜著巻二序記巻三墓誌説傳書頌箴銘贊巻四題跋祭文青詞齋意上梁文普説疏賦騷操歌行詞臣等謹案峴泉集四巻明張宇初撰宇初字子璿貴溪人道陵之裔洪武十年襲掌道教永樂八年卒宋濂嘗稱其頴悟有文學朱彞尊明詩綜載其集二十巻詩居其半王紳為之序此本皆所作雜文惟末附歌行數十首巻首雖載紳序而二十巻之舊已不復存其中若太極釋先天圖論河圖原辨荀子辨陰符經諸篇皆有合于儒者之言問神一篇悉本程朱之理未嘗以雲師風伯諸荒怪之説張大其教以視誦周孔之書而闡揚佛老之説者相去逺矣乾隆四十三年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀峴泉集序天地間至精至微者道也至明至著者文也道非文不明文非道不立析而言之雖為二要而歸其實一也乾坤之所以覆載隂陽之所以變化寒暑之所以代謝日月之所以徃來山川之所以流峙草木之所以榮悴無非道也無非文也其可離而二哉又可以强而合哉故聖人者作因其自然之道著為自然之文未嘗以一毫已意加之也是故因其變化之理而成易因其訓詁之體而成書因其治化之蹟而成詩因其褒貶之法而成春秋因其節文之實而成禮因其和暢之用而成樂此六經之文所以終天地亘古今而不易者以其出於自然也後之言文者舍是何適焉自周之衰王道熄而百家興競以私意臆説騁辭立辨以相髙求弗戾於道者百不一二焉於是有若老子者其言以清静無為為道著書五千餘言後世嘗有以之為治而治者矣其庶㡬於道者乎嗣教真人張公無為自其家世宗老子之教至公凡四十三傳公天資頴敏器識卓邁於琅圅蘂笈金科玉訣之文既無不博覽而該貫益於六經子史百氏之書大肆其窮索至於辭章翰墨各極其精妙是以歴職天朝皆以問學之懿深蒙眷宁凡殊褒前席之榮嵗賚有加而王公貴卿縉紳之士亦莫不禮貎焉盖江右文宗多吳文正公虞文靖公之遺緒而公能充軼之也其所造詣豈茍然哉間出其詩文若干巻屬序焉其詩之沖䆳而幽逺文之敷腴而典雅讀之使人健羡不暇視世之佔畢訓詁拘拘以才藝自足者為何如哉矧公領宗門之重任專以化人誘善輔國翊祚為心其見於此者特其緒餘耳雖然予嘗考公徳業既本於無為是能遊心太初與道為一而且沈酣於六藝之文蒐獵於百氏之説於是發為文辭理與意㑹有不期工而自工者矣其有補於老莊之道者又豈神誕之誇者比哉公以紳有世契相與極論斯事必撫掌劇談而後已故為序其曰峴泉者因精舍之稱云國子博士金華王紳序峴泉集者嗣漢四十三代天師張真人之所作也真人學行淵䆳資識超頴貫綜三氏融為一塗旁及諸子百家之言靡不暢曉故其發為文辭論議雄邁偉傑讀之令人擊節不已予嘗愛其文如行空之雲昭回絢煥變化莫測頃刻萬狀曄乎其成章也又如入秋之水膏停黛蓄㣲風興波萬頃一碧湛乎其泓澄也詞賦詩歌又各極其婉䴡清新得天趣自然之妙可謂兼勝具羙矣且聞龍虎名山靈氣翕聚鍾英毓秀挺生列真以道徳相傳其來逺矣若道腴内充華藻外振以文雄一代者乃今獨於真人見之洪惟我朝太祖髙皇帝混一寰㝢光嶽氣全天運之興文明三十餘年矣今上皇帝踐祚以來氣益昌而運益盛雖遐陬僻壤莫不呈材獻藝摛文掞藻以自見於時况在文獻之邦神明之胄優游乎徳澤涵泳乎詩書大肆厥辭鋪張盛羙以黼黻太平之治不亦宜乎雖然此特其餘事耳至於真人超然獨得之妙艶道之士又當於詩文之外求之時永樂五年秋七月吉日遼王拜手謹識嘗聞有其道者必有其文也日月星辰天之文也山川花木地之文也禮樂制度人之文也盖道為體文為用儒先謂文章為貫道之器不其然乎龍虎嗣漢四十三代天師無為張真人神明之胄也天資超卓學問淵源本諸中者有道徳之崇著於外者有文章之懿嘗銓次其平日所作詩文凡若干巻目曰峴泉集英華煥發照耀簡編以言乎詩則託物寫情優游不廹得詩人情性之正以言乎文則雄竒汪濊鋪叙有法得古人述作之體是以海内文人碩士傳頌而稱羡者比比焉自非真人學通百氏道貫三才體用兼該精詣獨得安能發而為此耶及觀集中所著冲道慎本太極河圖原性諸篇義理之𤣥微研究之精極議論之閎肆其於天地造化山川人物禮樂制度靡不該貫雖專門擅業皓首窮經之士有不能及者非惟有功於𤣥教其於世教亦有禆焉将見斯集流傳於天下後世與峴泉相為悠乆而無窮也必矣且真人嘗為通著尚義堂記俾先祖父之志行亦得託於不朽斂襟三復深有感焉因書此於巻末以致其私意云永樂五年秋七月甲子新安程通謹識
